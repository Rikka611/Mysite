<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Page</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px;
    max-width: 480px;
    width: 90%;
    text-align: center;
  }
  .card h1 { font-size: 2.5rem; margin-bottom: 8px; background: linear-gradient(90deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .card p { color: #aab; margin-bottom: 32px; line-height: 1.6; }
  .btn {
    display: inline-block;
    padding: 14px 36px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,87,108,0.4); }
  .counter { font-size: 3rem; font-weight: bold; margin: 16px 0; font-variant-numeric: tabular-nums; }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 0.8rem;
    color: #999;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Hello</h1>
  <p>一个简单的 HTML 页面，毛玻璃卡片 + 渐变色，外加一个计数器。</p>
  <div class="counter" id="count">0</div>
  <button class="btn" id="btn">Click Me</button>
  <br>
  <span class="badge">Claude Code 制作</span>
</div>
<script>
  let n = 0;
  const el = document.getElementById('count');
  document.getElementById('btn').addEventListener('click', () => {
    n++;
    el.textContent = n;
    el.style.transform = 'scale(1.15)';
    setTimeout(() => el.style.transform = 'scale(1)', 150);
  });
</script>
</body>
</html>
