<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibecoding — 个人项目分享</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  /* ===== 色彩变量：默认暗色主题 ===== */
  :root {
    --bg-start: #0f0c29;    --bg-mid: #302b63;    --bg-end: #24243e;
    --text: #e0e0e0;
    --text-muted: #889;
    --text-dim: #667;
    --heading: #ddd;
    --hero-sub: #889;
    --nav-bg: rgba(15,12,41,0.45);
    --nav-border: rgba(255,255,255,0.06);
    --nav-link: #999;
    --nav-link-hover: #fff;
    --card-bg: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.08);
    --card-hover-border: rgba(245,87,108,0.4);
    --card-hover-shadow: rgba(0,0,0,0.3);
    --card-hover-ring: rgba(245,87,108,0.15);
    --card-icon-bg: rgba(255,255,255,0.06);
    --card-title: #fff;
    --tag-bg: rgba(255,255,255,0.08);
    --tag-text: #aab;
    --badge-bg: rgba(255,255,255,0.03);
    --badge-border: rgba(255,255,255,0.15);
    --badge-text: #aaa;
    --outline-btn-text: #c0c0c0;
    --outline-btn-border: rgba(255,255,255,0.2);
    --outline-btn-hover-text: #fff;
    --outline-btn-hover-border: rgba(255,255,255,0.5);
    --footer-text: #556;
    --footer-link: #778;
    --footer-link-hover: #aaa;
    --footer-border: rgba(255,255,255,0.06);
    --placeholder-plus: #445;
    --placeholder-hint: #556;
    --dash-border: rgba(255,255,255,0.12);
    --star-color: rgba(255,255,255,0.7);
  }

  /* ===== 亮色主题：跟随系统 ===== */
  @media (prefers-color-scheme: light) {
    :root:not(.dark):not(.light) {
      --bg-start: #f5f3ff;    --bg-mid: #fdf2f8;    --bg-end: #fce4ec;
      --text: #3a3a4a;
      --text-muted: #6b6b7b;
      --text-dim: #8a8a9a;
      --heading: #2a2a3a;
      --hero-sub: #6b6b7b;
      --nav-bg: rgba(255,255,255,0.35);
      --nav-border: rgba(0,0,0,0.06);
      --nav-link: #777;
      --nav-link-hover: #333;
      --card-bg: rgba(255,255,255,0.38);
      --card-border: rgba(0,0,0,0.06);
      --card-hover-border: rgba(245,87,108,0.5);
      --card-hover-shadow: rgba(0,0,0,0.08);
      --card-hover-ring: rgba(245,87,108,0.12);
      --card-icon-bg: rgba(0,0,0,0.04);
      --card-title: #2a2a3a;
      --tag-bg: rgba(0,0,0,0.05);
      --tag-text: #6b6b7b;
      --badge-bg: rgba(0,0,0,0.02);
      --badge-border: rgba(0,0,0,0.1);
      --badge-text: #888;
      --outline-btn-text: #666;
      --outline-btn-border: rgba(0,0,0,0.15);
      --outline-btn-hover-text: #333;
      --outline-btn-hover-border: rgba(0,0,0,0.35);
      --footer-text: #aaa;
      --footer-link: #999;
      --footer-link-hover: #666;
      --footer-border: rgba(0,0,0,0.06);
      --placeholder-plus: #ccc;
      --placeholder-hint: #bbb;
      --dash-border: rgba(0,0,0,0.1);
      --star-color: rgba(0,0,0,0.1);
    }
  }

  /* ===== 手动亮色（优先级高于系统媒体查询） ===== */
  html.light {
    --bg-start: #f5f3ff;    --bg-mid: #fdf2f8;    --bg-end: #fce4ec;
    --text: #3a3a4a;
    --text-muted: #6b6b7b;
    --text-dim: #8a8a9a;
    --heading: #2a2a3a;
    --hero-sub: #6b6b7b;
    --nav-bg: rgba(255,255,255,0.35);
    --nav-border: rgba(0,0,0,0.06);
    --nav-link: #777;
    --nav-link-hover: #333;
    --card-bg: rgba(255,255,255,0.38);
    --card-border: rgba(0,0,0,0.06);
    --card-hover-border: rgba(245,87,108,0.5);
    --card-hover-shadow: rgba(0,0,0,0.08);
    --card-hover-ring: rgba(245,87,108,0.12);
    --card-icon-bg: rgba(0,0,0,0.04);
    --card-title: #2a2a3a;
    --tag-bg: rgba(0,0,0,0.05);
    --tag-text: #6b6b7b;
    --badge-bg: rgba(0,0,0,0.02);
    --badge-border: rgba(0,0,0,0.1);
    --badge-text: #888;
    --outline-btn-text: #666;
    --outline-btn-border: rgba(0,0,0,0.15);
    --outline-btn-hover-text: #333;
    --outline-btn-hover-border: rgba(0,0,0,0.35);
    --footer-text: #aaa;
    --footer-link: #999;
    --footer-link-hover: #666;
    --footer-border: rgba(0,0,0,0.06);
    --placeholder-plus: #ccc;
    --placeholder-hint: #bbb;
    --dash-border: rgba(0,0,0,0.1);
    --star-color: rgba(0,0,0,0.1);
  }

  /* ===== 手动暗色（覆盖系统亮色） ===== */
  html.dark {
    --bg-start: #0f0c29;    --bg-mid: #302b63;    --bg-end: #24243e;
    --text: #e0e0e0;
    --text-muted: #889;
    --text-dim: #667;
    --heading: #ddd;
    --hero-sub: #889;
    --nav-bg: rgba(15,12,41,0.45);
    --nav-border: rgba(255,255,255,0.06);
    --nav-link: #999;
    --nav-link-hover: #fff;
    --card-bg: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.08);
    --card-hover-border: rgba(245,87,108,0.4);
    --card-hover-shadow: rgba(0,0,0,0.3);
    --card-hover-ring: rgba(245,87,108,0.15);
    --card-icon-bg: rgba(255,255,255,0.06);
    --card-title: #fff;
    --tag-bg: rgba(255,255,255,0.08);
    --tag-text: #aab;
    --badge-bg: rgba(255,255,255,0.03);
    --badge-border: rgba(255,255,255,0.15);
    --badge-text: #aaa;
    --outline-btn-text: #c0c0c0;
    --outline-btn-border: rgba(255,255,255,0.2);
    --outline-btn-hover-text: #fff;
    --outline-btn-hover-border: rgba(255,255,255,0.5);
    --footer-text: #556;
    --footer-link: #778;
    --footer-link-hover: #aaa;
    --footer-border: rgba(255,255,255,0.06);
    --placeholder-plus: #445;
    --placeholder-hint: #556;
    --dash-border: rgba(255,255,255,0.12);
    --star-color: rgba(255,255,255,0.7);
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e, #1a1040);
    background-size: 400% 400%;
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    transition: color 0.3s ease;
    animation: bgShift 12s ease infinite;
  }
  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    25% { background-position: 100% 0%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
  }
  /* 亮色渐变叠加层 — 通过 opacity 切换实现平滑过渡 */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background: linear-gradient(135deg, #f5f3ff, #fdf2f8, #fce4ec);
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  html.light body::before { opacity: 1; }
  html.light .stars { opacity: 0; animation: none; }
  html.light .orb { opacity: 0.35; }
  @media (prefers-color-scheme: light) {
    html:not(.dark):not(.light) body::before { opacity: 1; }
    html:not(.dark):not(.light) .stars { opacity: 0; animation: none; }
    html:not(.dark):not(.light) .orb { opacity: 0.35; }
  }
  nav, .card, .hero .badge, .card .icon, .card .tag,
  .card .btn.outline, .stars, footer {
    transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, color 0.3s ease;
  }
  .card .tag { transition: background-color 0.4s ease, color 0.3s ease; }
  .projects-section h2, .projects-section .sub, .hero p,
  .card h3, .card .desc, footer, footer a, nav a {
    transition: color 0.3s ease;
  }

  /* --- 粒子背景（视差层，仅暗色模式） --- */
  @keyframes twinkle {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  .stars {
    position: fixed; inset: -40px; pointer-events: none; z-index: 0;
    animation: twinkle 3s ease-in-out infinite;
    background:
      /* 亮星 (3-4px) */
      radial-gradient(3px 3px at 10% 20%, var(--star-color), transparent),
      radial-gradient(3px 3px at 30% 70%, var(--star-color), transparent),
      radial-gradient(4px 4px at 15% 55%, var(--star-color), transparent),
      radial-gradient(3px 3px at 20% 90%, var(--star-color), transparent),
      radial-gradient(4px 4px at 60% 30%, var(--star-color), transparent),
      radial-gradient(3px 3px at 40% 78%, var(--star-color), transparent),
      radial-gradient(4px 4px at 80% 60%, var(--star-color), transparent),
      radial-gradient(3px 3px at 25% 65%, var(--star-color), transparent),
      radial-gradient(4px 4px at 55% 85%, var(--star-color), transparent),
      radial-gradient(3px 3px at 72% 8%, var(--star-color), transparent),
      radial-gradient(4px 4px at 35% 42%, var(--star-color), transparent),
      radial-gradient(3px 3px at 88% 28%, var(--star-color), transparent),
      /* 中星 (2px) */
      radial-gradient(2px 2px at 50% 15%, var(--star-color), transparent),
      radial-gradient(2px 2px at 70% 80%, var(--star-color), transparent),
      radial-gradient(2px 2px at 85% 12%, var(--star-color), transparent),
      radial-gradient(2px 2px at 55% 25%, var(--star-color), transparent),
      radial-gradient(2px 2px at 8% 38%, var(--star-color), transparent),
      radial-gradient(2px 2px at 95% 72%, var(--star-color), transparent),
      radial-gradient(2px 2px at 62% 12%, var(--star-color), transparent),
      radial-gradient(2px 2px at 75% 35%, var(--star-color), transparent),
      radial-gradient(2px 2px at 12% 82%, var(--star-color), transparent),
      radial-gradient(2px 2px at 42% 6%, var(--star-color), transparent),
      radial-gradient(2px 2px at 28% 48%, var(--star-color), transparent),
      radial-gradient(2px 2px at 67% 92%, var(--star-color), transparent),
      radial-gradient(2px 2px at 92% 55%, var(--star-color), transparent),
      radial-gradient(2px 2px at 48% 68%, var(--star-color), transparent),
      radial-gradient(2px 2px at 33% 32%, var(--star-color), transparent),
      radial-gradient(2px 2px at 82% 75%, var(--star-color), transparent),
      /* 暗星 (1px) */
      radial-gradient(1px 1px at 90% 40%, var(--star-color), transparent),
      radial-gradient(1px 1px at 45% 45%, var(--star-color), transparent),
      radial-gradient(1px 1px at 5% 64%, var(--star-color), transparent),
      radial-gradient(1px 1px at 38% 17%, var(--star-color), transparent),
      radial-gradient(1px 1px at 78% 90%, var(--star-color), transparent),
      radial-gradient(1px 1px at 58% 50%, var(--star-color), transparent),
      radial-gradient(1px 1px at 18% 5%, var(--star-color), transparent),
      radial-gradient(1px 1px at 65% 45%, var(--star-color), transparent),
      radial-gradient(1px 1px at 98% 18%, var(--star-color), transparent),
      radial-gradient(1px 1px at 22% 72%, var(--star-color), transparent),
      radial-gradient(1px 1px at 86% 48%, var(--star-color), transparent),
      radial-gradient(1px 1px at 52% 95%, var(--star-color), transparent);
    transition: transform 0.2s ease-out;
  }

  /* --- 导航栏 --- */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--nav-border);
    padding: 0 24px;
  }
  nav .inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  nav .nav-right { display: flex; align-items: center; gap: 16px; }
  nav .logo {
    font-size: 1.3rem; font-weight: 700;
    background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  nav a {
    color: var(--nav-link); text-decoration: none; font-size: 0.9rem;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--nav-link-hover); }
  nav .gh-icon {
    display: flex; align-items: center; gap: 6px;
  }
  nav .gh-icon svg { width: 20px; height: 20px; fill: currentColor; }

  /* 主题切换 & 语言切换按钮 */
  .theme-btn, .lang-btn {
    background: none; border: 1px solid var(--nav-border);
    color: var(--nav-link); cursor: pointer;
    height: 36px; border-radius: 50px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; transition: background 0.2s, color 0.2s;
    padding: 0 12px; line-height: 1; font-weight: 600;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .theme-btn { width: 36px; padding: 0; border-radius: 50%; font-size: 1.1rem; font-weight: 400; }
  .theme-btn:hover, .lang-btn:hover { background: var(--card-bg); color: var(--nav-link-hover); }
  /* 默认/暗色 → 显示太阳（提示可以切到亮色） */
  .theme-btn .icon-sun { display: inline; }
  .theme-btn .icon-moon { display: none; }
  /* 亮色 → 显示月亮（提示可以切回暗色） */
  html.light .theme-btn .icon-sun { display: none; }
  html.light .theme-btn .icon-moon { display: inline; }
  /* auto 模式下系统亮色 → 图标也对应切换 */
  @media (prefers-color-scheme: light) {
    html:not(.dark):not(.light) .theme-btn .icon-sun { display: none; }
    html:not(.dark):not(.light) .theme-btn .icon-moon { display: inline; }
  }

  /* --- Hero --- */
  .hero {
    position: relative; z-index: 1;
    text-align: center; padding: 100px 24px 80px;
  }
  .hero .badge {
    display: inline-block;
    padding: 6px 18px;
    border: 1px solid var(--badge-border);
    border-radius: 50px;
    font-size: 0.8rem; color: var(--badge-text);
    margin-bottom: 24px;
    backdrop-filter: blur(6px);
    background: var(--badge-bg);
  }
  .hero h1 {
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.2; margin-bottom: 16px;
    letter-spacing: -1px;
  }
  .hero p {
    color: var(--hero-sub);
    font-size: 1.1rem;
    max-width: 500px; margin: 0 auto 36px;
  }
  .hero .cta {
    display: inline-block;
    padding: 14px 40px;
    border-radius: 50px;
    background: linear-gradient(90deg, #f093fb, #f5576c);
    color: #fff; font-size: 1rem; text-decoration: none;
    font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .hero .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(245,87,108,0.35);
  }
  .hero .cta-arrow { margin-left: 6px; }
  /* 鼠标跟随光晕（全局） */
  .cursor-glow {
    position: fixed; z-index: 0; top: 0; left: 0;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,147,251,0.12), transparent 65%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: opacity 0.5s;
    opacity: 0;
  }
  @media (max-width: 768px) { .cursor-glow, .orb { display: none; } }

  /* 漂浮光斑 */
  .orb {
    position: fixed; z-index: 0; pointer-events: none;
    border-radius: 50%; filter: blur(80px); opacity: 0.28;
    animation: float 25s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: #f093fb; top: -15%; left: -10%; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #667eea; bottom: -12%; right: -8%; animation-delay: -9s; }
  .orb-3 { width: 350px; height: 350px; background: #f5576c; top: 55%; left: 60%; animation-delay: -17s; }
  .orb-4 { width: 300px; height: 300px; background: #a18cd1; top: 30%; left: 75%; animation-delay: -5s; }
  .orb-5 { width: 450px; height: 450px; background: #43e97b; bottom: 5%; left: 25%; animation-delay: -13s; }
  @keyframes float {
    0%   { transform: translate(5vw, 10vh) scale(0.9); }
    25%  { transform: translate(35vw, -15vh) scale(1.08); }
    50%  { transform: translate(15vw, 35vh) scale(0.88); }
    75%  { transform: translate(-10vw, 5vh) scale(1.04); }
    100% { transform: translate(5vw, 10vh) scale(0.9); }
  }

  /* --- 项目区 --- */
  .projects-section {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 0 24px 80px;
  }
  .projects-section h2 {
    text-align: center; font-size: 1.8rem;
    margin-bottom: 8px; color: var(--heading);
  }
  .projects-section .sub {
    text-align: center; color: var(--text-dim); font-size: 0.9rem;
    margin-bottom: 48px;
  }

  .grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 24px;
    perspective: 1200px;
  }
  .grid .card-wrap { flex: 0 1 340px; display: flex; }
  .grid .card-wrap .card { flex: 1; width: 100%; min-height: 320px; }
  /* 滚动入场动效 — 滚动驱动比例变换 */
  .card-wrap.reveal {
    --reveal: 0;
    opacity: var(--reveal);
    transform: translateY(calc(48px * (1 - var(--reveal)))) rotateX(calc(10deg * (1 - var(--reveal))));
  }
  @media (prefers-reduced-motion: reduce) {
    .card-wrap.reveal { opacity: 1; transform: none; }
  }

  /* --- 项目卡片 --- */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 32px;
    transition: border-color 0.25s, box-shadow 0.25s;
    transform: perspective(1200px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
    display: flex; flex-direction: column;
    backdrop-filter: blur(6px);
    position: relative; overflow: hidden;
  }
  .card:hover {
    border-color: var(--card-hover-border);
    box-shadow: 0 12px 40px var(--card-hover-shadow), 0 0 0 1px var(--card-hover-ring);
  }
  .card .glare {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    border-radius: 20px;
    background: radial-gradient(circle at var(--gx, 50%) var(--gy, 50%), rgba(255,255,255,0.14) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .card:hover .glare { opacity: 1; }
  .card.tilting { will-change: transform; }
  .card.tilting .glare { opacity: 1; }
  .card .icon {
    font-size: 2.5rem; margin-bottom: 16px;
    width: 60px; height: 60px; line-height: 60px; text-align: center;
    background: var(--card-icon-bg);
    border-radius: 16px;
  }
  .card h3 { font-size: 1.25rem; color: var(--card-title); margin-bottom: 8px; }
  .card .desc { color: var(--text-muted); font-size: 0.9rem; flex: 1; margin-bottom: 20px; }

  .card .tags {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
  }
  .card .tag {
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 50px;
    background: var(--tag-bg);
    color: var(--tag-text);
  }

  .card .actions { display: flex; gap: 12px; }
  .card .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 50px; font-size: 0.9rem;
    text-decoration: none; font-weight: 500;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: none;
  }
  .card .btn.primary {
    background: linear-gradient(90deg, #f093fb, #f5576c);
    color: #fff;
  }
  .card .btn.primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(245,87,108,0.3);
  }
  .card .btn.outline {
    background: transparent;
    color: var(--outline-btn-text);
    border: 1px solid var(--outline-btn-border);
  }
  .card .btn.outline:hover {
    border-color: var(--outline-btn-hover-border); color: var(--outline-btn-hover-text);
  }
  .card .btn svg { width: 16px; height: 16px; }

  /* --- 空态 --- */
  .card.placeholder {
    border-style: dashed;
    border-color: var(--dash-border);
    justify-content: center; align-items: center;
    min-height: 260px;
  }
  .card.placeholder .plus { font-size: 2.5rem; color: var(--placeholder-plus); margin-bottom: 8px; }
  .card.placeholder .hint { color: var(--placeholder-hint); font-size: 0.9rem; }

  /* --- Click Spark --- */
  .spark-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  .spark {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;

// 渲染初始内容

// ===== FLIP 语言切换 =====
$('langToggle').addEventListener('click', () => {
  // 缩放弹跳类（平移 + 缩放 + 弹跳）
  const bouncers = '.card, .badge, .cta, .card .btn, .card .tag';
  // 文字类（平移 + 淡入淡出）
  const staticEls = '.hero h1'; // 不切换语言的元素，只平移动画
  const texts = '.hero p, .projects-section h2, .sub, .card h3, .card .desc';

  const allSel = bouncers + ', ' + texts + ', ' + staticEls;
  const oldAll = Array.from(root.querySelectorAll(allSel));
  const firstRects = oldAll.map(el => el.getBoundingClientRect());

  // 切换
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', lang);
  const langBtn = $('langToggle');
  const oldWidth = langBtn.offsetWidth;
  langBtn.textContent = i18n[lang].langLabel;
  const newWidth = langBtn.offsetWidth;
  if (oldWidth > 0 && newWidth > 0 && Math.abs(oldWidth - newWidth) > 1) {
    langBtn.style.transition = 'none';
    langBtn.style.transform = `scaleX(${oldWidth / newWidth})`;
    langBtn.style.transformOrigin = 'right center';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        langBtn.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.3)';
        langBtn.style.transform = 'scaleX(1)';
        langBtn.addEventListener('transitionend', function cleanup() {
          langBtn.style.transition = '';
          langBtn.style.transform = '';
          langBtn.style.transformOrigin = '';
          langBtn.removeEventListener('transitionend', cleanup);
        });
      });
    });
  }
  $('footerText').innerHTML = i18n[lang].footer;
  root.innerHTML = buildContent(lang, true);
  if (window._refreshReveal) window._refreshReveal();

  // rAF 确保 DOM 布局完成
  requestAnimationFrame(() => {
    const newAll = Array.from(root.querySelectorAll(allSel));
    const count = Math.min(firstRects.length, newAll.length);

    for (let i = 0; i < count; i++) {
      const el = newAll[i];
      const fr = firstRects[i];
      const lr = el.getBoundingClientRect();
      const dx = fr.left - lr.left;
      const dy = fr.top - lr.top;
      const isLeaf = el.matches(bouncers);
      const isText = el.matches(texts);
      const sx = isLeaf && lr.width > 0 ? fr.width / lr.width : 1;
      const sy = isLeaf && lr.height > 0 ? fr.height / lr.height : 1;

      const textChanged = isText && oldAll[i] && oldAll[i].textContent !== el.textContent;
      const hasMove = Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3;
      const hasScale = isLeaf && (Math.abs(sx - 1) > 0.01 || Math.abs(sy - 1) > 0.01);

      // 没位移没缩放，但文字内容变了 → 只做淡入淡出
      if (!hasMove && !hasScale) {
        if (textChanged) { el.style.transition = 'none'; el.style.opacity = '0'; el._fadeOnly = true; }
        continue;
      }

      el.style.transition = 'none';
      el.style.transform = hasScale
        ? `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`
        : `translate(${dx}px, ${dy}px)`;
      if (hasScale) { el.style.transformOrigin = 'top left'; el._csx = sx; el._csy = sy; }
      // 关闭 backdrop-filter 避免动画卡顿
      if (isLeaf) { el._hadBf = true; el.style.backdropFilter = 'none'; el.style.willChange = 'transform'; }
      if (textChanged) el.style.opacity = '0';
    }

    // 卡片缩放时，给图标反向缩放抵消弹动
    for (let i = 0; i < count; i++) {
      const card = newAll[i];
      if (!card._csx) continue;
      const icon = card.querySelector('.icon');
      if (icon && !icon.style.transform) {
        icon.style.transition = 'none';
        icon.style.transform = `scale(${(1 / card._csx).toFixed(4)}, ${(1 / card._csy).toFixed(4)})`;
        icon.style.transformOrigin = 'top left';
        icon._inv = true;
      }
      delete card._csx; delete card._csy;
    }

    requestAnimationFrame(() => {
      let pending = 0;

      // 图标反向缩放 → 弹回正常大小
      const icons = root.querySelectorAll('.card .icon');
      for (const icon of icons) {
        if (!icon._inv) continue;
        delete icon._inv;
        icon.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.6)';
        icon.style.transform = 'scale(1, 1)';
        pending++;
        icon.addEventListener('transitionend', function cleanup() {
          pending--;
          icon.style.transition = '';
          icon.style.transform = '';
          icon.style.transformOrigin = '';
          if (pending <= 0) { icons.forEach(ic => { ic.style.transition = ''; ic.style.transform = ''; ic.style.transformOrigin = ''; }); }
          icon.removeEventListener('transitionend', cleanup);
        });
      }

      // 纯淡入淡出（文字变了但位置没变）
      for (let i = 0; i < count; i++) {
        const el = newAll[i];
        if (!el._fadeOnly) continue;
        delete el._fadeOnly;
        el.style.transition = 'opacity 0.4s ease';
        el.style.opacity = '1';
        pending++;
        el.addEventListener('transitionend', function cleanup() {
          pending--;
          el.style.transition = '';
          el.style.opacity = '';
          if (pending <= 0) { newAll.forEach(e => { e.style.transition = ''; e.style.opacity = ''; }); }
          el.removeEventListener('transitionend', cleanup);
        });
      }

      for (let i = 0; i < count; i++) {
        const el = newAll[i];
        if (el.style.transform === '') continue;
        const isLeaf = el.matches(bouncers);
        const isText = el.matches(texts);
        let props = 'transform 0.55s cubic-bezier(0.33, 0, 0.1, 1)';
        if (isLeaf) props = 'transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.6)';
        if (isText) props += ', opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1)';
        el.style.transition = props;
        el.style.transform = isLeaf ? 'translate(0, 0) scale(1, 1)' : 'translate(0, 0)';
        if (el.style.opacity === '0') el.style.opacity = '1';
        pending++;
        el.addEventListener('transitionend', function cleanup() {
          pending--;
          el.style.transition = '';
          el.style.transform = '';
          el.style.transformOrigin = '';
          el.style.opacity = '';
          el.style.backdropFilter = '';
          el.style.willChange = '';
          if (pending <= 0) { newAll.forEach(e => { e.style.transition = ''; e.style.transform = ''; e.style.transformOrigin = ''; e.style.opacity = ''; e.style.backdropFilter = ''; e.style.willChange = ''; }); }
          el.removeEventListener('transitionend', cleanup);
        });
      }
      // 安全兜底：800ms 后强制清理
      setTimeout(() => {
        newAll.forEach(el => {
          el.style.transition = '';
          el.style.transform = '';
          el.style.transformOrigin = '';
          el.style.opacity = '';
          el.style.backdropFilter = '';
          el.style.willChange = '';
        });
      }, 800);
    });
  });
});

// ===== 日夜模式 =====
const html = document.documentElement;
const toggle = $('themeToggle');

function applyTheme(mode) {
  html.classList.remove('light', 'dark');
  if (mode === 'light') html.classList.add('light');
  if (mode === 'dark') html.classList.add('dark');
}

const savedTheme = localStorage.getItem('theme');
if (savedTheme) applyTheme(savedTheme);

toggle.addEventListener('click', () => {
  const current = html.classList.contains('light') ? 'light'
    : html.classList.contains('dark') ? 'dark'
    : 'auto';
  if (current === 'auto') {
    const sysIsDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    localStorage.setItem('theme', sysIsDark ? 'light' : 'dark');
    applyTheme(sysIsDark ? 'light' : 'dark');
  } else if (current === 'dark') {
    localStorage.setItem('theme', 'light');
    applyTheme('light');
  } else {
    localStorage.setItem('theme', 'dark');
    applyTheme('dark');
  }
});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (!localStorage.getItem('theme')) {
    applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }
});

// ===== 滚动驱动卡片出场 =====
(function() {
  const cards = () => document.querySelectorAll('.card-wrap.reveal');
  let raf = null;

  function update() {
    raf = null;
    const vh = window.innerHeight;
    cards().forEach(card => {
      const rect = card.getBoundingClientRect();
      // 卡片底部进入屏幕底部 → ratio=0; 卡片顶部到 25vh → ratio=1
      const ratio = Math.max(0, Math.min(1, (vh - rect.top) / (vh * 0.75)));
      card.style.setProperty('--reveal', ratio.toFixed(3));
    });
  }

  window.addEventListener('scroll', () => {
    if (!raf) raf = requestAnimationFrame(update);
  }, { passive: true });
  // 初始触发 + resize 重算
  update();
  window.addEventListener('resize', update);
  // FLIP 语言切换后重新绑定
  window._refreshReveal = update;
})();

// ===== 鼠标光晕 + 视差 =====
const glow = document.getElementById('cursorGlow');
const starsEl = document.querySelector('.stars');
if (glow) {
  let pending = false;

// ===== 卡片 3D 倾斜 + 眩光（鼠标 + 触摸） =====
(function() {
  const root = document.querySelector('#contentRoot');
  if (!root) return;
  const maxAngle = 8;
  let cur = null, rect = null, raf = null, mx = 0, my = 0;

  function updateRect() { if (cur) rect = cur.getBoundingClientRect(); }
  window.addEventListener('scroll', updateRect, { passive: true });
  window.addEventListener('resize', updateRect);

  function begin(card, x, y) {
    if (card !== cur) {
      if (cur) reset(cur);
      if (!document.contains(card)) return;
      cur = card;
      card.classList.add('tilting');
      rect = card.getBoundingClientRect();
    }
  }

  function move(x, y) {
    if (!cur || !rect) return;
    mx = x; my = y;
    if (!raf) {
      raf = requestAnimationFrame(() => {
        raf = null;
        if (!cur || !rect) return;
        const rx = (my - rect.top) / rect.height;
        const ry = (mx - rect.left) / rect.width;
        cur.style.setProperty('--rx', ((rx - 0.5) * -maxAngle).toFixed(2) + 'deg');
        cur.style.setProperty('--ry', ((ry - 0.5) * maxAngle).toFixed(2) + 'deg');
        cur.style.setProperty('--gx', (ry * 100).toFixed(1) + '%');
        cur.style.setProperty('--gy', (rx * 100).toFixed(1) + '%');
      });
    }
  }

  function end(card) {
    if (card === cur) { reset(cur); cur = null; rect = null; }
  }

  function reset(card) {
    // 先去掉 tilting 让眩光 opacity 过渡消失
    card.classList.remove('tilting');
    const glare = card.querySelector('.glare');
    const done = () => {
      card.style.transition = 'transform 0.3s ease-out';
      card.style.removeProperty('--rx');
      card.style.removeProperty('--ry');
      card.style.removeProperty('--gx');
      card.style.removeProperty('--gy');
      card.addEventListener('transitionend', function clean() {
        card.style.transition = '';
        card.removeEventListener('transitionend', clean);
      }, { once: true });
    };
    if (glare) {
      glare.addEventListener('transitionend', () => { done(); glare = null; }, { once: true });
    } else {
      done();
    }
  }

  // --- 鼠标 ---
  root.addEventListener('mouseover', e => {
    begin(e.target.closest('.card'), e.clientX, e.clientY);
  });
  root.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  root.addEventListener('mouseout', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const related = e.relatedTarget;
    if (related && card.contains(related)) return;
    end(card);
  });

  // --- 触摸 ---
  root.addEventListener('touchstart', e => {
    const t = e.touches[0];
    begin(t.target.closest('.card'), t.clientX, t.clientY);
  }, { passive: true });
  root.addEventListener('touchmove', e => {
    const t = e.touches[0];
    move(t.clientX, t.clientY);
  }, { passive: true });
  root.addEventListener('touchend', e => {
    // 手指离开，找之前关联的卡片
    if (cur) { reset(cur); cur = null; rect = null; }
  });
})();

// ===== 点击火花 =====
(function() {
  const container = document.createElement('div');
  container.className = 'spark-container';
  document.body.appendChild(container);
  document.addEventListener('click', e => {
    const count = 6;
    for (let i = 0; i < count; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
      const dist = 18 + Math.random() * 22;
      spark.style.left = e.clientX + 'px';
      spark.style.top = e.clientY + 'px';
      spark.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      spark.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      spark.style.background = `hsl(${330 + Math.random() * 30}, 90%, ${55 + Math.random() * 20}%)`;
      container.appendChild(spark);
      spark.addEventListener('animationend', () => spark.remove());
    }
  });
})();

// ===== 陀螺仪视差 =====
(function() {
  if (typeof DeviceOrientationEvent === 'undefined') return;
  const stars = document.querySelector('.stars');
  const orbs = document.querySelectorAll('.orb');
  if (!stars) return;
  let bx = 0, by = 0; // baseline
  const maxShift = 28; // 最大位移 px

  function handle(e) {
    // gamma: 左右倾斜 (-90~90), beta: 前后倾斜 (-180~180)
    const g = e.gamma || 0;
    const b = e.beta || 0;
    const x = Math.max(-1, Math.min(1, g / 45));
    const y = Math.max(-1, Math.min(1, (b - 45) / 45));
    stars.style.transition = 'none';
    stars.style.transform = `translate(${x * maxShift}px, ${y * maxShift}px)`;
    orbs.forEach((orb, i) => {
      const d = (i + 1) * 0.6;
      orb.style.transition = 'none';
      orb.style.transform = `translate(${x * maxShift * d}px, ${y * maxShift * d}px)`;
    });
  }

  function reset() {
    stars.style.transition = 'transform 0.8s ease-out';
    stars.style.transform = '';
    orbs.forEach(orb => {
      orb.style.transition = 'transform 0.8s ease-out';
      orb.style.transform = '';
    });
  }

  // iOS 13+ 需要用户手势授权
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    // 创建一个授权提示按钮（首次触摸页面时弹出）
    const ask = () => {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', handle);
            window.addEventListener('deviceorientation', () => {
              // 3 秒后重置，避免持续偏移
              clearTimeout(window._gyroTimer);
              window._gyroTimer = setTimeout(reset, 3000);
            });
          }
        })
        .catch(() => {});
      document.removeEventListener('click', ask);
      document.removeEventListener('touchstart', ask);
    };
    document.addEventListener('click', ask, { once: true });
    document.addEventListener('touchstart', ask, { once: true });
  } else {
    // 安卓直接监听
    window.addEventListener('deviceorientation', handle);
    let idle;
    window.addEventListener('deviceorientation', () => {
      clearTimeout(idle);
      idle = setTimeout(reset, 3000);
    });
  }
})();
</script>

</body>
</html>
