name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * 1'   # 每周一 UTC 0:00
  workflow_dispatch:        # 允许手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          URL="https://naivizrdefonlelndzqr.supabase.co/rest/v1/scores?select=count&limit=1"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5haXZpenJkZWZvbmxlbG5kenFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTU4MjcsImV4cCI6MjA5NzY5MTgyN30.66G4T_7JDVjsw0RGRC_OwcYBgMwPk33c3sCrlmzrxvI"

          echo "Pinging Supabase..."
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "$URL")
          echo "HTTP $RESP"

          if [ "$RESP" = "200" ]; then
            echo "OK - project active"
          else
            echo "Warning: unexpected response $RESP"
          fi
