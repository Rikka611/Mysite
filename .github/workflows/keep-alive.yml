name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_KEY: ${{ secrets.SB_KEY }}
        run: |
          echo "Pinging Supabase..."
          RESP=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" "$SB_URL/rest/v1/scores?select=count&limit=1")
          echo "HTTP $RESP"
          [ "$RESP" = "200" ] && echo "OK" || echo "Warning: $RESP"
