name: Update Leaderboard

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Player name'
        required: true
      time:
        description: 'Score in seconds'
        required: true
      mode:
        description: 'Difficulty (easy/normal/hard)'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update scores.json
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('scores.json', 'utf-8'));
            const mode = '${{ inputs.mode }}';
            const scores = (data[mode] || []).slice();
            scores.push({ name: '${{ inputs.name }}', time: parseFloat('${{ inputs.time }}') });
            scores.sort((a, b) => a.time - b.time);
            data[mode] = scores.slice(0, 10);
            fs.writeFileSync('scores.json', JSON.stringify(data, null, 2) + '\n');
          "

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add scores.json
          git commit -m "Update leaderboard: ${{ inputs.name }} ${{ inputs.time }}s [${{ inputs.mode }}]" || true
          git push
