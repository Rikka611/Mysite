<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://naivizrdefonlelndzqr.supabase.co; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSide Olivia Lin 分享码</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<style>
#majorPick .tab, #catBar .tab{padding:4px 10px;font-size:0.72rem}
/* tag major highlight — overrides shared .tag */
.row .tag.major{background:rgba(56,189,248,0.15);color:var(--accent);font-weight:500}
</style>
  <script src="../shared/js/config.js?v=3.0.2"></script>
  <script src="../shared/js/sanitize.js?v=3.0.2"></script>

  <script src="../shared/js/charts.js?v=3.0.2"></script>
  <script src="../shared/js/paginate.js?v=3.0.2"></script>

</head>
<body>

<div class="stars"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<nav>
  <div class="inner">
    <button class="theme-btn" id="themeToggle" title="切换日夜模式">
      <span class="icon-sun">☀️</span><span class="icon-moon">🌙</span>
    </button>
    <button id="feedbackBtn" style="background:none;border:1px solid var(--nav-border);color:var(--nav-link);cursor:pointer;height:36px;border-radius:50px;padding:0 14px;font-size:0.8rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif;transition:all 0.3s">反馈</button>
  </div>
</nav>

<div class="hero">
  <h1><a href="https://store.steampowered.com/app/4532590/BSide_Olivia_Lin/" target="_blank">BSide Olivia Lin</a> 分享码</h1>
  <p>分享你生成的林离钢琴曲，发现热门乐谱<br><a href="https://docs.qq.com/sheet/DTHVhcGVuU1VvVFdQ?tab=BB08J2&scode=" target="_blank" style="color:var(--accent);text-decoration:underline;text-underline-offset:3px;font-size:0.9rem">📊 在线文档</a></p>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="hot">🔥 热门</button>
  <button class="tab" data-tab="category">📂 分类</button>
  <button class="tab" data-tab="new">🆕 最新</button>
  <button class="tab" data-tab="search">🔍 搜索</button>
</div>
<div id="catBar" style="display:none;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:24px;position:relative;z-index:1"></div>
<div class="search-bar hidden" id="searchBar">
  <input type="text" id="searchInput" placeholder="搜索曲名、作者、标签..." maxlength="50">
  <button onclick="doSearch()">搜索</button>
</div>

<div class="content">
  <div class="list" id="grid"></div>
  <div class="pagination" id="pager"></div>
  <div class="empty" id="empty">修bug中...</div>
</div>

<button id="replyFab" title="反馈回复" onclick="openReplies()" style="position:fixed;bottom:100px;right:32px;z-index:50;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,0.4);transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);animation:replyPulse 3s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif">📬<span id="replyBadge" style="position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:#ef4444;border:2px solid var(--bg-start);border-radius:50%;display:none"></span></button>
<button class="fab" id="fab" title="提交分享码">+</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 style="text-align:center;font-size:1.1rem;margin-bottom:20px;color:var(--heading)">提交分享码</h3>
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">六位分享码 <span style="color:#ef4444">*</span></label>
    <input type="text" id="inputCode" placeholder="ABC123" maxlength="6" style="text-transform:uppercase;width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">曲名 <span style="color:#ef4444">*</span></label>
    <input type="text" id="inputTitle" placeholder="给这首曲子起个名" maxlength="50" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">你的昵称</label>
    <input type="text" id="inputAuthor" placeholder="匿名" maxlength="30" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">简介 <span style="color:#ef4444">*</span>（MIDI来源）</label>
    <textarea id="inputDesc" placeholder="简单介绍一下曲子来源..." maxlength="200" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;resize:vertical;font-family:system-ui,-apple-system,sans-serif;min-height:60px"></textarea>
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">大分类 <span style="color:#ef4444">*</span></label>
    <div id="majorPick" style="display:flex;flex-wrap:wrap;gap:4px"></div>
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">小标签（空格分隔）</label>
    <input type="text" id="inputTags" placeholder="璃月 抒情 钢琴" maxlength="100" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <div class="error" id="modalError" style="color:#ef4444;font-size:0.8rem;text-align:center;margin-top:8px"></div>
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:center">
      <button onclick="closeModal()" style="padding:10px 28px;border-radius:50px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;font-size:0.9rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif">取消</button>
      <button onclick="doSubmit()" style="padding:10px 28px;border-radius:50px;border:none;background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif">提交</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="replyListOverlay" style="z-index:200;display:none;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);align-items:center;justify-content:center;position:fixed;inset:0" onclick="if(event.target===this)closeReplies()">
  <style>#replyModal{background:rgba(20,20,30,0.92)}html.light #replyModal{background:rgba(255,255,255,0.92)}@media(prefers-color-scheme:light){html:not(.dark):not(.light) #replyModal{background:rgba(255,255,255,0.92)}}</style>
<div class="modal" id="replyModal" style="border:1px solid var(--card-border);border-radius:20px;padding:24px;width:440px;max-width:90vw;max-height:70vh;overflow-y:auto;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:1.1rem;color:var(--heading)">📬 反馈回复</h3>
      <label style="font-size:0.75rem;color:var(--text-dim);cursor:pointer"><input type="checkbox" id="notifyToggle" onchange="toggleNotify()" checked> 新回复提醒</label>
    </div>
    <div id="replyList" style="display:flex;flex-direction:column;gap:10px"></div>
    <div id="replyEmpty" style="text-align:center;color:var(--text-dim);padding:24px 0;font-size:0.85rem">暂无回复</div>
    <div style="text-align:center;margin-top:16px"><button onclick="closeReplies()" style="padding:10px 32px;border-radius:50px;border:none;background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif">关闭</button></div>
  </div>
</div>
<div class="modal-overlay" id="feedbackOverlay">
  <div class="modal">
    <h3>反馈意见</h3>
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">意见或建议</label>
    <textarea id="feedbackContent" placeholder="说说你的想法..." maxlength="500" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;resize:vertical;font-family:system-ui,-apple-system,sans-serif;min-height:80px"></textarea>
    <div class="error" id="feedbackError"></div>
    <div class="btn-row">
      <button onclick="closeFeedback()" style="padding:10px 28px;border-radius:50px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;font-size:0.9rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif">取消</button>
      <button onclick="doFeedback()" style="padding:10px 28px;border-radius:50px;border:none;background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif">提交</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div style="position:fixed;bottom:8px;right:12px;font-size:0.6rem;color:var(--text-dim);z-index:99;opacity:0.4">v3.0.2</div>
<footer>本网站为粉丝自发整理的社区分享平台，与米哈游/HoYoverse及《BSide: Olivia Lin》项目无关。所有分享码由用户自行提交，本站仅提供索引服务。如有侵权内容，请联系QQ:3332984386删除。</footer>

<script>
// SB_URL/SB_KEY/sbApi provided by shared/js/ (config.js + api.js)

// Theme
const html=document.documentElement;
function applyTheme(mode){html.classList.remove('light','dark');if(mode==='light')html.classList.add('light');if(mode==='dark')html.classList.add('dark')}
const st=localStorage.getItem('theme');if(st)applyTheme(st);
document.getElementById('themeToggle').addEventListener('click',()=>{
  const cur=html.classList.contains('light')?'light':html.classList.contains('dark')?'dark':'auto';
  if(cur==='auto'){const sd=matchMedia('(prefers-color-scheme:dark)').matches;localStorage.setItem('theme',sd?'light':'dark');applyTheme(sd?'light':'dark')}
  else if(cur==='dark'){localStorage.setItem('theme','light');applyTheme('light')}
  else{localStorage.setItem('theme','dark');applyTheme('dark')}
});

// State
let tab='hot';
const liked=JSON.parse(localStorage.getItem('linli_liked')||'[]');
let page=1,pageSize=15,totalPages=1,activeCat="";
const CATS=[{id:"vocaloid",n:"术力口",k:["v家","术力口","vocaloid"]},{id:"anime",n:"番剧OP/ED",k:["动漫","番剧","oped","anime"]},{id:"genshin",n:"原神",k:["原神","genshin"]},{id:"honkai",n:"崩坏系列",k:["崩坏","崩铁","崩坏3","honkai"]},{id:"zzz",n:"绝区零",k:["绝区零","zzz"]},{id:"acg",n:"其他ACG音乐",k:["游戏","acg","舞萌","东方","ff14"]},{id:"other",n:"其他",k:[]}];
function classify(tags){var t=(tags||"").toLowerCase();for(var i=0;i<CATS.length;i++){var c=CATS[i];if(!c.k.length)continue;for(var j=0;j<c.k.length;j++){if(t.indexOf(c.k[j])>=0)return c.id}}return"other"}
function buildCatBar(){var h="";CATS.forEach(function(c){h+="<button class=\"tab cat-btn\" data-cat=\""+c.id+"\">"+c.n+"</button>"});document.getElementById("catBar").innerHTML=h;updateCatCounts()}
async function updateCatCounts(){try{var d=await fetchApproved();document.querySelectorAll("#catBar .cat-btn").forEach(function(b){var cid=b.dataset.cat;b.textContent=CATS.find(function(c){return c.id===cid}).n+" ("+d.filter(function(x){return classify(x.tags)===cid}).length+")"})}catch(e){}}
function pickCat(id){activeCat=id;document.querySelectorAll("#catBar .cat-btn").forEach(function(b){b.classList.toggle("active",b.dataset.cat===id)});renderCategories()}
async function renderCategories(){var g=document.getElementById("grid"),e=document.getElementById("empty");document.getElementById("pager").innerHTML="";g.innerHTML="";e.style.display="none";if(!activeCat)return;try{var d=await fetchApproved();var items=d.filter(function(x){return classify(x.tags)===activeCat});if(!items.length){e.style.display="block";e.textContent="暂无歌曲";return}items.forEach(function(item,i){var div=document.createElement("div");div.innerHTML=buildRow(item,i);g.appendChild(div.firstElementChild);trackView(item.id)})}catch(ex){e.style.display="block";e.textContent="加载失败"}}


function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

document.getElementById('catBar').addEventListener('click',function(e){var b=e.target.closest('.cat-btn');if(!b)return;pickCat(b.dataset.cat)});
document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');if(!btn)return;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');tab=btn.dataset.tab;page=1;
  document.getElementById('searchBar').classList.toggle('hidden',tab!=='search');
document.getElementById('catBar').style.display=tab==='category'?'flex':'none';
if(tab==='category'){activeCat='';buildCatBar();renderCategories();return}
render();
});
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
let _searchTimer=null;
document.getElementById('searchInput').addEventListener('input',function(){clearTimeout(_searchTimer);_searchTimer=setTimeout(doSearch,400)});
function doSearch(){page=1;render()}

async function fetchApproved(){
  let q='status=eq.approved';
  q+=tab==='hot'?'&order=likes.desc&limit=200':'&order=created_at.desc&limit=200';
  return sbApi(`linli_codes?select=*&${q}`);
}
async function searchCodes(q){return sbApi(`linli_codes?select=*&status=eq.approved&or=(title.ilike.*${q}*,description.ilike.*${q}*,author.ilike.*${q}*,tags.ilike.*${q}*)&order=likes.desc&limit=200`)}

async function trackView(id){
  let f=sessionStorage.getItem('sid');if(!f){f=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem('sid',f)}
  try{await sbApi('rpc/track',{method:'POST',body:JSON.stringify({fp_in:f,item_id_in:id,action_in:'view'})})}catch(e){}
}

async function doLike(id,e){
  let f=sessionStorage.getItem('sid');if(!f){f=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem('sid',f)}
  try{await sbApi('rpc/track',{method:'POST',body:JSON.stringify({fp_in:f,item_id_in:id,action_in:'like'})})}catch(e){}
  liked.push(id);localStorage.setItem('linli_liked',JSON.stringify(liked));
  render(true);
  if(e){const rect=e.target.getBoundingClientRect();for(let i=0;i<8;i++){const h=document.createElement('div');h.className='heart-burst';h.textContent='❤';h.style.left=rect.left+rect.width/2+'px';h.style.top=rect.top+rect.height/2+'px';const a=Math.PI*2*i/8;h.style.setProperty('--hx',Math.cos(a)*40+'px');h.style.setProperty('--hy',Math.sin(a)*40+'px');h.style.color=`hsl(${350+Math.random()*20},90%,${55+Math.random()*20}%)`;document.body.appendChild(h);h.addEventListener('animationend',()=>h.remove())}}
}

async function reportCode(id,e){
  if(e){e.preventDefault();e.stopPropagation()}
  try{const d=await sbApi('linli_codes?select=reports&id=eq.'+id);const n=(d[0]?.reports||0)+1;await sbApi('linli_codes?id=eq.'+id,{method:'PATCH',body:JSON.stringify({reports:n})});showToast('已反馈')}catch(_){showToast('反馈失败')}
}
function copyCode(code,e){
  navigator.clipboard.writeText(code).then(()=>{
    showToast('已复制: '+code);
    // Copy ripple
    if(e){const r=document.createElement('div');r.className='copy-ripple';r.textContent='📋 已复制';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';document.body.appendChild(r);r.addEventListener('animationend',()=>r.remove())}
  }).catch(()=>showToast('复制失败'));
}

var _pickedMajor='';document.getElementById('fab').addEventListener('click',function(){document.getElementById('modalOverlay').classList.add('show');document.getElementById('modalError').textContent='';_pickedMajor='';document.getElementById('majorPick').innerHTML=CATS.map(function(c){return '<span class="tab" style="cursor:pointer" data-cat="'+c.id+'">'+c.n+'</span>'}).join('')});
document.getElementById('feedbackBtn').addEventListener('click',()=>{document.getElementById('feedbackOverlay').classList.add('show');document.getElementById('feedbackError').textContent=''});
document.getElementById('feedbackOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeFeedback()});
function closeFeedback(){document.getElementById('feedbackOverlay').classList.remove('show');document.getElementById('feedbackContent').value=''}
async function doFeedback(){
  const content=document.getElementById('feedbackContent').value.trim();
  const err=document.getElementById('feedbackError');
  if(!content){err.textContent='请输入意见内容';return}
  let f=sessionStorage.getItem('sid');if(!f){f=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem('sid',f)}
  try{await sbApi('feedbacks',{method:'POST',body:JSON.stringify({content,fp:f})});closeFeedback();showToast('感谢反馈！')}catch(e){err.textContent='提交失败，请重试'}
}
document.getElementById('majorPick').addEventListener('click',function(e){var s=e.target.closest('.tab');if(!s)return;_pickedMajor=s.dataset.cat;document.querySelectorAll('#majorPick .tab').forEach(function(b){b.classList.toggle('active',b.dataset.cat===_pickedMajor)})});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');['inputCode','inputTitle','inputAuthor','inputDesc','inputTags'].forEach(id=>document.getElementById(id).value='')}

async function doSubmit(){
  const code=document.getElementById('inputCode').value.trim().toUpperCase();
  const title=document.getElementById('inputTitle').value.trim();
  const author=document.getElementById('inputAuthor').value.trim()||'匿名';
  const desc=document.getElementById('inputDesc').value.trim();
  const tags=document.getElementById('inputTags').value.trim();
  const errEl=document.getElementById('modalError');
  if(!/^[A-Za-z0-9]{6}$/.test(code)){errEl.textContent='请输入六位分享码（字母或数字）';return}
  if(!title||title.length>50){errEl.textContent='曲名不能为空且不超过50字';return}
  if(!desc){errEl.textContent='请填写简介（MIDI来源）';return}
  if(!_pickedMajor){errEl.textContent='请选择一个大分类';return}
  var fullTags=(_pickedMajor+' '+tags).trim();
  try{
    await sbApi('linli_codes',{method:'POST',body:JSON.stringify({code,title,description:desc,author,tags:fullTags,status:'pending',views:0,likes:0,reports:0})});
    closeModal();showToast('提交成功，审核后显示');render();
  }catch(e){let msg=e.message;try{msg=JSON.parse(e.message).message||msg}catch(_){}errEl.textContent=msg}
}

function esc(s){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function buildRow(item,idx){
  const tagList=item.tags?item.tags.split(/[\s,]+/).filter(Boolean).slice(0,3):[];
  const rank=tab==='hot'?idx+1:null;
  const isLiked=liked.includes(item.id);
  const desc=item.description||(item.author&&item.author!=='匿名'?item.author:'');
  return `<div class="row" style="animation-delay:${idx*0.04}s">
    <div class="glare"></div>
    <div class="rank">${rank!==null?'#'+rank:''}</div>
    <div class="code" onclick="copyCode('${esc(item.code)}',event)" title="点击复制">${esc(item.code)}</div>
    <div class="info">
      <div class="title">${esc(item.title)}</div>
      <div class="sub">${desc?`<span>${esc(desc)}</span>`:''}${tagList.length?tagList.map(t=>`<span class="tag">${esc(t)}</span>`).join(''):''}</div>
    </div>
    <div class="stats">👁 ${item.views||0} ❤ ${item.likes||0}</div>
    <div class="actions">
      <button class="btn btn-copy" onclick="copyCode('${esc(item.code)}',event)">📋</button>
      <button class="btn btn-like${isLiked?' liked':''}" onclick="doLike(${item.id},event)">${isLiked?'❤':'🤍'}</button>
      <button class="btn btn-like" onclick="reportCode(${item.id},event)" title="分享码无效">⚠</button>
    </div></div>`;
}

function renderPager(){
  const p=document.getElementById('pager');
  if(totalPages<=1){p.innerHTML='';return}
  let h=`<button onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
  h+=`<span class="info">${page} / ${totalPages}</span>`;
  h+=`<button onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>›</button>`;
  p.innerHTML=h;
}
function goPage(n){if(n<1||n>totalPages)return;page=n;render();window.scrollTo({top:0,behavior:'smooth'})}

async function render(skipAnim){
  const grid=document.getElementById('grid'),empty=document.getElementById('empty');
  if(skipAnim)grid.classList.add('no-anim');
  grid.innerHTML='';empty.style.display='none';
  for(let i=0;i<5;i++){const s=document.createElement('div');s.className='skeleton';s.style.animationDelay=i*0.1+'s';grid.appendChild(s)}

  try{
    let data;
    if(tab==='search'){const q=document.getElementById('searchInput').value.trim();if(!q){empty.style.display='block';empty.textContent='输入关键词搜索';grid.innerHTML='';return};data=await searchCodes(encodeURIComponent(q))}
    else data=await fetchApproved();

    grid.innerHTML='';
    if(!data.length){empty.style.display='block';empty.textContent=tab==='search'?'没有找到匹配的分享码':'暂无分享码，点右下角 + 提交第一个吧！';document.getElementById('pager').innerHTML='';return}
    totalPages=Math.ceil(data.length/pageSize);
    if(page>totalPages)page=totalPages;
    const slice=data.slice((page-1)*pageSize,page*pageSize);
    slice.forEach((item,i)=>{const d=document.createElement('div');d.innerHTML=buildRow(item,(page-1)*pageSize+i);grid.appendChild(d.firstElementChild);trackView(item.id)});
    renderPager();
  }catch(e){grid.innerHTML='';empty.style.display='block';empty.textContent='加载失败，请刷新重试'}
  if(skipAnim)setTimeout(()=>grid.classList.remove('no-anim'),100)
}

// Cursor glow + parallax (enhanced)
const glow=document.getElementById('cursorGlow');
const starsEl=document.querySelector('.stars');
if(glow){let pending=false;document.addEventListener('mousemove',e=>{if(pending)return;pending=true;requestAnimationFrame(()=>{pending=false;glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';glow.style.opacity='1';if(starsEl){const x=(e.clientX/innerWidth-0.5)*20,y=(e.clientY/innerHeight-0.5)*20;starsEl.style.transform=`translate(${-x}px,${-y}px)`}})})}

// Card 3D tilt (more responsive)
(function(){const maxAngle=10;let cur=null,rect=null,raf=null;window.addEventListener('scroll',()=>{if(cur)rect=cur.getBoundingClientRect()},{passive:true});window.addEventListener('resize',()=>{if(cur)rect=cur.getBoundingClientRect()});function begin(card,x,y){if(card!==cur){if(cur)reset(cur);if(!document.contains(card))return;cur=card;card.classList.add('tilting');rect=card.getBoundingClientRect()}}function move(x,y){if(!cur||!rect)return;if(!raf){raf=requestAnimationFrame(()=>{raf=null;if(!cur||!rect)return;const rx=(y-rect.top)/rect.height,ry=(x-rect.left)/rect.width;cur.style.setProperty('--rx',((rx-0.5)*-maxAngle).toFixed(2)+'deg');cur.style.setProperty('--ry',((ry-0.5)*maxAngle).toFixed(2)+'deg');cur.style.setProperty('--gx',(ry*100).toFixed(1)+'%');cur.style.setProperty('--gy',(rx*100).toFixed(1)+'%')})}}function end(card){if(card===cur){reset(cur);cur=null;rect=null}}function reset(card){card.classList.remove('tilting');const glare=card.querySelector('.glare');const done=()=>{card.style.transition='transform 0.4s ease-out';card.style.removeProperty('--rx');card.style.removeProperty('--ry');card.style.removeProperty('--gx');card.style.removeProperty('--gy');card.addEventListener('transitionend',function c(){card.style.transition='';card.removeEventListener('transitionend',c)},{once:true})};if(glare)glare.addEventListener('transitionend',()=>{done()},{once:true});else done()}document.addEventListener('mouseover',e=>{begin(e.target.closest('.row'),e.clientX,e.clientY)});document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));document.addEventListener('mouseout',e=>{const row=e.target.closest('.row');if(!row)return;if(e.relatedTarget&&row.contains(e.relatedTarget))return;end(row)});document.addEventListener('touchstart',e=>{const t=e.touches[0];begin(t.target.closest('.row'),t.clientX,t.clientY)},{passive:true});document.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY)},{passive:true});document.addEventListener('touchend',()=>{if(cur){reset(cur);cur=null;rect=null}})})();

// Click spark (more particles)
(function(){const c=document.createElement('div');c.className='spark-container';document.body.appendChild(c);document.addEventListener('click',e=>{for(let i=0;i<10;i++){const s=document.createElement('div');s.className='spark';const a=Math.PI*2*i/10+(Math.random()-0.5)*0.5;s.style.left=e.clientX+'px';s.style.top=e.clientY+'px';s.style.setProperty('--sx',Math.cos(a)*(20+Math.random()*30)+'px');s.style.setProperty('--sy',Math.sin(a)*(20+Math.random()*30)+'px');s.style.background=`hsl(${200+Math.random()*60},90%,${55+Math.random()*20}%)`;c.appendChild(s);s.addEventListener('animationend',()=>s.remove())}})})();

(async function(){
  if(sessionStorage.getItem('pv_counted'))return;
  sessionStorage.setItem('pv_counted','1');
  try{await sbApi('page_visits',{method:'POST',body:JSON.stringify({page:'linli'})})}catch(e){}
})();

// ===== Feedback reply system =====
let replyData=[],notifyEnabled=localStorage.getItem('reply_notify')!=='false';
document.getElementById('notifyToggle').checked=notifyEnabled;
function toggleNotify(){notifyEnabled=!notifyEnabled;localStorage.setItem('reply_notify',notifyEnabled);if(!notifyEnabled)document.getElementById('replyBadge').style.display='none'}

async function checkReplies(){
  let f=window.getVisitorToken?window.getVisitorToken():sessionStorage.getItem('sid');if(!f||!notifyEnabled)return;
  try{replyData=await sbApi('feedbacks?select=id,content,reply,reply_read,created_at,replied_at,fp&reply=neq.&order=created_at.desc');document.getElementById('replyBadge').style.display='none';document.getElementById('replyFab').style.display='flex'}catch(e){}
}
async function openReplies(){
  document.getElementById('replyListOverlay').style.display='flex';
  const list=document.getElementById('replyList'),empty=document.getElementById('replyEmpty');
  if(!replyData.length){empty.style.display='block';list.innerHTML='';return}
  empty.style.display='none';
  list.innerHTML=replyData.map(r=>'<div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:14px"><div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:6px;word-break:break-word;white-space:pre-wrap">💬 '+(r.fp?'<span style="font-size:0.65rem;color:var(--text-dim)">'+new Date(r.created_at).toLocaleString('zh-CN')+'</span><br>':'')+escapeHtml(r.content)+'</div><div style="font-size:0.85rem;color:var(--accent);background:rgba(56,189,248,0.08);padding:8px 12px;border-radius:8px;word-break:break-word;white-space:pre-wrap">回复'+(r.fp&&r.replied_at?' <span style="font-size:0.65rem;opacity:0.7">'+new Date(r.replied_at).toLocaleString('zh-CN')+'</span>':'')+'：'+escapeHtml(r.reply)+'</div></div>').join('');
  // Mark all as read
  replyData.forEach(r=>{if(!r.reply_read){sbApi('feedbacks?id=eq.'+r.id,{method:'PATCH',body:JSON.stringify({reply_read:true})});r.reply_read=true}});
  document.getElementById('replyBadge').style.display='none'
}
function closeReplies(){document.getElementById('replyListOverlay').style.display='none'}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML.replace(/\n/g,'<br>')}
checkReplies();

render();

// ===== Random meteors =====
(function(){
  if(document.documentElement.classList.contains('light'))return;
  let timer;
  function spawn(){
    const m=document.createElement('div');m.className='meteor';
    const isMobile=innerWidth<768;
    const fromRight=Math.random()>0.5;
    const sx=fromRight?innerWidth+60:-80;
    const sy=Math.random()*innerHeight*0.4;
    const ex=fromRight?-80:innerWidth+60;
    const ey=sy+(isMobile?150:250)+Math.random()*(isMobile?250:400);
    const dx=ex-sx,dy=ey-sy;
    const angle=Math.atan2(dy,dx)*180/Math.PI;
    const dur=0.7+Math.random()*0.5;
    m.style.setProperty('--sx',sx+'px');m.style.setProperty('--sy',sy+'px');
    m.style.setProperty('--ex',ex+'px');m.style.setProperty('--ey',ey+'px');
    m.style.setProperty('--a',angle+'deg');m.style.setProperty('--d',dur+'s');
    document.body.appendChild(m);
    m.addEventListener('animationend',()=>m.remove());
    timer=setTimeout(spawn,15000+Math.random()*105000);
  }
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden)clearTimeout(timer);
    else timer=setTimeout(spawn,5000+Math.random()*15000);
  });
  timer=setTimeout(spawn,8000+Math.random()*30000);
})();
</script>
