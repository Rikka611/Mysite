.tab-group{display:flex;gap:inherit;margin:0 auto}
.tabs{position:relative;max-width:min(96vw,1400px);margin-left:auto;margin-right:auto;padding:0 clamp(8px,1.5vw,24px)}
.view-switch{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;flex-shrink:0}
.view-switch .sw-label{font-size:0.7rem;color:var(--text-dim)}
.view-switch .sw-track{width:38px;height:22px;border-radius:11px;background:var(--card-border);position:relative;transition:background 0.3s}
.view-switch.card .sw-track{background:rgba(56,189,248,0.4)}
.view-switch .sw-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);transition:transform 0.3s cubic-bezier(0.25,0.8,0.25,1.3)}

.list:not(.card-mode) .desc-text:empty{display:none}
.meta-row{display:flex;align-items:center;gap:8px}
.content{max-width:min(96vw,1400px)}
@media(min-width:700px){.list:not(.card-mode){display:grid;grid-template-columns:1fr 1fr;gap:clamp(6px,0.8vw,10px)}}

.list.card-mode .row{flex-direction:column;align-items:center;padding:clamp(12px,1.4vw,18px) clamp(10px,1vw,16px) clamp(8px,1vw,14px);gap:0;border-radius:clamp(10px,1.2vw,16px);animation:cardIn 0.35s cubic-bezier(0.25,0.8,0.25,1.2) both;background:linear-gradient(180deg,var(--card-bg) 0%,rgba(56,189,248,0.02) 100%)}
.list.card-mode .row:hover{transform:translateY(-3px)!important;border-color:rgba(56,189,248,0.45);box-shadow:0 8px 30px rgba(0,0,0,0.35),0 0 0 1px rgba(56,189,248,0.2)}
.list.card-mode .row .rank{font-size:0.6rem;width:auto;text-align:center;margin-bottom:2px;opacity:0.5}.list.card-mode .row:nth-child(1) .rank{color:#fbbf24;opacity:1}.list.card-mode .row:nth-child(2) .rank{color:#94a3b8;opacity:0.9}.list.card-mode .row:nth-child(3) .rank{color:#d97706;opacity:0.85}.list.card-mode .row .rank:empty{display:none}
.list.card-mode .row .info{text-align:center;flex:0;margin-bottom:4px}.list.card-mode .row .sub{justify-content:center;flex-wrap:wrap;gap:4px}.list.card-mode .row .tag{padding:1px 6px;border-radius:50px;font-size:0.6rem}
.list.card-mode .row .title{font-size:clamp(0.78rem,0.95vw,1rem);font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em;color:var(--heading)}
.list.card-mode .desc-text{display:block;min-height:1.2em;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:normal;max-width:none}
.list.card-mode .meta-row{display:flex;flex-direction:column;align-items:center;width:100%;margin-top:auto;margin-bottom:6px}
.list.card-mode .meta-row .code{font-size:0.85rem;letter-spacing:3px;font-weight:700;text-align:center;-webkit-text-fill-color:var(--accent);background:none;border:none;padding:0;width:100%}
.list.card-mode .meta-row .stats{font-size:0.6rem;text-align:center;width:auto;margin-top:1px}
.list.card-mode .row .actions{flex-wrap:wrap;justify-content:center;gap:4px;width:100%;margin-top:0!important}
.list.card-mode .row .btn-copy{flex:0 0 100%;padding:5px 0;font-size:0.7rem;font-weight:600;border-radius:8px;max-width:140px;margin:0 auto 2px}
.list.card-mode .row .btn-like{padding:2px 10px;font-size:0.55rem;border-radius:50px;min-width:auto;background:transparent;border:1px solid var(--card-border);flex:0 0 auto}

<script>
// ====== 复用原版 linli JS 核心逻辑 ======
const html=document.documentElement;
function applyTheme(mode){html.classList.remove('light','dark');if(mode==='light')html.classList.add('light');if(mode==='dark')html.classList.add('dark')}
const st=localStorage.getItem('theme');if(st)applyTheme(st);
document.getElementById('themeToggle').addEventListener('click',()=>{const cur=html.classList.contains('light')?'light':html.classList.contains('dark')?'dark':'auto';if(cur==='auto'){const sd=matchMedia('(prefers-color-scheme:dark)').matches;localStorage.setItem('theme',sd?'light':'dark');applyTheme(sd?'light':'dark')}else if(cur==='dark'){localStorage.setItem('theme','light');applyTheme('light')}else{localStorage.setItem('theme','dark');applyTheme('dark')}});

function classify(tags){var t=(tags||"").toLowerCase(),words=t.split(/[\s,]+/);for(var i=0;i<CATS.length;i++){var c=CATS[i];if(!c.k.length)continue;for(var j=0;j<c.k.length;j++){var kw=c.k[j].toLowerCase();for(var w=0;w<words.length;w++){if(words[w]===kw)return c.id}if(t.indexOf(kw)>=0&&kw.length>4)return c.id}}return"other"}

async function doSubmit(){var code=document.getElementById('inputCode').value.trim().toUpperCase(),title=document.getElementById('inputTitle').value.trim(),author=document.getElementById('inputAuthor').value.trim()||'匿名',desc=document.getElementById('inputDesc').value.trim(),tags=document.getElementById('inputTags').value.trim(),errEl=document.getElementById('modalError');if(!/^[A-Za-z0-9]{6}$/.test(code)){errEl.textContent='请输入六位分享码（字母或数字）';return}if(!title||title.length>50){errEl.textContent='曲名不能为空且不超过50字';return}if(!desc){errEl.textContent='请填写简介（MIDI来源）';return}if(!_pickedMajor){errEl.textContent='请选择一个大分类';return}var fullTags=(_pickedMajor+' '+tags).trim();try{await sbApi('linli_codes',{method:'POST',body:JSON.stringify({code:code,title:title,description:desc,author:author,tags:fullTags,status:'pending',views:0,likes:0,reports:0})});closeModal();showToast('提交成功，审核后显示');render()}catch(e){var msg=e.message;try{msg=JSON.parse(e.message).message||msg}catch(_){}errEl.textContent=msg}}

function buildRow(item,idx){var tagList=item.tags?item.tags.split(/[\s,]+/).filter(Boolean).slice(0,3):[],rank=tab==='hot'?idx+1:null,isLiked=liked.includes(item.id),desc=item.description||(item.author&&item.author!=='匿名'?item.author:'');return '<div class="row" style="animation-delay:'+(idx*0.04)+'s" role="button" tabindex="0" aria-label="歌曲 '+esc(item.title)+'，分享码 '+esc(item.code)+'"><div class="glare"></div><div class="rank">'+(rank!==null?'#'+rank:'')+'</div><div class="info"><div class="title">'+esc(item.title)+'</div><div class="desc-text">'+(desc?esc(desc):'')+'</div><div class="sub">'+(tagList.length?tagList.map(function(t){return '<span class="tag">'+esc(t)+'</span>'}).join(''):'')+'</div></div><div class="meta-row"><div class="code" onclick="copyCode(\''+esc(item.code)+'\',event)" title="点击复制">'+esc(item.code)+'</div><div class="stats">👁 '+(item.views||0)+' ❤ '+(item.likes||0)+'</div></div><div class="actions"><button class="btn btn-copy" onclick="copyCode(\''+esc(item.code)+'\',event)">📋 复制</button><button class="btn btn-like'+(isLiked?' liked':'')+'" onclick="doLike('+item.id+',event)">'+(isLiked?'❤':'🤍')+'</button><button class="btn btn-like" onclick="reportCode('+item.id+',event)" title="分享码无效">⚠</button></div></div>'}
function renderPager(){var p=document.getElementById('pager');if(totalPages<=1){p.innerHTML='';return}p.innerHTML='<button onclick="goPage('+(page-1)+')" '+(page<=1?'disabled':'')+'>‹</button><span class="pg-info"><input id="jumpPage" type="number" min="1" max="'+totalPages+'" value="'+page+'" onkeydown="if(event.key===\'Enter\')goPage(parseInt(this.value))" onfocus="this.select()"> / '+totalPages+'</span><button onclick="goPage('+(page+1)+')" '+(page>=totalPages?'disabled':'')+'>›</button>'}
function goPage(n){if(isNaN(n)||n<1||n>totalPages)return;page=n;render();window.scrollTo({top:0,behavior:'smooth'})}
async function render(skipAnim){var grid=document.getElementById('grid'),empty=document.getElementById('empty');if(skipAnim)grid.classList.add('no-anim');grid.innerHTML='';empty.style.display='none';for(var i=0;i<5;i++){var s=document.createElement('div');s.className='skeleton';s.style.animationDelay=i*0.1+'s';grid.appendChild(s)}try{var data;if(tab==='search'){var q=document.getElementById('searchInput').value.trim();if(!q){empty.style.display='block';empty.textContent='输入关键词搜索';grid.innerHTML='';return}data=await searchCodes(encodeURIComponent(q))}else data=await fetchApproved();grid.innerHTML='';if(!data.length){empty.style.display='block';empty.textContent=tab==='search'?'没有找到匹配的分享码':'暂无分享码，点右下角 + 提交第一个吧！';document.getElementById('pager').innerHTML='';return}totalPages=Math.ceil(data.length/pageSize);if(page>totalPages)page=totalPages;var slice=data.slice((page-1)*pageSize,page*pageSize);slice.forEach(function(item,i){var d=document.createElement('div');d.innerHTML=buildRow(item,(page-1)*pageSize+i);grid.appendChild(d.firstElementChild);trackView(item.id)});renderPager()}catch(e){grid.innerHTML='';empty.style.display='block';empty.textContent='加载失败，请刷新重试'}if(skipAnim)setTimeout(function(){grid.classList.remove('no-anim')},100)}

if(glow&&!_reduceMotion){var _pending=false;document.addEventListener('mousemove',function(e){if(_pending)return;_pending=true;requestAnimationFrame(function(){_pending=false;glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';glow.style.opacity='1';if(starsEl){var x=(e.clientX/innerWidth-0.5)*20,y=(e.clientY/innerHeight-0.5)*20;starsEl.style.transform='translate('+(-x)+'px,'+(-y)+'px)'}})})}
(function(){if(_reduceMotion)return;var maxAngle=10,cur=null,rect=null,raf=null;function begin(card,x,y){if(card!==cur){if(cur)reset(cur);if(!document.contains(card))return;cur=card;card.classList.add('tilting');rect=card.getBoundingClientRect()}}function move(x,y){if(!cur||!rect)return;if(!raf){raf=requestAnimationFrame(function(){raf=null;if(!cur||!rect)return;var rx=(y-rect.top)/rect.height,ry=(x-rect.left)/rect.width;cur.style.setProperty('--rx',((rx-0.5)*-maxAngle).toFixed(2)+'deg');cur.style.setProperty('--ry',((ry-0.5)*maxAngle).toFixed(2)+'deg');cur.style.setProperty('--gx',(ry*100).toFixed(1)+'%');cur.style.setProperty('--gy',(rx*100).toFixed(1)+'%')})}}function end(card){if(card===cur){reset(cur);cur=null;rect=null}}function reset(card){card.classList.remove('tilting');var glare=card.querySelector('.glare'),done=function(){card.style.transition='transform 0.4s ease-out';card.style.removeProperty('--rx');card.style.removeProperty('--ry');card.style.removeProperty('--gx');card.style.removeProperty('--gy');card.addEventListener('transitionend',function c(){card.style.transition='';card.removeEventListener('transitionend',c)},{once:true})};if(glare)glare.addEventListener('transitionend',function(){done()},{once:true});else done()}document.addEventListener('mouseover',function(e){begin(e.target.closest('.row'),e.clientX,e.clientY)});document.addEventListener('mousemove',function(e){move(e.clientX,e.clientY)});document.addEventListener('mouseout',function(e){var row=e.target.closest('.row');if(!row)return;if(e.relatedTarget&&row.contains(e.relatedTarget))return;end(row)});document.addEventListener('touchstart',function(e){var t=e.touches[0];begin(t.target.closest('.row'),t.clientX,t.clientY)},{passive:true});document.addEventListener('touchmove',function(e){var t=e.touches[0];move(t.clientX,t.clientY)},{passive:true});document.addEventListener('touchend',function(){if(cur){reset(cur);cur=null;rect=null}})})();

var threads=[],discussLiked=JSON.parse(localStorage.getItem('linli_discuss_liked')||'[]'),discussTab=sessionStorage.getItem('linli_discuss_tab')||'hot';
function switchDiscussTab(t){discussTab=t;sessionStorage.setItem('linli_discuss_tab',t);document.querySelectorAll('#discussTabHot,#discussTabNew').forEach(function(b){b.classList.toggle('active',b.id==='discussTabHot'&&t==='hot'||b.id==='discussTabNew'&&t==='new')});renderThreads()}
function hotScore(t){var now=Date.now(),postHours=(now-new Date(t.created_at).getTime())/3600000,latestReply=0;if(t._replies&&t._replies.length){t._replies.forEach(function(r){var rt=new Date(r.created_at).getTime();if(rt>latestReply)latestReply=rt})}var replyHours=(now-latestReply)/3600000,likeScore=(t.likes||0)/Math.pow(postHours+2,2),replyScore=(t._replies?t._replies.length:0)/Math.pow(replyHours+1,1.2);return likeScore+replyScore+Math.random()*2}
function togglePostForm(){var f=document.getElementById('postForm'),b=document.getElementById('togglePostBtn');f.classList.toggle('collapsed');b.textContent=f.classList.contains('collapsed')?'＋ 发起新讨论':'－ 收起';if(!f.classList.contains('collapsed'))document.getElementById('newContent').focus()}
function fmtTime(ts){if(!ts)return'';var d=new Date(ts),now=new Date(),diffM=Math.floor((now-d)/60000);if(diffM<10)return diffM<=0?'刚刚':diffM+'分钟前';if(d.toDateString()===now.toDateString())return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')}

async function loadThreads(){try{var data=await sbApi('discussions?select=*&parent_id=is.null&order=created_at.desc&limit=100'),replies=await sbApi('discussions?select=*&parent_id=not.is.null&order=created_at.asc&limit=500');document.getElementById('discussTabHot').classList.toggle('active',discussTab==='hot');document.getElementById('discussTabNew').classList.toggle('active',discussTab==='new');threads=data.map(function(t){t._replies=replies.filter(function(r){return r.parent_id===t.id});return t});renderThreads()}catch(e){document.getElementById('discussEmpty').textContent='加载失败'}}
function renderThreads(){
  var list=document.getElementById('threadList'),empty=document.getElementById('discussEmpty');
  threads.sort(function(a,b){if(b.pinned!==a.pinned)return(b.pinned?1:0)-(a.pinned?1:0);if(discussTab==='new')return new Date(b.created_at)-new Date(a.created_at);return hotScore(b)-hotScore(a)});
  if(!threads.length){list.innerHTML='';empty.style.display='block';empty.textContent='暂无讨论，来发第一个帖子吧';return}empty.style.display='none';
  list.innerHTML=threads.map(function(t){
    var hasAdminReply=t._replies.some(function(r){return r.is_admin}),nameHtml=t.is_admin?'<span style="color:#f59e0b;font-weight:700">Admin</span>':'<span class="th-name">'+(t.name||'匿名用户')+'</span>',pinBadge=t.pinned?' 📌':'';
    return '<div class="thread'+(t.pinned?' pinned':'')+'" id="th-'+t.id+'">'+
      '<div>'+pinBadge+nameHtml+'<span class="th-time">'+fmtTime(t.created_at)+'</span></div><div class="th-content">'+esc(t.content)+'</div>'+
      '<div class="th-actions"><button class="th-btn" onclick="doDiscussLike('+t.id+')">'+(discussLiked.indexOf(t.id)>=0?'❤️':'🤍')+' '+(t.likes||0)+'</button><button class="th-btn" onclick="reportDiscuss('+t.id+')">⚠</button><button class="th-btn" onclick="toggleReplies('+t.id+')">💬 '+(t._replies.length?t._replies.length+' 回复':'回复')+'</button></div>'+
      '<div class="replies'+(hasAdminReply?'':' collapsed')+'" id="replies-'+t.id+'">'+
        (t._replies.length?t._replies.map(function(r){return '<div class="reply-item">'+(r.is_admin?'<span style="color:#f59e0b;font-weight:700">Admin</span>':'<span class="th-name">'+(r.name||'匿名用户')+'</span>')+'<span class="th-time">'+fmtTime(r.created_at)+'</span><div class="th-content">'+esc(r.content)+'</div></div>'}).join(''):'<div style="font-size:0.7rem;color:var(--text-dim);padding:4px 0">暂无回复</div>')+
        '<div class="reply-form"><input type="text" id="replyName-'+t.id+'" placeholder="昵称" maxlength="30" style="max-width:100px"><input type="text" id="replyContent-'+t.id+'" placeholder="回复 TA..." maxlength="300" onkeydown="if(event.key===\'Enter\')postReply('+t.id+')"><button onclick="postReply('+t.id+')">回复</button></div>'+
      '</div></div>';
  }).join('')}
function toggleReplies(id){var div=document.getElementById('replies-'+id);div.classList.toggle('collapsed');if(!div.classList.contains('collapsed')){var inp=document.getElementById('replyContent-'+id);if(inp)inp.focus()}}
async function postReply(id){var name=document.getElementById('replyName-'+id),content=document.getElementById('replyContent-'+id),n=name?name.value.trim():'',c=content?content.value.trim():'';if(!c)return;try{await sbApi('discussions',{method:'POST',body:JSON.stringify({name:n||'匿名用户',content:c,parent_id:id})});showToast('回复成功');await loadThreads()}catch(e){showToast('回复失败')}}
async function postTopic(){var name=document.getElementById('newName').value.trim(),content=document.getElementById('newContent').value.trim();if(!content)return;try{await sbApi('discussions',{method:'POST',body:JSON.stringify({name:name||'匿名用户',content:content})});showToast('发布成功');document.getElementById('newName').value='';document.getElementById('newContent').value='';togglePostForm();await loadThreads()}catch(e){showToast('发布失败')}}
async function doDiscussLike(id){var idx=discussLiked.indexOf(id),isLiked=idx>=0;if(isLiked)discussLiked.splice(idx,1);else discussLiked.push(id);localStorage.setItem('linli_discuss_liked',JSON.stringify(discussLiked));var t=threads.find(function(x){return x.id===id}),n=(t?t.likes||0:0)+(isLiked?-1:1);try{await sbApi('discussions?id=eq.'+id,{method:'PATCH',body:JSON.stringify({likes:Math.max(0,n)})})}catch(e){}loadThreads()}
async function reportDiscuss(id){try{var d=await sbApi('discussions?select=reports&id=eq.'+id),n=(d[0]?.reports||0)+1;await sbApi('discussions?id=eq.'+id,{method:'PATCH',body:JSON.stringify({reports:n})});showToast('已举报')}catch(e){showToast('举报失败')}}


// 初始化 + 恢复上次状态
document.getElementById('lastUpdate').textContent=new Date().toLocaleDateString('zh-CN');
if(mainView==='discuss'){switchMainView('discuss')}
else{
  try{var tabBtn=document.querySelector('#tabs .tab[data-tab="'+tab+'"]');if(tabBtn){tabBtn.classList.add('active');document.querySelectorAll('#tabs .tab').forEach(function(b){if(b.dataset.tab!==tab)b.classList.remove('active')})}}catch(e){}
  if(tab==='category'){document.getElementById('catBar').style.display='flex';buildCatBar();if(activeCat)pickCat(activeCat)}
  else if(tab==='search'){document.getElementById('searchBar').classList.remove('hidden');if(typeof render==='function')render()}
  else{if(typeof render==='function')render()}
}
</script>
