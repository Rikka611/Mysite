<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSide Olivia Lin 分享码</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg-start:#0f0c29;--bg-mid:#302b63;--bg-end:#24243e;
  --text:#e0e0e0;--text-muted:#889;--text-dim:#667;
  --heading:#ddd;--nav-bg:rgba(15,12,41,0.45);--nav-border:rgba(255,255,255,0.06);
  --nav-link:#999;--nav-link-hover:#fff;
  --card-bg:rgba(255,255,255,0.05);--card-border:rgba(255,255,255,0.08);
  --card-hover-border:rgba(56,189,248,0.4);--card-hover-shadow:rgba(0,0,0,0.3);
  --card-hover-ring:rgba(56,189,248,0.15);
  --tag-bg:rgba(255,255,255,0.08);--tag-text:#aab;
  --footer-text:#556;--footer-link:#778;--footer-border:rgba(255,255,255,0.06);
  --star-color:rgba(255,255,255,0.7);--accent:#38bdf8;--accent2:#818cf8;
}
@media(prefers-color-scheme:light){
  html:not(.dark):not(.light){
    --bg-start:#f0f9ff;--bg-mid:#f5f3ff;--bg-end:#fce4ec;
    --text:#3a3a4a;--text-muted:#6b6b7b;--text-dim:#8a8a9a;
    --heading:#2a2a3a;--nav-bg:rgba(255,255,255,0.35);--nav-border:rgba(0,0,0,0.06);
    --nav-link:#777;--nav-link-hover:#333;--card-bg:rgba(255,255,255,0.38);
    --card-border:rgba(0,0,0,0.06);--card-hover-border:rgba(56,189,248,0.5);
    --card-hover-shadow:rgba(0,0,0,0.08);--card-hover-ring:rgba(56,189,248,0.12);
    --tag-bg:rgba(0,0,0,0.05);--tag-text:#6b6b7b;
    --footer-text:#aaa;--footer-link:#999;--footer-border:rgba(0,0,0,0.06);
    --star-color:rgba(0,0,0,0.1);
  }
}
html.light{
  --bg-start:#f0f9ff;--bg-mid:#f5f3ff;--bg-end:#fce4ec;
  --text:#3a3a4a;--text-muted:#6b6b7b;--text-dim:#8a8a9a;
  --heading:#2a2a3a;--nav-bg:rgba(255,255,255,0.35);--nav-border:rgba(0,0,0,0.06);
  --nav-link:#777;--nav-link-hover:#333;--card-bg:rgba(255,255,255,0.38);
  --card-border:rgba(0,0,0,0.06);--card-hover-border:rgba(56,189,248,0.5);
  --card-hover-shadow:rgba(0,0,0,0.08);--card-hover-ring:rgba(56,189,248,0.12);
  --tag-bg:rgba(0,0,0,0.05);--tag-text:#6b6b7b;
  --footer-text:#aaa;--footer-link:#999;--footer-border:rgba(0,0,0,0.06);
  --star-color:rgba(0,0,0,0.1);
}
html.dark{
  --bg-start:#0f0c29;--bg-mid:#302b63;--bg-end:#24243e;
  --text:#e0e0e0;--text-muted:#889;--text-dim:#667;
  --heading:#ddd;--nav-bg:rgba(15,12,41,0.45);--nav-border:rgba(255,255,255,0.06);
  --nav-link:#999;--nav-link-hover:#fff;--card-bg:rgba(255,255,255,0.05);
  --card-border:rgba(255,255,255,0.08);--card-hover-border:rgba(56,189,248,0.4);
  --card-hover-shadow:rgba(0,0,0,0.3);--card-hover-ring:rgba(56,189,248,0.15);
  --tag-bg:rgba(255,255,255,0.08);--tag-text:#aab;
  --footer-text:#556;--footer-link:#778;--footer-border:rgba(255,255,255,0.06);
  --star-color:rgba(255,255,255,0.7);
}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg,var(--bg-start),var(--bg-mid),var(--bg-end));
  background-size:400% 400%;color:var(--text);min-height:100vh;line-height:1.6;
  animation:bgShift 12s ease infinite;overflow-x:hidden;
}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 100%}}

body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:linear-gradient(135deg,#f0f9ff,#f5f3ff,#fce4ec);opacity:0;transition:opacity 0.5s ease;
}
html.light body::before{opacity:1}
html.light .stars{opacity:0;animation:none}
@media(prefers-color-scheme:light){html:not(.dark):not(.light) body::before{opacity:1}html:not(.dark):not(.light) .stars{opacity:0;animation:none}}

/* ===== Stars ===== */
@keyframes twinkle{0%,100%{opacity:0.85}50%{opacity:1}}
.stars{
  position:fixed;inset:-40px;pointer-events:none;z-index:0;
  animation:twinkle 3s ease-in-out infinite;
  background:radial-gradient(3px 3px at 10% 20%,var(--star-color),transparent),radial-gradient(3px 3px at 30% 70%,var(--star-color),transparent),radial-gradient(4px 4px at 15% 55%,var(--star-color),transparent),radial-gradient(3px 3px at 70% 30%,var(--star-color),transparent),radial-gradient(4px 4px at 60% 30%,var(--star-color),transparent),radial-gradient(3px 3px at 80% 60%,var(--star-color),transparent),radial-gradient(4px 4px at 40% 78%,var(--star-color),transparent),radial-gradient(2px 2px at 50% 15%,var(--star-color),transparent),radial-gradient(2px 2px at 85% 12%,var(--star-color),transparent),radial-gradient(1px 1px at 45% 45%,var(--star-color),transparent),radial-gradient(1px 1px at 90% 40%,var(--star-color),transparent);
  transition:transform 0.2s ease-out;
}

/* ===== Cursor Glow ===== */
.cursor-glow{position:fixed;z-index:0;top:0;left:0;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.1),transparent 65%);pointer-events:none;transform:translate(-50%,-50%);transition:opacity 0.5s;opacity:0}
@media(max-width:768px){.cursor-glow{display:none}}

/* ===== Nav ===== */
nav{
  position:sticky;top:0;z-index:100;
  background:var(--nav-bg);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--nav-border);padding:0 24px;
  animation:navSlideIn 0.6s ease-out;
}
@keyframes navSlideIn{from{transform:translateY(-60px);opacity:0}to{transform:translateY(0);opacity:1}}
nav .inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.theme-btn{background:none;border:1px solid var(--nav-border);color:var(--nav-link);cursor:pointer;width:36px;height:36px;border-radius:50%;font-size:1.1rem;transition:all 0.3s}
.theme-btn:hover{background:var(--card-bg);color:var(--nav-link-hover);transform:rotate(30deg)}
.theme-btn .icon-sun{display:inline}.theme-btn .icon-moon{display:none}
html.light .theme-btn .icon-sun{display:none}html.light .theme-btn .icon-moon{display:inline}
@media(prefers-color-scheme:light){html:not(.dark):not(.light) .theme-btn .icon-sun{display:none}html:not(.dark):not(.light) .theme-btn .icon-moon{display:inline}}

/* ===== Hero ===== */
.hero{text-align:center;padding:80px 24px 50px;position:relative;z-index:1}
.hero h1{
  font-size:clamp(2rem,5vw,2.8rem);font-weight:800;
  background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:heroFadeIn 0.8s cubic-bezier(0.25,0.8,0.25,1.6);
}
@keyframes heroFadeIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.hero h1 a{
  text-decoration:underline;text-underline-offset:6px;color:inherit;
  -webkit-text-fill-color:transparent;
  transition:text-underline-offset 0.3s;
}
.hero h1 a:hover{text-underline-offset:10px}
.hero p{color:var(--text-muted);font-size:1rem;animation:heroFadeIn 0.8s 0.15s cubic-bezier(0.25,0.8,0.25,1.6) both}

/* ===== Tabs ===== */
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:32px;position:relative;z-index:1}
.tab{
  padding:10px 24px;border-radius:50px;border:none;
  background:var(--card-bg);color:var(--text-muted);cursor:pointer;
  font-size:0.85rem;font-weight:500;font-family:system-ui,-apple-system,sans-serif;
  transition:all 0.35s cubic-bezier(0.25,0.8,0.25,1.2);position:relative;overflow:hidden;
}
.tab::after{
  content:'';position:absolute;inset:0;border-radius:50px;
  background:linear-gradient(90deg,#38bdf8,#818cf8);opacity:0;transition:opacity 0.3s;
}
.tab:hover{transform:translateY(-2px);color:var(--text)}
.tab:active{transform:scale(0.95)}
.tab.active{background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;box-shadow:0 4px 16px rgba(56,189,248,0.35)}

/* ===== Search ===== */
.search-bar{display:flex;justify-content:center;gap:8px;margin-bottom:32px;position:relative;z-index:1}
.search-bar.hidden{display:none}
.search-bar input{
  padding:12px 20px;border-radius:50px;width:300px;max-width:60vw;
  border:2px solid var(--card-border);background:var(--card-bg);color:var(--text);
  font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif;
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
}
.search-bar input:focus{border-color:var(--accent);width:340px;box-shadow:0 0 30px rgba(56,189,248,0.15)}
.search-bar button{
  padding:12px 24px;border-radius:50px;border:none;
  background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;
  cursor:pointer;font-size:0.85rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif;
  transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);
}
.search-bar button:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(56,189,248,0.4)}
.search-bar button:active{transform:scale(0.95)}

/* ===== Content ===== */
.content{max-width:900px;margin:0 auto;padding:0 24px 60px;position:relative;z-index:1}
.list{display:flex;flex-direction:column;gap:8px}

/* ===== Row ===== */
.row{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:12px 16px;backdrop-filter:blur(6px);
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
  transform:perspective(1200px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
  position:relative;overflow:hidden;
  animation:rowSlideIn 0.5s cubic-bezier(0.25,0.8,0.25,1.2) both;
}
@keyframes rowSlideIn{from{transform:translateX(-24px);opacity:0}to{transform:translateX(0);opacity:1}}
.row:hover{
  border-color:var(--card-hover-border);
  box-shadow:0 8px 30px var(--card-hover-shadow),0 0 0 1px var(--card-hover-ring);
  transform:translateX(4px);
}
.row .glare{
  position:absolute;inset:0;pointer-events:none;z-index:2;border-radius:12px;
  background:radial-gradient(circle at var(--gx,50%) var(--gy,50%),rgba(255,255,255,0.1) 0%,transparent 60%);
  opacity:0;transition:opacity 0.3s;
}
.row:hover .glare{opacity:1}
.row.tilting{will-change:transform}
.row.tilting .glare{opacity:1}
.row .rank{font-size:1.2rem;font-weight:800;color:var(--text-dim);width:36px;flex-shrink:0;text-align:center;position:relative;z-index:3}
.row:nth-child(1) .rank{color:#fbbf24;animation:rankGlow 2s ease-in-out infinite}
.row:nth-child(2) .rank{color:#94a3b8}
.row:nth-child(3) .rank{color:#d97706}
@keyframes rankGlow{0%,100%{text-shadow:0 0 10px rgba(251,191,36,0.5)}50%{text-shadow:0 0 20px rgba(251,191,36,0.8)}}
.row .code{
  font-size:1.1rem;font-weight:700;letter-spacing:1px;
  background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:pointer;user-select:all;font-variant-numeric:tabular-nums;width:88px;flex-shrink:0;text-align:center;position:relative;z-index:3;
  transition:all 0.3s;
}
.row .code:hover{transform:scale(1.08);letter-spacing:2px}
.row .code:active{transform:scale(0.95)}
.row .info{flex:1;min-width:0;position:relative;z-index:3}
.row .title{font-size:0.95rem;font-weight:600;color:var(--heading);transition:color 0.3s}
.row:hover .title{color:var(--accent)}
.row .sub{font-size:0.75rem;color:var(--text-dim);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row .tag{font-size:0.65rem;padding:2px 8px;border-radius:50px;background:var(--tag-bg);color:var(--tag-text);transition:all 0.3s}
.row:hover .tag{background:rgba(56,189,248,0.15);color:var(--accent)}
.row .stats{display:flex;gap:10px;font-size:0.75rem;color:var(--text-dim);white-space:nowrap;position:relative;z-index:3;transition:all 0.3s;width:80px;flex-shrink:0;justify-content:center}
.row .actions{display:flex;gap:6px;position:relative;z-index:3;width:90px;flex-shrink:0;justify-content:center}
.row .btn{
  padding:6px 14px;border-radius:50px;font-size:0.75rem;font-weight:500;cursor:pointer;
  border:none;font-family:system-ui,-apple-system,sans-serif;transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);white-space:nowrap;position:relative;overflow:hidden;
}
.row .btn::after{
  content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);
  border-radius:50px;transform:scale(0);transition:transform 0.4s;
}
.row .btn:active::after{transform:scale(1);transition:transform 0s}

.btn-copy{background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff}
.btn-copy:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(56,189,248,0.4)}
.btn-like{background:transparent;border:1px solid var(--card-border);color:var(--text-muted)}
.btn-like:hover{border-color:#f5576c;color:#f5576c}
.btn-like.liked{color:#ef4444;border-color:rgba(239,68,68,0.4);animation:heartBeat 0.5s ease}

/* ===== Heart burst ===== */
.heart-burst{position:fixed;pointer-events:none;z-index:400;animation:heartFly 1s ease-out forwards}
@keyframes heartFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--hx),var(--hy)) scale(0);opacity:0}}

/* ===== Copy ripple ===== */
.copy-ripple{position:fixed;pointer-events:none;z-index:400;color:#38bdf8;font-weight:700;font-size:0.9rem;animation:copyPop 1s ease-out forwards}
@keyframes copyPop{0%{transform:translate(-50%,-50%) scale(0.5);opacity:1}50%{transform:translate(-50%,-80%) scale(1.2);opacity:0.8}100%{transform:translate(-50%,-120%) scale(0.8);opacity:0}}

/* ===== Fab ===== */
.fab{
  position:fixed;bottom:32px;right:32px;z-index:50;
  width:56px;height:56px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;
  font-size:1.6rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(56,189,248,0.4);
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
  animation:fabPulse 3s ease-in-out infinite;
}
@keyframes fabPulse{0%,100%{box-shadow:0 4px 20px rgba(56,189,248,0.4)}50%{box-shadow:0 4px 35px rgba(56,189,248,0.7)}}
.fab:hover{transform:scale(1.15) rotate(90deg);box-shadow:0 6px 30px rgba(56,189,248,0.6)}
.fab:active{transform:scale(0.9)}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:200;display:none;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}}
.modal{
  background:#1a1a2e;border:1px solid var(--card-border);border-radius:20px;
  padding:32px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;
  animation:modalSlideIn 0.5s cubic-bezier(0.25,0.8,0.25,1.3);
}
@keyframes modalSlideIn{from{transform:translateY(40px) scale(0.95);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
html.light .modal{background:#fff}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:300;
  background:linear-gradient(90deg,#1e293b,#334155);color:#fff;
  padding:12px 28px;border-radius:50px;font-size:0.85rem;pointer-events:none;
  opacity:0;transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.3);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}

/* ===== Spark ===== */
.spark-container{position:fixed;inset:0;pointer-events:none;z-index:999}
.spark{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:#38bdf8;pointer-events:none;
  animation:sparkBurst 0.7s ease-out forwards;
}
@keyframes sparkBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}}

/* ===== Skeleton loading ===== */
.skeleton{
  height:52px;background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;animation:shimmer 1.5s ease-in-out infinite;
  background:linear-gradient(90deg,var(--card-bg) 25%,rgba(255,255,255,0.03) 50%,var(--card-bg) 75%);
  background-size:200% 100%;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

footer{text-align:center;padding:24px;border-top:1px solid var(--footer-border);color:var(--footer-text);font-size:0.8rem;position:relative;z-index:1}
.empty{text-align:center;color:var(--text-dim);padding:48px 0;font-size:0.9rem;position:relative;z-index:1}

@media(max-width:480px){
  .hero{padding:50px 16px 30px}.hero h1{font-size:1.6rem}
  .content{padding:0 12px 40px}.list{gap:6px}
  .row{flex-wrap:wrap;gap:8px;padding:10px 12px}
  .fab{bottom:20px;right:20px;width:48px;height:48px;font-size:1.3rem}
  nav{padding:0 12px}
}
</style>
</head>
<body>

<div class="stars"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<nav>
  <div class="inner">
    <span></span>
    <button class="theme-btn" id="themeToggle" title="切换日夜模式">
      <span class="icon-sun">☀️</span><span class="icon-moon">🌙</span>
    </button>
  </div>
</nav>

<div class="hero">
  <h1><a href="https://store.steampowered.com/app/4532590/BSide_Olivia_Lin/" target="_blank">BSide Olivia Lin</a> 分享码</h1>
  <p>分享你生成的林离钢琴曲，发现热门乐谱</p>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="hot">🔥 热门</button>
  <button class="tab" data-tab="new">🆕 最新</button>
  <button class="tab" data-tab="search">🔍 搜索</button>
</div>

<div class="search-bar hidden" id="searchBar">
  <input type="text" id="searchInput" placeholder="搜索曲名、作者、标签..." maxlength="50">
  <button onclick="doSearch()">搜索</button>
</div>

<div class="content">
  <div class="list" id="grid"></div>
  <div class="empty" id="empty">加载中...</div>
</div>

<button class="fab" id="fab" title="提交分享码">+</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 style="text-align:center;font-size:1.1rem;margin-bottom:20px;color:var(--heading)">提交分享码</h3>
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">六位分享码 *</label>
    <input type="text" id="inputCode" placeholder="ABC123" maxlength="6" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">曲名 *</label>
    <input type="text" id="inputTitle" placeholder="给这首曲子起个名" maxlength="50" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">你的昵称</label>
    <input type="text" id="inputAuthor" placeholder="匿名" maxlength="30" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">简介</label>
    <textarea id="inputDesc" placeholder="简单介绍一下..." maxlength="200" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;resize:vertical;font-family:system-ui,-apple-system,sans-serif;min-height:60px"></textarea>
    <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;margin-top:12px">标签（空格分隔）</label>
    <input type="text" id="inputTags" placeholder="原神 璃月 抒情" maxlength="100" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--card-border);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif">
    <div class="error" id="modalError" style="color:#ef4444;font-size:0.8rem;text-align:center;margin-top:8px"></div>
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:center">
      <button onclick="closeModal()" style="padding:10px 28px;border-radius:50px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;font-size:0.9rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif">取消</button>
      <button onclick="doSubmit()" style="padding:10px 28px;border-radius:50px;border:none;background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;cursor:pointer;font-size:0.9rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif">提交</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>本网站为粉丝自发整理的社区分享平台，与米哈游/HoYoverse及《BSide: Olivia Lin》项目无关。所有分享码由用户自行提交，本站仅提供索引服务。如有侵权内容，请联系管理删除。</footer>

<script>
const SB_URL='https://naivizrdefonlelndzqr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5haXZpenJkZWZvbmxlbG5kenFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTU4MjcsImV4cCI6MjA5NzY5MTgyN30.66G4T_7JDVjsw0RGRC_OwcYBgMwPk33c3sCrlmzrxvI';

async function sbApi(path,options={}){
  const res=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json',Prefer:'return=minimal',...options.headers},...options});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}

// Theme
const html=document.documentElement;
function applyTheme(mode){html.classList.remove('light','dark');if(mode==='light')html.classList.add('light');if(mode==='dark')html.classList.add('dark')}
const st=localStorage.getItem('theme');if(st)applyTheme(st);
document.getElementById('themeToggle').addEventListener('click',()=>{
  const cur=html.classList.contains('light')?'light':html.classList.contains('dark')?'dark':'auto';
  if(cur==='auto'){const sd=matchMedia('(prefers-color-scheme:dark)').matches;localStorage.setItem('theme',sd?'light':'dark');applyTheme(sd?'light':'dark')}
  else if(cur==='dark'){localStorage.setItem('theme','light');applyTheme('light')}
  else{localStorage.setItem('theme','dark');applyTheme('dark')}
});

// State
let tab='hot';
const liked=JSON.parse(localStorage.getItem('linli_liked')||'[]');
const viewed=JSON.parse(localStorage.getItem('linli_viewed')||'[]');
let autoApprove=localStorage.getItem('linli_auto_approve')!=='false';

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');if(!btn)return;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');tab=btn.dataset.tab;
  document.getElementById('searchBar').classList.toggle('hidden',tab!=='search');
  render();
});
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
function doSearch(){render()}

async function fetchApproved(){
  let q='status=eq.approved';
  q+=tab==='hot'?'&order=likes.desc&limit=30':'&order=created_at.desc&limit=30';
  return sbApi(`linli_codes?select=*&${q}`);
}
async function searchCodes(q){return sbApi(`linli_codes?select=*&status=eq.approved&or=(title.ilike.*${q}*,description.ilike.*${q}*,author.ilike.*${q}*,tags.ilike.*${q}*)&order=likes.desc&limit=30`)}

async function trackView(id){
  if(viewed.includes(id))return;
  try{const d=await sbApi(`linli_codes?select=views&id=eq.${id}`);await sbApi(`linli_codes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({views:(d[0]?.views||0)+1})});viewed.push(id);localStorage.setItem('linli_viewed',JSON.stringify(viewed))}catch(e){}
}

async function doLike(id,e){
  if(liked.includes(id))return;
  try{const d=await sbApi(`linli_codes?select=likes&id=eq.${id}`);await sbApi(`linli_codes?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({likes:(d[0]?.likes||0)+1})});liked.push(id);localStorage.setItem('linli_liked',JSON.stringify(liked));
    // Heart burst effect
    if(e){const rect=e.target.getBoundingClientRect();for(let i=0;i<8;i++){const h=document.createElement('div');h.className='heart-burst';h.textContent='❤';h.style.left=rect.left+rect.width/2+'px';h.style.top=rect.top+rect.height/2+'px';const a=Math.PI*2*i/8;h.style.setProperty('--hx',Math.cos(a)*40+'px');h.style.setProperty('--hy',Math.sin(a)*40+'px');h.style.color=`hsl(${350+Math.random()*20},90%,${55+Math.random()*20}%)`;document.body.appendChild(h);h.addEventListener('animationend',()=>h.remove())}}
    render();
  }catch(e){}
}

function copyCode(code,e){
  navigator.clipboard.writeText(code).then(()=>{
    showToast('已复制: '+code);
    // Copy ripple
    if(e){const r=document.createElement('div');r.className='copy-ripple';r.textContent='📋 已复制';r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';document.body.appendChild(r);r.addEventListener('animationend',()=>r.remove())}
  }).catch(()=>showToast('复制失败'));
}

document.getElementById('fab').addEventListener('click',()=>{document.getElementById('modalOverlay').classList.add('show');document.getElementById('modalError').textContent=''});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');['inputCode','inputTitle','inputAuthor','inputDesc','inputTags'].forEach(id=>document.getElementById(id).value='')}

async function doSubmit(){
  const code=document.getElementById('inputCode').value.trim();
  const title=document.getElementById('inputTitle').value.trim();
  const author=document.getElementById('inputAuthor').value.trim()||'匿名';
  const desc=document.getElementById('inputDesc').value.trim();
  const tags=document.getElementById('inputTags').value.trim();
  const errEl=document.getElementById('modalError');
  if(!/^[A-Za-z0-9]{6}$/.test(code)){errEl.textContent='请输入六位分享码（字母或数字）';return}
  if(!title||title.length>50){errEl.textContent='曲名不能为空且不超过50字';return}
  try{
    await sbApi('linli_codes',{method:'POST',body:JSON.stringify({code,title,description:desc,author,tags,status:autoApprove?'approved':'pending'})});
    closeModal();showToast(autoApprove?'提交成功！':'提交成功，审核后显示');render();
  }catch(e){let msg=e.message;try{msg=JSON.parse(e.message).message||msg}catch(_){}errEl.textContent=msg}
}

function esc(s){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function buildRow(item,idx){
  const isLiked=liked.includes(item.id);
  const tagList=item.tags?item.tags.split(/[\s,]+/).filter(Boolean).slice(0,3):[];
  const rank=tab==='hot'?idx+1:null;
  const desc=item.description||(item.author&&item.author!=='匿名'?item.author:'');
  return `<div class="row" style="animation-delay:${idx*0.04}s">
    <div class="glare"></div>
    <div class="rank">${rank!==null?'#'+rank:''}</div>
    <div class="code" onclick="copyCode('${esc(item.code)}',event)" title="点击复制">${esc(item.code)}</div>
    <div class="info">
      <div class="title">${esc(item.title)}</div>
      <div class="sub">${desc?`<span>${esc(desc)}</span>`:''}${tagList.length?tagList.map(t=>`<span class="tag">${esc(t)}</span>`).join(''):''}</div>
    </div>
    <div class="stats">👁 ${item.views||0} ❤ ${item.likes||0}</div>
    <div class="actions">
      <button class="btn btn-copy" onclick="copyCode('${esc(item.code)}',event)">📋</button>
      <button class="btn btn-like${isLiked?' liked':''}" onclick="doLike(${item.id},event)">${isLiked?'❤':'🤍'}</button>
    </div></div>`;
}

async function render(){
  const grid=document.getElementById('grid'),empty=document.getElementById('empty');
  // Show skeleton
  grid.innerHTML='';empty.style.display='none';
  for(let i=0;i<5;i++){const s=document.createElement('div');s.className='skeleton';s.style.animationDelay=i*0.1+'s';grid.appendChild(s)}

  try{
    let data;
    if(tab==='search'){const q=document.getElementById('searchInput').value.trim();if(!q){empty.style.display='block';empty.textContent='输入关键词搜索';grid.innerHTML='';return};data=await searchCodes(encodeURIComponent(q))}
    else data=await fetchApproved();

    grid.innerHTML='';
    if(!data.length){empty.style.display='block';empty.textContent=tab==='search'?'没有找到匹配的分享码':'暂无分享码，点右下角 + 提交第一个吧！';return}
    data.forEach((item,i)=>{const d=document.createElement('div');d.innerHTML=buildRow(item,i);grid.appendChild(d.firstElementChild);trackView(item.id)});
  }catch(e){grid.innerHTML='';empty.style.display='block';empty.textContent='加载失败，请刷新重试'}
}

// Cursor glow + parallax (enhanced)
const glow=document.getElementById('cursorGlow');
const starsEl=document.querySelector('.stars');
if(glow){let pending=false;document.addEventListener('mousemove',e=>{if(pending)return;pending=true;requestAnimationFrame(()=>{pending=false;glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';glow.style.opacity='1';if(starsEl){const x=(e.clientX/innerWidth-0.5)*20,y=(e.clientY/innerHeight-0.5)*20;starsEl.style.transform=`translate(${-x}px,${-y}px)`}})})}

// Card 3D tilt (more responsive)
(function(){const maxAngle=10;let cur=null,rect=null,raf=null;window.addEventListener('scroll',()=>{if(cur)rect=cur.getBoundingClientRect()},{passive:true});window.addEventListener('resize',()=>{if(cur)rect=cur.getBoundingClientRect()});function begin(card,x,y){if(card!==cur){if(cur)reset(cur);if(!document.contains(card))return;cur=card;card.classList.add('tilting');rect=card.getBoundingClientRect()}}function move(x,y){if(!cur||!rect)return;if(!raf){raf=requestAnimationFrame(()=>{raf=null;if(!cur||!rect)return;const rx=(y-rect.top)/rect.height,ry=(x-rect.left)/rect.width;cur.style.setProperty('--rx',((rx-0.5)*-maxAngle).toFixed(2)+'deg');cur.style.setProperty('--ry',((ry-0.5)*maxAngle).toFixed(2)+'deg');cur.style.setProperty('--gx',(ry*100).toFixed(1)+'%');cur.style.setProperty('--gy',(rx*100).toFixed(1)+'%')})}}function end(card){if(card===cur){reset(cur);cur=null;rect=null}}function reset(card){card.classList.remove('tilting');const glare=card.querySelector('.glare');const done=()=>{card.style.transition='transform 0.4s ease-out';card.style.removeProperty('--rx');card.style.removeProperty('--ry');card.style.removeProperty('--gx');card.style.removeProperty('--gy');card.addEventListener('transitionend',function c(){card.style.transition='';card.removeEventListener('transitionend',c)},{once:true})};if(glare)glare.addEventListener('transitionend',()=>{done()},{once:true});else done()}document.addEventListener('mouseover',e=>{begin(e.target.closest('.row'),e.clientX,e.clientY)});document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));document.addEventListener('mouseout',e=>{const row=e.target.closest('.row');if(!row)return;if(e.relatedTarget&&row.contains(e.relatedTarget))return;end(row)});document.addEventListener('touchstart',e=>{const t=e.touches[0];begin(t.target.closest('.row'),t.clientX,t.clientY)},{passive:true});document.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY)},{passive:true});document.addEventListener('touchend',()=>{if(cur){reset(cur);cur=null;rect=null}})})();

// Click spark (more particles)
(function(){const c=document.createElement('div');c.className='spark-container';document.body.appendChild(c);document.addEventListener('click',e=>{for(let i=0;i<10;i++){const s=document.createElement('div');s.className='spark';const a=Math.PI*2*i/10+(Math.random()-0.5)*0.5;s.style.left=e.clientX+'px';s.style.top=e.clientY+'px';s.style.setProperty('--sx',Math.cos(a)*(20+Math.random()*30)+'px');s.style.setProperty('--sy',Math.sin(a)*(20+Math.random()*30)+'px');s.style.background=`hsl(${200+Math.random()*60},90%,${55+Math.random()*20}%)`;c.appendChild(s);s.addEventListener('animationend',()=>s.remove())}})})();

render();
</script>
</body>
</html>
