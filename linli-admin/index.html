<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://naivizrdefonlelndzqr.supabase.co; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSide Olivia Lin · 管理</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-y:scroll}
:root{
  --bg-start:#0a0a0f;--bg-mid:#11111a;--bg-end:#0d0d14;
  --text:#e0e0e0;--text-muted:#889;--text-dim:#667;
  --heading:#ddd;--nav-bg:rgba(10,10,15,0.45);--nav-border:rgba(255,255,255,0.06);
  --nav-link:#999;--nav-link-hover:#fff;
  --card-bg:rgba(255,255,255,0.05);--card-border:rgba(255,255,255,0.08);
  --card-hover-border:rgba(56,189,248,0.4);--card-hover-shadow:rgba(0,0,0,0.3);
  --card-hover-ring:rgba(56,189,248,0.15);
  --tag-bg:rgba(255,255,255,0.08);--tag-text:#aab;
  --footer-text:#556;--footer-link:#778;--footer-border:rgba(255,255,255,0.06);
  --star-color:rgba(255,255,255,0.7);--accent:#38bdf8;--accent2:#818cf8;
}
@media(prefers-color-scheme:light){
  html:not(.dark):not(.light){
    --bg-start:#f0f9ff;--bg-mid:#f5f3ff;--bg-end:#fce4ec;
    --text:#3a3a4a;--text-muted:#6b6b7b;--text-dim:#8a8a9a;
    --heading:#2a2a3a;--nav-bg:rgba(255,255,255,0.35);--nav-border:rgba(0,0,0,0.06);
    --nav-link:#777;--nav-link-hover:#333;--card-bg:rgba(255,255,255,0.38);
    --card-border:rgba(0,0,0,0.06);--card-hover-border:rgba(56,189,248,0.5);
    --card-hover-shadow:rgba(0,0,0,0.08);--card-hover-ring:rgba(56,189,248,0.12);
    --tag-bg:rgba(0,0,0,0.05);--tag-text:#6b6b7b;
    --footer-text:#aaa;--footer-link:#999;--footer-border:rgba(0,0,0,0.06);
    --star-color:rgba(0,0,0,0.1);
  }
}
html.light{
  --bg-start:#f0f9ff;--bg-mid:#f5f3ff;--bg-end:#fce4ec;
  --text:#3a3a4a;--text-muted:#6b6b7b;--text-dim:#8a8a9a;
  --heading:#2a2a3a;--nav-bg:rgba(255,255,255,0.35);--nav-border:rgba(0,0,0,0.06);
  --nav-link:#777;--nav-link-hover:#333;--card-bg:rgba(255,255,255,0.38);
  --card-border:rgba(0,0,0,0.06);--card-hover-border:rgba(56,189,248,0.5);
  --card-hover-shadow:rgba(0,0,0,0.08);--card-hover-ring:rgba(56,189,248,0.12);
  --tag-bg:rgba(0,0,0,0.05);--tag-text:#6b6b7b;
  --footer-text:#aaa;--footer-link:#999;--footer-border:rgba(0,0,0,0.06);
  --star-color:rgba(0,0,0,0.1);
}
html.dark{
  --bg-start:#0a0a0f;--bg-mid:#11111a;--bg-end:#0d0d14;
  --text:#e0e0e0;--text-muted:#889;--text-dim:#667;
  --heading:#ddd;--nav-bg:rgba(10,10,15,0.45);--nav-border:rgba(255,255,255,0.06);
  --nav-link:#999;--nav-link-hover:#fff;--card-bg:rgba(255,255,255,0.05);
  --card-border:rgba(255,255,255,0.08);--card-hover-border:rgba(56,189,248,0.4);
  --card-hover-shadow:rgba(0,0,0,0.3);--card-hover-ring:rgba(56,189,248,0.15);
  --tag-bg:rgba(255,255,255,0.08);--tag-text:#aab;
  --footer-text:#556;--footer-link:#778;--footer-border:rgba(255,255,255,0.06);
  --star-color:rgba(255,255,255,0.7);
}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg,var(--bg-start),var(--bg-mid),var(--bg-end));
  background-size:400% 400%;color:var(--text);min-height:100vh;line-height:1.6;
  animation:bgShift 12s ease infinite;overflow-x:hidden;
}
nav,footer,.search-bar input,.modal,.modal input,.modal textarea{
  transition:background-color 0.4s ease,border-color 0.4s ease,color 0.4s ease;
}
@keyframes bgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 100%}}

body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:linear-gradient(135deg,#f0f9ff,#f5f3ff,#fce4ec);opacity:0;transition:opacity 0.5s ease;
}
html.light body::before{opacity:1}
html.light .stars{opacity:0;animation:none}
@media(prefers-color-scheme:light){html:not(.dark):not(.light) body::before{opacity:1}html:not(.dark):not(.light) .stars{opacity:0;animation:none}}

/* ===== Shooting stars ===== */
.meteor{
  position:fixed;z-index:1;pointer-events:none;top:0;left:0;
  width:120px;height:1.5px;
  background:linear-gradient(to right,rgba(255,255,255,0),rgba(255,255,255,0.15),rgba(255,255,255,0.4));
  border-radius:1px;
  animation:meteorFly var(--d,1s) linear forwards;
}
.meteor::after{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:2px;height:2px;background:rgba(255,255,255,0.6);border-radius:50%;box-shadow:0 0 3px 1px rgba(255,255,255,0.2);
}
@keyframes meteorFly{
  0%{transform:translate(var(--sx),var(--sy)) rotate(var(--a));opacity:0}
  8%{opacity:1}
  70%{opacity:1}
  100%{transform:translate(var(--ex),var(--ey)) rotate(var(--a));opacity:0}
}
html.light .meteor{display:none}
@media(prefers-color-scheme:light){html:not(.dark):not(.light) .meteor{display:none}}

/* ===== Stars ===== */
@keyframes twinkle{0%,100%{opacity:0.85}50%{opacity:1}}
.stars{
  position:fixed;inset:-40px;pointer-events:none;z-index:0;
  animation:twinkle 3s ease-in-out infinite;
  background:radial-gradient(3px 3px at 10% 20%,var(--star-color),transparent),radial-gradient(3px 3px at 30% 70%,var(--star-color),transparent),radial-gradient(4px 4px at 15% 55%,var(--star-color),transparent),radial-gradient(3px 3px at 70% 30%,var(--star-color),transparent),radial-gradient(4px 4px at 60% 30%,var(--star-color),transparent),radial-gradient(3px 3px at 80% 60%,var(--star-color),transparent),radial-gradient(4px 4px at 40% 78%,var(--star-color),transparent),radial-gradient(2px 2px at 50% 15%,var(--star-color),transparent),radial-gradient(2px 2px at 85% 12%,var(--star-color),transparent),radial-gradient(1px 1px at 45% 45%,var(--star-color),transparent),radial-gradient(1px 1px at 90% 40%,var(--star-color),transparent);
  transition:transform 0.2s ease-out;
}

/* ===== Cursor Glow ===== */
.cursor-glow{position:fixed;z-index:0;top:0;left:0;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.05),transparent 65%);pointer-events:none;transform:translate(-50%,-50%);transition:opacity 0.5s;opacity:0}
@media(max-width:768px){.cursor-glow{display:none}.meteor{width:80px;height:1px}.meteor::after{width:1.5px;height:1.5px}}

/* ===== Nav ===== */
nav{
  position:sticky;top:0;z-index:100;
  background:var(--nav-bg);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--nav-border);padding:0 24px;
  animation:navSlideIn 0.6s ease-out;
}
@keyframes navSlideIn{from{transform:translateY(-60px);opacity:0}to{transform:translateY(0);opacity:1}}
nav .inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:flex-end;gap:8px;height:56px}
.theme-btn{background:none;border:1px solid var(--nav-border);color:var(--nav-link);cursor:pointer;width:36px;height:36px;border-radius:50%;font-size:1.1rem;transition:all 0.3s}
.theme-btn:hover{background:var(--card-bg);color:var(--nav-link-hover);transform:rotate(30deg)}
#feedbackBtn:hover{background:var(--card-bg);color:var(--nav-link-hover);transform:translateY(-1px)}
#replyFab:hover{transform:scale(1.15)!important;box-shadow:0 6px 30px rgba(245,158,11,0.6)!important}
#replyFab:active{transform:scale(0.9)!important}
.theme-btn .icon-sun{display:inline}.theme-btn .icon-moon{display:none}
html.light .theme-btn .icon-sun{display:none}html.light .theme-btn .icon-moon{display:inline}
@media(prefers-color-scheme:light){html:not(.dark):not(.light) .theme-btn .icon-sun{display:none}html:not(.dark):not(.light) .theme-btn .icon-moon{display:inline}}

/* ===== Hero ===== */
.hero{text-align:center;padding:80px 24px 50px;position:relative;z-index:1}
.hero h1{
  font-size:clamp(2rem,5vw,2.8rem);font-weight:800;
  background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:heroFadeIn 0.8s cubic-bezier(0.25,0.8,0.25,1.6);
}
@keyframes heroFadeIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.hero h1 a{
  text-decoration:underline;text-underline-offset:6px;color:inherit;
  -webkit-text-fill-color:transparent;
  transition:text-underline-offset 0.3s;
}
.hero h1 a:hover{text-underline-offset:10px}
.hero p{color:var(--text-muted);font-size:1rem;animation:heroFadeIn 0.8s 0.15s cubic-bezier(0.25,0.8,0.25,1.6) both}

/* ===== Tabs ===== */
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:32px;position:relative;z-index:1}
.tab{
  padding:10px 24px;border-radius:50px;border:none;
  background:var(--card-bg);color:var(--text-muted);cursor:pointer;
  font-size:0.85rem;font-weight:500;font-family:system-ui,-apple-system,sans-serif;
  transition:all 0.35s cubic-bezier(0.25,0.8,0.25,1.2);position:relative;overflow:hidden;
}
.tab::after{
  content:'';position:absolute;inset:0;border-radius:50px;
  background:linear-gradient(90deg,#38bdf8,#818cf8);opacity:0;transition:opacity 0.3s;
}
.tab:hover{transform:translateY(-2px);color:var(--text)}
.tab:active{transform:scale(0.95)}
.tab.active{background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;box-shadow:0 4px 16px rgba(56,189,248,0.35)}

/* ===== Search ===== */
.search-bar{display:flex;justify-content:center;gap:8px;margin-bottom:32px;position:relative;z-index:1}
.search-bar.hidden{display:none}
.search-bar input{
  padding:12px 20px;border-radius:50px;width:300px;max-width:60vw;
  border:2px solid var(--card-border);background:var(--card-bg);color:var(--text);
  font-size:0.9rem;outline:none;font-family:system-ui,-apple-system,sans-serif;
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
}
.search-bar input:focus{border-color:var(--accent);width:340px;box-shadow:0 0 30px rgba(56,189,248,0.15)}
.search-bar button{
  padding:12px 24px;border-radius:50px;border:none;
  background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;
  cursor:pointer;font-size:0.85rem;font-weight:600;font-family:system-ui,-apple-system,sans-serif;
  transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);
}
.search-bar button:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(56,189,248,0.4)}
.search-bar button:active{transform:scale(0.95)}

/* ===== Content ===== */
.content{max-width:900px;margin:0 auto;padding:0 24px 60px;position:relative;z-index:1}
.list{display:flex;flex-direction:column;gap:8px}

/* ===== Row ===== */
.row{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:12px 16px;backdrop-filter:blur(6px);
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
  transform:perspective(1200px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
  position:relative;overflow:hidden;
  animation:rowSlideIn 0.5s cubic-bezier(0.25,0.8,0.25,1.2) both;
}
@keyframes rowSlideIn{from{transform:translateX(-24px);opacity:0}to{transform:translateX(0);opacity:1}}
.row:hover{
  border-color:var(--card-hover-border);
  box-shadow:0 8px 30px var(--card-hover-shadow),0 0 0 1px var(--card-hover-ring);
  transform:translateX(4px);
}
.row .glare{
  position:absolute;inset:0;pointer-events:none;z-index:2;border-radius:12px;
  background:radial-gradient(circle at var(--gx,50%) var(--gy,50%),rgba(255,255,255,0.1) 0%,transparent 60%);
  opacity:0;transition:opacity 0.3s;
}
.row:hover .glare{opacity:1}
.row.tilting{will-change:transform}
.row.tilting .glare{opacity:1}
.row .rank{font-size:1.2rem;font-weight:800;color:var(--text-dim);width:36px;flex-shrink:0;text-align:center;position:relative;z-index:3}
.row:nth-child(1) .rank{color:#fbbf24;animation:rankGlow 2s ease-in-out infinite}
.row:nth-child(2) .rank{color:#94a3b8}
.row:nth-child(3) .rank{color:#d97706}
@keyframes rankGlow{0%,100%{text-shadow:0 0 10px rgba(251,191,36,0.5)}50%{text-shadow:0 0 20px rgba(251,191,36,0.8)}}
.row .code{
  font-size:1.1rem;font-weight:700;letter-spacing:1px;
  background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:pointer;user-select:all;font-variant-numeric:tabular-nums;min-width:88px;flex-shrink:0;text-align:center;position:relative;z-index:3;
  transition:all 0.3s;
}
.row .code:hover{transform:scale(1.08);letter-spacing:2px}
.row .code:active{transform:scale(0.95)}
.row .info{flex:1;min-width:0;position:relative;z-index:3}
.row .title{font-size:0.95rem;font-weight:600;color:var(--heading);transition:color 0.3s}
.row:hover .title{color:var(--accent)}
.row .sub{font-size:0.75rem;color:var(--text-dim);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row .tag{font-size:0.65rem;padding:2px 8px;border-radius:50px;background:var(--tag-bg);color:var(--tag-text);transition:all 0.3s}
.row:hover .tag{background:rgba(56,189,248,0.15);color:var(--accent)}
.row .stats{display:flex;gap:10px;font-size:0.75rem;color:var(--text-dim);white-space:nowrap;position:relative;z-index:3;transition:all 0.3s;width:80px;flex-shrink:0;justify-content:center}
.row .actions{display:flex;gap:4px;position:relative;z-index:3;flex-shrink:0;justify-content:center}
.row .btn{
  padding:6px 10px;border-radius:50px;font-size:0.75rem;font-weight:500;cursor:pointer;
  border:none;font-family:system-ui,-apple-system,sans-serif;transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);white-space:nowrap;position:relative;overflow:hidden;
  display:inline-flex;align-items:center;justify-content:center;min-width:36px;flex-shrink:0;
}
.row .btn::after{
  content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);
  border-radius:50px;transform:scale(0);transition:transform 0.4s;
}
.row .btn:active::after{transform:scale(1);transition:transform 0s}

.btn-copy{background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff}
.btn-copy:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(56,189,248,0.4)}
.btn-like{background:transparent;border:1px solid var(--card-border);color:var(--text-muted)}
.btn-like:hover{border-color:#f5576c;color:#f5576c}
.btn-like.liked{color:#ef4444;border-color:rgba(239,68,68,0.4);animation:heartBeat 0.5s ease}

/* ===== Heart burst ===== */
.heart-burst{position:fixed;pointer-events:none;z-index:400;animation:heartFly 1s ease-out forwards}
@keyframes heartFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--hx),var(--hy)) scale(0);opacity:0}}

/* ===== Copy ripple ===== */
.copy-ripple{position:fixed;pointer-events:none;z-index:400;color:#38bdf8;font-weight:700;font-size:0.9rem;animation:copyPop 1s ease-out forwards}
@keyframes copyPop{0%{transform:translate(-50%,-50%) scale(0.5);opacity:1}50%{transform:translate(-50%,-80%) scale(1.2);opacity:0.8}100%{transform:translate(-50%,-120%) scale(0.8);opacity:0}}

/* ===== Fab ===== */
.fab{
  position:fixed;bottom:32px;right:32px;z-index:50;
  width:56px;height:56px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;
  font-size:1.6rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(56,189,248,0.4);
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
  animation:fabPulse 3s ease-in-out infinite;
}
@keyframes fabPulse{0%,100%{box-shadow:0 4px 20px rgba(56,189,248,0.4)}50%{box-shadow:0 4px 35px rgba(56,189,248,0.7)}}
@keyframes replyPulse{0%,100%{box-shadow:0 4px 20px rgba(245,158,11,0.4)}50%{box-shadow:0 4px 35px rgba(245,158,11,0.7)}}
.fab:hover{transform:scale(1.15) rotate(90deg);box-shadow:0 6px 30px rgba(56,189,248,0.6)}
.fab:active{transform:scale(0.9)}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:200;display:none;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}}
.modal{
  background:#1a1a2e;border:1px solid var(--card-border);border-radius:20px;
  padding:32px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;
  animation:modalSlideIn 0.5s cubic-bezier(0.25,0.8,0.25,1.3);
}
@keyframes modalSlideIn{from{transform:translateY(40px) scale(0.95);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
html.light .modal{background:#fff}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:300;
  background:linear-gradient(90deg,#1e293b,#334155);color:#fff;
  padding:12px 28px;border-radius:50px;font-size:0.85rem;pointer-events:none;
  opacity:0;transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.3);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}

/* ===== Spark ===== */
.spark-container{position:fixed;inset:0;pointer-events:none;z-index:999}
.spark{
  position:absolute;width:6px;height:6px;border-radius:50%;
  background:#38bdf8;pointer-events:none;
  animation:sparkBurst 0.7s ease-out forwards;
}
@keyframes sparkBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}}

/* ===== Skeleton loading ===== */
.no-anim .row,.no-anim .skeleton{animation:none!important}
.no-anim .row{opacity:1!important;transform:none!important}
.skeleton{
  height:52px;background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;animation:shimmer 1.5s ease-in-out infinite;
  background:linear-gradient(90deg,var(--card-bg) 25%,rgba(255,255,255,0.03) 50%,var(--card-bg) 75%);
  background-size:200% 100%;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

footer{text-align:center;padding:24px;border-top:1px solid var(--footer-border);color:var(--footer-text);font-size:0.8rem;position:relative;z-index:1}
.empty{text-align:center;color:var(--text-dim);padding:48px 0;font-size:0.9rem;position:relative;z-index:1}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:24px;position:relative;z-index:1}
.pagination button{padding:6px 14px;border-radius:8px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;font-size:0.8rem;font-family:inherit;transition:all 0.2s}
.pagination button:hover:not(:disabled){color:var(--text);border-color:var(--border-hover)}
.pagination button:disabled{opacity:0.35;cursor:default}
.pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pagination .info{font-size:0.8rem;color:var(--text-dim);padding:0 8px}

@media(max-width:480px){
  .hero{padding:40px 12px 24px}.hero h1{font-size:1.5rem}
  .content{padding:0 8px 40px}.list{gap:4px}
  .row{flex-wrap:nowrap;gap:6px;padding:8px 10px}
  .row .rank{width:22px;font-size:0.75rem}
  .row .code{width:62px;font-size:0.8rem;letter-spacing:0;padding:2px 4px}
  .row .title{font-size:0.8rem}
  .row .sub{font-size:0.7rem}
  .row .stats{display:none}
  .row .actions{gap:1px}
  .row .btn{padding:3px 5px;font-size:0.62rem;min-width:28px}
  .fab{bottom:16px;right:16px;width:44px;height:44px;font-size:1.2rem}
  #replyFab{bottom:78px!important;right:16px!important;width:44px!important;height:44px!important;font-size:1.1rem!important}
  nav{padding:0 8px}
  .tabs{gap:4px}
  .tab{padding:6px 14px;font-size:0.75rem}
}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;position:relative;z-index:1}
.login h1{background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2rem}
.login input,.login textarea{padding:12px 20px;border-radius:12px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);font-size:1rem;outline:none;text-align:center;width:320px;font-family:system-ui,-apple-system,sans-serif}
.login input:focus,.login textarea:focus{border-color:var(--accent)}
.login button{padding:10px 32px;border-radius:50px;border:none;background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;font-size:0.95rem;cursor:pointer;font-weight:600;font-family:system-ui,-apple-system,sans-serif}
.container{max-width:1000px;margin:0 auto;padding:0 24px 60px;position:relative;z-index:1}
.login .err{color:#ef4444;font-size:0.85rem}
.glass-nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--nav-border);padding:0 24px;display:flex;justify-content:space-between;align-items:center;height:56px}
.glass-nav h1{font-size:1.3rem;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{padding:8px 18px;border-radius:50px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;font-size:0.8rem;font-family:system-ui,-apple-system,sans-serif;font-weight:500;transition:all 0.25s}
.btn:hover{color:var(--text);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;border:none}
.btn.danger{border-color:rgba(239,68,68,0.4);color:#ef4444}
.btn.ok{border-color:rgba(52,211,153,0.4);color:#34d399}
.btn.warn{border-color:rgba(251,191,36,0.4);color:#fbbf24}
.btn.sm{padding:4px 12px;font-size:0.7rem}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:14px 16px;text-align:center;backdrop-filter:blur(12px)}
.stat .val{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{font-size:0.7rem;color:var(--text-dim);margin-top:2px}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.chart-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px;position:relative;backdrop-filter:blur(12px)}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:10px 20px;border-radius:10px;font-size:0.85rem;color:#fff}
.toast-msg.ok{background:#34d399}.toast-msg.err{background:#ef4444}.toast-msg.info{background:var(--accent)}
.row{animation:rowIn 0.4s cubic-bezier(0.16,1,0.3,1) both}
.row:nth-child(1){animation-delay:0s}.row:nth-child(2){animation-delay:0.04s}.row:nth-child(3){animation-delay:0.08s}
.row:nth-child(4){animation-delay:0.12s}.row:nth-child(5){animation-delay:0.16s}.row:nth-child(n+6){animation-delay:0.2s}
@keyframes rowIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.row .code{font-size:1rem;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-width:75px}
.row .info{flex:1;min-width:0}.row .title{font-size:0.9rem;font-weight:600}.row .sub{font-size:0.75rem;color:var(--text-dim)}
.row .actions{display:flex;gap:4px}
.row.pending{border-left:3px solid #fbbf24}.row.rejected{opacity:0.5}
.row.dupe{border-left:3px solid #ef4444}.row.reported{border-left:3px solid #f59e0b}
</style>
<script src="../shared/js/config.js?v=2.1.4"></script>
<script src="../shared/js/sanitize.js?v=2.1.4"></script>

</head>
<body>
<div class="stars"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="glass-nav" id="navBar">
  <h1>BSide Olivia Lin</h1>
  <button class="theme-btn" id="themeToggle" title="切换日夜模式"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></button>
  <div class="btns">
    <button class="btn active" id="autoBtn" onclick="toggleAuto()">自动通过：开</button>
    <button class="btn ok" onclick="approveAllPending()">全部通过</button>
    <button class="btn warn" onclick="rejectAllPending()">全部拒绝</button>
    <button class="btn danger" onclick="deleteRejected()">清理已拒绝</button>
    <button class="btn" onclick="doLogout()">退出</button>
  </div>
</div>

<div class="container">
<div class="login" id="loginBox">
  <h1>BSide Olivia Lin</h1>
  
  <input type="password" id="pwInput" placeholder="管理密码" autofocus>
  <input type="text" id="totpInput" placeholder="Authenticator 6位码" maxlength="6" style="display:none;padding:12px 20px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;outline:none;text-align:center;width:320px;font-family:system-ui,-apple-system,sans-serif">
      <button id="loginBtn" onclick="doLogin()">进入管理</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="mainBox" style="display:none">
  <div class="tabs">
    <button class="tab active" data-filter="all" id="tabAll">全部</button>
    <button class="tab" data-filter="pending" id="tabPending">待审核</button>
    <button class="tab" data-filter="approved" id="tabApproved">已通过</button>
    <button class="tab" data-filter="rejected" id="tabRejected">已拒绝</button>
    <button class="tab" data-filter="reported" id="tabReported">⚠ 举报</button>
    <button class="tab" data-filter="feedback" id="tabFeedback">💬 反馈</button>
  </div>

  <div class="stats" id="stats"></div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:4px"><button class="btn sm" id="chartToggle" onclick="window._chartMode=window._chartMode==='24h'?'7d':'24h';load()">切为7天</button></div>
  <div class="charts">
    <div class="chart-box"><canvas id="chartLikes"></canvas></div>
    <div class="chart-box"><canvas id="chartStatus"></canvas></div>
    <div class="chart-box"><canvas id="chartUploads"></canvas></div>
    <div class="chart-box"><canvas id="chartViews"></canvas></div>
  </div>

  <div class="list" id="list"></div>
  <div class="list" id="feedbackList" style="display:none"></div>
  <div class="empty" id="empty">加载中...</div>
</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ================================================================
// Admin JS — 100% 保留原有 Auth/CRUD/Chart/Feedback 逻辑
// ================================================================

// SB config from shared/js/
let filter = 'all', autoApprove = true, dataCache = [], feedbackCache = [];

// ---- 背景特效 ----


// ---- Toast ----
function showToast(msg,type='info'){
  const c=document.getElementById('toastContainer');if(!c)return
  const d=document.createElement('div');d.className='toast-msg '+type;d.textContent=msg;c.appendChild(d)
  setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.3s';setTimeout(()=>d.remove(),300)},2500)
}

// ---- SHA256 ----
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}

// ---- Auth ----
let _loginStage=0;
async function doLogin(){
  if(_loginStage===0){
    const pw=document.getElementById('pwInput').value
    if(!pw){document.getElementById('loginErr').textContent='请输入密码';return}
    try{const r=await adminApi('check_pw',{pw});if(!r||r.error){document.getElementById('loginErr').textContent='密码错误';return}}catch(e){document.getElementById('loginErr').textContent='验证失败';return}
    sessionStorage.setItem("admin_pw",pw);
    _loginStage=1;document.getElementById('pwInput').style.display='none'
    document.getElementById('totpInput').style.display='block'
    document.getElementById('loginBtn').textContent='验证 TOTP'
    document.getElementById('loginErr').textContent=''
    document.getElementById('pwInput').value=''
    return
  }
  const code=document.getElementById('totpInput').value.trim();document.getElementById('loginErr').textContent=''
  if(!code||!/^\d{6}$/.test(code)){document.getElementById('loginErr').textContent='请输入6位验证码';return}
  try{const r=await adminApi('check_totp',{code});if(r!==true){document.getElementById('loginErr').textContent='验证码错误';return}}catch(e){document.getElementById('loginErr').textContent='验证失败';return}
  const tok=Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('')
  localStorage.setItem('admin_session',tok)
  showMain()
}
function showMain(){
  document.getElementById('loginBox').style.display='none';document.getElementById('mainBox').style.display='block'
  const nb=document.getElementById('navBar');if(nb)nb.style.display='flex';init()
}
function doLogout(){localStorage.removeItem('admin_session');localStorage.removeItem('admin_pw');document.getElementById('loginBox').style.display='flex';document.getElementById('mainBox').style.display='none';const nb=document.getElementById('navBar');if(nb)nb.style.display='none'}
function toggleAuto(){autoApprove=!autoApprove;document.getElementById('autoBtn').textContent='自动通过：'+(autoApprove?'开':'关');document.getElementById('autoBtn').className='btn '+(autoApprove?'active':'');showToast(autoApprove?'新提交将自动通过':'新提交需手动审核','info')}

// ---- API ----
const SB_URL='https://naivizrdefonlelndzqr.supabase.co';const EDGE_URL="https://naivizrdefonlelndzqr.supabase.co/functions/v1/admin";

const SB_KEY='sb_publishable_-LpxA4RGDCS-NzuHoeMYDg_jD7bdDTq';
const sbApi = async function(path, options = {}) {
    const url=`${SB_URL}/rest/v1/${path}`;
  const hdrs={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=minimal',...(options.headers||{})};
  const res=await fetch(url,{headers:hdrs,method:options.method||'GET',body:options.body});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
async function adminApi(action, payload={}){
  const pw=sessionStorage.getItem("admin_pw")||"";
  const res=await fetch(EDGE_URL,{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+SB_KEY},body:JSON.stringify({password:pw,action,payload})});
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

// ---- Init ----
async function init(){
  try{
    const tabs=document.querySelectorAll('.tab');tabs.forEach(t=>{t.onclick=()=>{filter=t.dataset.filter;tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');filter==='feedback'?loadFeedback():load()}})
    load()
  }catch(e){console.error(e)}
}

// ---- Load ----
async function load(){
  try{
    dataCache=filter==='feedback'?[]:await sbApi('linli_codes?select=*&order=created_at.desc&limit=200')
    renderStats();renderChart();renderList()
  }catch(e){document.getElementById('empty').textContent='加载失败: '+e.message}
}

async function renderStats(){
  const all=dataCache;const dupeMap=new Map();all.forEach(x=>{const c=x.code;dupeMap.set(c,(dupeMap.get(c)||0)+1)})
  const dupeCount=[...dupeMap.values()].filter(v=>v>1).length
  let pvCount=0;try{const pv=await sbApi('page_visits?select=id&order=id.desc&limit=1');pvCount=pv[0]?.id||0}catch(e){}
  const totalViews=all.reduce((s,x)=>s+(x.views||0),0);const totalLikes=all.reduce((s,x)=>s+(x.likes||0),0)
  const totalReports=all.reduce((s,x)=>s+(x.reports||0),0)
  document.getElementById('stats').innerHTML=[
    {v:all.length,l:'总提交'},{v:all.filter(x=>x.status==='approved').length,l:'已通过'},
    {v:all.filter(x=>x.status==='pending').length,l:'待审核'},{v:dupeCount,l:'重复码',c:'#ef4444'},
    {v:totalViews,l:'总浏览'},{v:totalLikes,l:'总点赞'},{v:pvCount,l:'页面访问'},
    {v:totalReports,l:'无效反馈',c:totalReports>0?'#f59e0b':''}
  ].map(s=>'<div class="stat"><div class="val"'+(s.c?' style="color:'+s.c+';-webkit-text-fill-color:'+s.c+'"':'')+'>'+s.v+'</div><div class="lbl">'+s.l+'</div></div>').join('')
}

function renderChart(){
  const boxW=document.querySelector('.chart-box')?.clientWidth||400
  setTimeout(async ()=>{
    const top10=dataCache.filter(x=>x.status==='approved').sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,8)
    const likes=top10.map(x=>({label:(x.title||'').slice(0,6),value:x.likes||0}))
    const status=[{label:'已通过',value:dataCache.filter(x=>x.status==='approved').length},{label:'待审核',value:dataCache.filter(x=>x.status==='pending').length},{label:'已拒绝',value:dataCache.filter(x=>x.status==='rejected').length}]
    const now=new Date()
    // 24h hourly
    const hours=[];for(let i=23;i>=0;i--){const h=new Date(now);h.setHours(h.getHours()-i);hours.push({label:h.getHours()+':00',value:0})}
    const upHours=[...hours.map(h=>({...h}))];const vwHours=[...hours.map(h=>({...h}))]
    // 7d daily
    const days=[];for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push({label:(d.getMonth()+1)+'/'+d.getDate(),value:0})}
    const upDays=[...days.map(d=>({...d}))];const vwDays=[...days.map(d=>({...d}))]
    dataCache.forEach(x=>{if(x.created_at){const d=new Date(x.created_at);const diffH=(now-d)/3600000;const diffD=(now-d)/86400000;
      if(diffH>=0&&diffH<24){const idx=23-Math.floor(diffH);if(idx>=0&&idx<24)upHours[idx].value++}
      if(diffD>=0&&diffD<7){const idx=6-Math.floor(diffD);if(idx>=0&&idx<7)upDays[idx].value++}
    }})
    // Page visits for views chart
    try{const pv=await sbApi('page_visits?select=visited_at&page=eq.linli&order=visited_at.desc&limit=100000');pv.forEach(v=>{if(v.visited_at){const d=new Date(v.visited_at);const diffH=(now-d)/3600000;const diffD=(now-d)/86400000;
      if(diffH>=0&&diffH<24){const idx=23-Math.floor(diffH);if(idx>=0&&idx<24)vwHours[idx].value++}
      if(diffD>=0&&diffD<7){const idx=6-Math.floor(diffD);if(idx>=0&&idx<7)vwDays[idx].value++}
    }})}catch(e){}
    const mode=window._chartMode||'24h'
    const upData=mode==='24h'?upHours:upDays
    const vwData=mode==='24h'?vwHours:vwDays
    const modeLabel=mode==='24h'?'24h':'7天'
    try{window.drawBarChart?.(document.getElementById('chartLikes'),likes.length?likes:[{label:'-',value:1}],{width:boxW,height:260,title:'点赞排行'})}catch(e){}
    try{window.drawPieChart?.(document.getElementById('chartStatus'),status.length?status:[{label:'-',value:1}],{title:'审核状态分布'})}catch(e){}
    try{window.drawBarChart?.(document.getElementById('chartUploads'),upData,{width:boxW,height:260,title:modeLabel+'上传量',barColor:'#818cf8'})}catch(e){}
    try{window.drawBarChart?.(document.getElementById('chartViews'),vwData,{width:boxW,height:260,title:modeLabel+'浏览量',barColor:'#34d399'})}catch(e){}
    // Toggle button
    const toggleBtn=document.getElementById('chartToggle')
    if(toggleBtn)toggleBtn.textContent=mode==='24h'?'切为7天':'切为24h'
  },200)
}

function renderList(){
  const lst=document.getElementById('list'),fl=document.getElementById('feedbackList'),em=document.getElementById('empty')
  lst.innerHTML='';fl.innerHTML=''
  let items=dataCache
  if(filter==='reported')items=dataCache.filter(x=>(x.reports||0)>0)
  else if(filter!=='all'&&filter!=='feedback')items=dataCache.filter(x=>x.status===filter)
  if(!items.length){em.style.display='block';em.textContent='暂无数据';return}
  em.style.display='none'
  const dupeMap=new Map();items.forEach(x=>{const c=x.code;dupeMap.set(c,(dupeMap.get(c)||0)+1)})
  const dupeSet=new Set([...dupeMap.entries()].filter(([,v])=>v>1).map(([k])=>k))
  // sort dupes first, grouped by code
  items=[...items].sort((a,b)=>{const da=dupeSet.has(a.code),db=dupeSet.has(b.code);if(da&&db)return a.code.localeCompare(b.code)||b.id-a.id;if(da)return -1;if(db)return 1;return 0})
  let lastDupe=''
  items.forEach((item,i)=>{
    const isDupe=dupeSet.has(item.code)
    if(isDupe&&item.code!==lastDupe){const sep=document.createElement('div');sep.style.cssText='text-align:center;color:#ef4444;font-size:0.7rem;padding:4px 0';sep.textContent='——— '+item.code+' 重复 ———';lst.appendChild(sep);lastDupe=item.code}
    const d=document.createElement('div');let cls='row '
    if(item.status==='pending')cls+='pending ';if(item.status==='rejected')cls+='rejected '
    if(isDupe)cls+='dupe '
    if((item.reports||0)>0)cls+='reported '
    d.className=cls
    const desc=item.description||(item.author&&item.author!=='匿名'?item.author:'')
    const tags=item.tags?item.tags.split(/[\s,]+/).filter(Boolean).slice(0,3):[]
    d.innerHTML='<span style="font-size:0.7rem;color:var(--text-dim);min-width:45px">'+item.status+'</span><div class="code">'+escapeHtml(item.code)+(isDupe?' <span style="background:#ef4444;color:#fff;font-size:0.55rem;padding:1px 5px;border-radius:4px">重复</span>':'')+'</div><div class="info"><div class="title">'+escapeHtml(item.title)+'</div><div class="sub">'+(desc?escapeHtml(desc):'')+' '+tags.map(t=>'<span style="font-size:0.65rem;color:var(--text-dim)">#'+escapeHtml(t)+'</span>').join(' ')+'</div></div><span style="font-size:0.75rem;color:var(--text-dim);white-space:nowrap">👁'+(item.views||0)+' ❤'+(item.likes||0)+(item.reports>0?' ⚠'+(item.reports||0):'')+'</span><div class="actions">'+
      (item.status==='pending'?'<button class="btn ok sm" onclick="approve('+item.id+')">通过</button><button class="btn danger sm" onclick="reject('+item.id+')">拒绝</button>':'')+
      '<button class="btn danger sm" onclick="del('+item.id+')">删除</button></div>'
    lst.appendChild(d)
  })
}

// ---- Actions ----
async function approve(id){try{await adminApi('approve',{id});load();showToast('已通过','ok')}catch(e){showToast('操作失败','err')}}
async function reject(id){try{await adminApi('reject',{id});load();showToast('已拒绝','info')}catch(e){showToast('操作失败','err')}}
async function del(id){if(!confirm('确认删除？'))return;try{await adminApi('delete',{id});load();showToast('已删除','ok')}catch(e){showToast('操作失败','err')}}
async function approveAllPending(){const ids=dataCache.filter(i=>i.status==='pending').map(i=>i.id);if(ids.length){try{await adminApi('batch_approve',{ids})}catch(e){}}load();showToast('已全部通过','ok')}
async function rejectAllPending(){const ids2=dataCache.filter(i=>i.status==='pending').map(i=>i.id);if(ids2.length){try{await adminApi('batch_reject',{ids:ids2})}catch(e){}}load();showToast('已全部拒绝','info')}
async function deleteRejected(){const rejected=dataCache.filter(i=>i.status==='rejected');if(!rejected.length||!confirm('确认删除所有'+rejected.length+'条已拒绝记录？'))return;const rids=rejected.map(i=>i.id);if(rids.length){try{await adminApi('batch_delete',{ids:rids})}catch(e){}}load();showToast('已清理','ok')}
async function approveAllPending(){for(const item of dataCache.filter(i=>i.status==='pending')){try{await sbApi('linli_codes?id=eq.'+item.id,{method:'PATCH',body:JSON.stringify({status:'approved'})})}catch(e){}}load();showToast('批量操作完成','ok')}
async function rejectAllPending(){for(const item of dataCache.filter(i=>i.status==='pending')){try{await sbApi('linli_codes?id=eq.'+item.id,{method:'PATCH',body:JSON.stringify({status:'rejected'})})}catch(e){}}load();showToast('批量操作完成','info')}
async function deleteRejected(){const rejected=await sbApi('linli_codes?select=id&status=eq.rejected');const rids=rejected.map(i=>i.id);if(rids.length){try{await adminApi('batch_delete',{ids:rids})}catch(e){}}load();showToast('已清理','ok')}

// ---- Feedback ----
async function loadFeedback(){console.log('loading feedback...');
  try{feedbackCache=await sbApi('feedbacks?select=*&order=created_at.desc&limit=50');renderFeedback()}catch(e){}
}
function renderFeedback(){
  const lst=document.getElementById('list'),fl=document.getElementById('feedbackList'),em=document.getElementById('empty')
  lst.innerHTML='';fl.style.display='block';fl.innerHTML=''
  if(!feedbackCache.length){em.style.display='block';em.textContent='暂无反馈';return}
  em.style.display='none'
  feedbackCache.forEach(f=>{
    const d=document.createElement('div');d.className='row'
    const replied=f.reply?'<span style="font-size:0.65rem;color:var(--ok);margin-right:4px">已回复</span>':'';d.innerHTML='<div class="info"><div class="title">'+escapeHtml(f.content||'')+'</div><div class="sub" style="font-size:0.65rem">'+new Date(f.created_at).toLocaleString()+'</div>'+(f.reply?'<div style="font-size:0.8rem;color:var(--ok);margin-top:4px">回复: '+escapeHtml(f.reply)+'</div>':'')+'</div><div class="actions">'+replied+'<button class="btn ok sm" onclick="replyFeedback('+f.id+')">回复</button>'+(f.reply?'<button class="btn danger sm" onclick="clearReply('+f.id+')">删回复</button>':'')+'<button class="btn ok sm" onclick="markFeedback('+f.id+',\'resolved\')">解决</button><button class="btn danger sm" onclick="delFeedback('+f.id+')">删除</button></div>'
    fl.appendChild(d)
  })
}
async function markFeedback(id,status){try{await adminApi('feedback_mark',{id,status});loadFeedback();showToast('状态已更新','ok')}catch(e){}}
async function delFeedback(id){if(!confirm('确认删除？'))return;try{await adminApi('feedback_delete',{id});loadFeedback()}catch(e){}}
async function clearReply(id){if(!confirm('删除这条回复？'))return;try{await sbApi('feedbacks?id=eq.'+id,{method:'PATCH',body:JSON.stringify({reply:'',reply_read:true})});loadFeedback();showToast('已删除回复','ok')}catch(e){showToast('操作失败','err')}}
let _replyId=0;function replyFeedback(id){_replyId=id;document.getElementById('replyOverlay').style.display='flex';document.getElementById('replyText').value='';document.getElementById('replyText').focus()}
function closeReply(){document.getElementById('replyOverlay').style.display='none';_replyId=0}
async function doReply(){const txt=document.getElementById('replyText').value.trim();if(!txt||!_replyId)return;try{await sbApi('feedbacks?id=eq.'+_replyId,{method:'PATCH',body:JSON.stringify({reply:txt,reply_read:false,replied_at:new Date().toISOString()})});closeReply();loadFeedback();showToast('已回复','ok')}catch(e){showToast('操作失败','err')}}
// Auto-restore session
const html=document.documentElement;function applyTheme(mode){html.classList.remove("light","dark");if(mode==="light")html.classList.add("light");if(mode==="dark")html.classList.add("dark")}const st=localStorage.getItem("theme");if(st)applyTheme(st);document.getElementById("themeToggle").addEventListener("click",()=>{const cur=html.classList.contains("light")?"light":html.classList.contains("dark")?"dark":"auto";if(cur==="auto"){const sd=matchMedia("(prefers-color-scheme:dark)").matches;localStorage.setItem("theme",sd?"light":"dark");applyTheme(sd?"light":"dark")}else if(cur==="dark"){localStorage.setItem("theme","light");applyTheme("light")}else{localStorage.setItem("theme","dark");applyTheme("dark")}});

// Auto refresh every 5 minutes
setInterval(()=>{if(document.getElementById('mainBox').style.display!=='none')load()},300000)
</script>
<div class="modal-overlay" id="replyOverlay" style="position:fixed;inset:0;z-index:300;display:none;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center" onclick="if(event.target===this)closeReply()">
  <div class="modal" style="background:var(--elevated,#1c1c1c);border:1px solid var(--border);border-radius:16px;padding:28px;width:400px;max-width:90vw">
    <h3 style="font-size:1rem;font-weight:600;margin-bottom:16px;text-align:center;color:var(--text)">回复反馈</h3>
    <textarea id="replyText" placeholder="输入回复内容..." maxlength="500" style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.9rem;outline:none;resize:vertical;font-family:system-ui,-apple-system,sans-serif;min-height:80px"></textarea>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn" onclick="closeReply()">取消</button>
      <button class="btn primary" onclick="doReply()">发送回复</button>
    </div>
  </div>
</div>
<div style="position:fixed;bottom:8px;right:12px;font-size:0.75rem;color:var(--text-muted);z-index:99;opacity:0.8;background:var(--card-bg);padding:2px 8px;border-radius:4px">v2.2.11</div>
</body>
