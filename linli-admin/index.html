<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://naivizrdefonlelndzqr.supabase.co; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSide Olivia Lin · 管理</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<style>
/* admin-only styles — shared styles in ../shared/css/theme.css */
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;position:relative;z-index:1}
.login h1{background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2rem}
.login input,.login textarea{padding:12px 20px;border-radius:12px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);font-size:1rem;outline:none;text-align:center;width:320px;font-family:system-ui,-apple-system,sans-serif}
.login input:focus,.login textarea:focus{border-color:var(--accent)}
.login button{padding:10px 32px;border-radius:50px;border:none;background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;font-size:0.95rem;cursor:pointer;font-weight:600;font-family:system-ui,-apple-system,sans-serif}
.container{max-width:1000px;margin:0 auto;padding:0 24px 60px;position:relative;z-index:1}
.login .err{color:#ef4444;font-size:0.85rem}
.glass-nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--nav-border);padding:0 24px;display:flex;justify-content:space-between;align-items:center;height:56px}
.glass-nav h1{font-size:1.3rem;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{padding:8px 18px;border-radius:50px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;font-size:0.8rem;font-family:system-ui,-apple-system,sans-serif;font-weight:500;transition:all 0.25s}
.btn:hover{color:var(--text);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(90deg,#38bdf8,#818cf8);color:#fff;border:none}
.btn.danger{border-color:rgba(239,68,68,0.4);color:#ef4444}
.btn.ok{border-color:rgba(52,211,153,0.4);color:#34d399}
.btn.warn{border-color:rgba(251,191,36,0.4);color:#fbbf24}
.btn.sm{padding:4px 12px;font-size:0.7rem}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.range-bar{display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-bottom:16px}
.range-bar span.label{font-size:0.7rem;color:var(--text-dim);margin-right:6px}
.range-btn{padding:4px 12px;border-radius:50px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-muted);cursor:pointer;font-size:0.7rem;font-family:system-ui,-apple-system,sans-serif;transition:all 0.2s}
.range-btn:hover{color:var(--text)}
.range-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.admin-search{display:flex;gap:8px;margin-bottom:16px}
.admin-search input{flex:1;padding:8px 14px;border-radius:10px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);font-size:0.8rem;outline:none;font-family:inherit}
.admin-search input:focus{border-color:var(--accent)}
.admin-search select{padding:8px 12px;border-radius:10px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);font-size:0.8rem;outline:none;font-family:inherit;cursor:pointer}
.admin-search select:focus{border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:14px 16px;text-align:center;backdrop-filter:blur(12px)}
.stat .val{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{font-size:0.7rem;color:var(--text-dim);margin-top:2px}
.charts{display:grid;gap:16px;margin-bottom:16px}
.charts-top{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.charts-bottom{grid-template-columns:repeat(2,1fr)}
@media(max-width:768px){.charts-top,.charts-bottom{grid-template-columns:1fr}}
.chart-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px;position:relative;backdrop-filter:blur(12px)}
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:10px 20px;border-radius:10px;font-size:0.85rem;color:#fff}
.toast-msg.ok{background:#34d399}.toast-msg.err{background:#ef4444}.toast-msg.info{background:var(--accent)}
.row{animation:rowIn 0.4s cubic-bezier(0.16,1,0.3,1) both}
.row:nth-child(1){animation-delay:0s}.row:nth-child(2){animation-delay:0.04s}.row:nth-child(3){animation-delay:0.08s}
.row:nth-child(4){animation-delay:0.12s}.row:nth-child(5){animation-delay:0.16s}.row:nth-child(n+6){animation-delay:0.2s}
@keyframes rowIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.row .code{font-size:1rem;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-width:75px}
.row .info{flex:1;min-width:0}.row .title{font-size:0.9rem;font-weight:600}.row .sub{font-size:0.75rem;color:var(--text-dim)}
.row .actions{display:flex;gap:4px}
.row.pending{border-left:3px solid #fbbf24}.row.rejected{opacity:0.5}
.row.dupe{border-left:3px solid #ef4444}.row.reported{border-left:3px solid #f59e0b}
.tag-edit{cursor:pointer;font-size:0.65rem;color:var(--text-dim);transition:all 0.2s;border-radius:4px;padding:1px 4px}
.tag-edit:hover{background:var(--card-bg);color:var(--accent)}
.tag-input{font-size:0.7rem!important}

/* Mobile admin */
@media(max-width:768px){
  .glass-nav{flex-wrap:wrap;height:auto;padding:8px 12px;gap:4px}
  .glass-nav h1{font-size:1rem;width:100%;text-align:center}
  .glass-nav .btns{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;width:100%}
  .glass-nav .btn{padding:5px 10px;font-size:0.65rem}
  .glass-nav .theme-btn{position:absolute;top:8px;right:12px}
  .container{padding:0 8px 40px}
  .stats{grid-template-columns:repeat(4,1fr);gap:6px}
  .stat{padding:8px 6px}
  .stat .val{font-size:1rem}
  .stat .lbl{font-size:0.6rem}
  .charts{grid-template-columns:1fr;gap:10px}
  .range-bar{justify-content:center;flex-wrap:wrap;margin-bottom:10px}
  .range-btn{padding:3px 8px;font-size:0.65rem}
  .tabs{gap:3px;flex-wrap:wrap}
  .tab{padding:6px 10px;font-size:0.7rem}
  .row{gap:4px;padding:8px 10px;flex-wrap:wrap}
  .row .code{font-size:0.8rem;min-width:56px}
  .row .info{min-width:120px}
  .row .title{font-size:0.8rem}
  .row .sub{font-size:0.68rem}
  .row .actions{gap:2px}
  .row .btn{padding:3px 5px;font-size:0.6rem;min-width:24px}
  .login input,.login textarea{width:90vw}
  .modal{width:95vw;padding:20px}
}
@media(max-width:400px){
  .stats{grid-template-columns:repeat(3,1fr)}
}
</style>

<div class="stars"></div>

<div class="glass-nav" id="navBar">

  <button class="theme-btn" id="themeToggle" title="切换日夜模式"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></button>

<div class="container">
<div class="login" id="loginBox">
  <h1>BSide Olivia Lin</h1>
  
  <input type="password" id="pwInput" placeholder="管理密码" autofocus>
  <input type="text" id="totpInput" placeholder="Authenticator 6位码" maxlength="6" style="display:none;padding:12px 20px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;outline:none;text-align:center;width:320px;font-family:system-ui,-apple-system,sans-serif">

<script>
// ================================================================
// Admin JS — 100% 保留原有 Auth/CRUD/Chart/Feedback 逻辑
// ================================================================

// SB config from shared/js/
let filter = 'all', autoApprove = true, dataCache = [], feedbackCache = [];

// ---- 背景特效 ----


// ---- Toast ----
function showToast(msg,type='info'){
  const c=document.getElementById('toastContainer');if(!c)return
  const d=document.createElement('div');d.className='toast-msg '+type;d.textContent=msg;c.appendChild(d)
  setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.3s';setTimeout(()=>d.remove(),300)},2500)
}

// ---- SHA256 ----
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}

// ---- Auth ----
let _loginStage=0;
async function doLogin(){
  if(_loginStage===0){
    const pw=document.getElementById('pwInput').value
    if(!pw){document.getElementById('loginErr').textContent='请输入密码';return}
    try{const r=await adminApi('check_pw',{},pw);if(!r||r.error){document.getElementById('loginErr').textContent='密码错误';return}}catch(e){document.getElementById('loginErr').textContent=e.name==='AbortError'?'连接超时，检查网络后刷新重试':'验证失败: '+(e.message||'网络异常')}
    sessionStorage.setItem("admin_pw",pw);
    _loginStage=1;document.getElementById('pwInput').style.display='none'
    document.getElementById('totpInput').style.display='block'
    document.getElementById('loginBtn').textContent='验证 TOTP'
    document.getElementById('loginErr').textContent=''
    document.getElementById('pwInput').value=''
    return
  }
  const code=document.getElementById('totpInput').value.trim();document.getElementById('loginErr').textContent=''
  if(!code||!/^\d{6}$/.test(code)){document.getElementById('loginErr').textContent='请输入6位验证码';return}
  try{const r=await adminApi('check_totp',{code});if(r!==true){document.getElementById('loginErr').textContent='验证码错误';return}}catch(e){document.getElementById('loginErr').textContent='验证失败';return}
  const tok=Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('')
  localStorage.setItem('admin_session',tok)
  showMain()
}
function showMain(){
  document.getElementById('loginBox').style.display='none';document.getElementById('mainBox').style.display='block'
  const nb=document.getElementById('navBar');if(nb)nb.style.display='flex';init()
}
function exportCSV(){
  var items=dataCache;if(!items.length){showToast('无数据可导出','info');return}
  var csv='code,title,description,tags,views,likes,status,created_at\n';
  items.forEach(function(x){csv+=[x.code,x.title,(x.description||'').replace(/"/g,'""'),(x.tags||'').replace(/"/g,'""'),x.views,x.likes,x.status,x.created_at].map(function(v){return'"'+v+'"'}).join(',')+'\n'});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='linli_codes_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function doLogout(){localStorage.removeItem('admin_session');sessionStorage.removeItem('admin_pw');document.getElementById('loginBox').style.display='flex';document.getElementById('mainBox').style.display='none';const nb=document.getElementById('navBar');if(nb)nb.style.display='none'}
function toggleAuto(){autoApprove=!autoApprove;document.getElementById('autoBtn').textContent='自动通过：'+(autoApprove?'开':'关');document.getElementById('autoBtn').className='btn '+(autoApprove?'active':'');showToast(autoApprove?'新提交将自动通过':'新提交需手动审核','info')}

// ---- API ----
const SB_URL='https://naivizrdefonlelndzqr.supabase.co';const EDGE_URL="https://naivizrdefonlelndzqr.supabase.co/functions/v1/admin";

const SB_KEY='sb_publishable_-LpxA4RGDCS-NzuHoeMYDg_jD7bdDTq';
const sbApi = async function(path, options = {}) {
    const url=`${SB_URL}/rest/v1/${path}`;
  const hdrs={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json',Prefer:'return=minimal',...(options.headers||{})};
  const res=await fetch(url,{headers:hdrs,method:options.method||'GET',body:options.body});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
async function adminApi(action, payload={}, passOverride){
  const pw=passOverride||sessionStorage.getItem("admin_pw")||"";
  const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),15000);
  try{
    const res=await fetch(EDGE_URL,{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+SB_KEY},body:JSON.stringify({password:pw,action,payload}),signal:ctrl.signal});
    clearTimeout(timer);
    if(!res.ok)throw new Error(await res.text());
    return res.json();
  }catch(e){clearTimeout(timer);throw e}
}

// ---- Init ----
var _searchQ='',_catFilter=''
async function init(){
  try{
    var catSel=document.getElementById('catFilter')
    TAG_CATS.forEach(function(c){if(c.id!=='other'){var o=document.createElement('option');o.value=c.id;o.textContent=c.n;catSel.appendChild(o)}})
    document.getElementById('dataPanel').style.display='none'
    var tabs=document.querySelectorAll('#mainBox .tabs .tab');tabs.forEach(function(t){t.onclick=function(){filter=t.dataset.filter;tabs.forEach(function(x){return x.classList.remove('active')});t.classList.add('active');var fbBar=document.getElementById('fbFilterBar'),dcList=document.getElementById('discussList'),fbList=document.getElementById('feedbackList'),dp=document.getElementById('dataPanel'),lst=document.getElementById('list');if(filter==='feedback'){fbBar.style.display='block';fbList.style.display='block';dcList.style.display='none';dp.style.display='none';lst.style.display='none';loadFeedback()}else if(filter==='discuss'){fbBar.style.display='none';fbList.style.display='none';dcList.style.display='block';dp.style.display='none';lst.style.display='none';loadDiscuss()}else if(filter==='data'){fbBar.style.display='none';fbList.style.display='none';dcList.style.display='none';dp.style.display='block';lst.style.display='block';load()}else{fbBar.style.display='none';fbList.style.display='none';dcList.style.display='none';dp.style.display='none';lst.style.display='block';load()}}})
    load()
  }catch(e){console.error(e)}
}
function doAdminSearch(){
  _searchQ=document.getElementById('searchAdmin').value.trim().toLowerCase()
  _catFilter=document.getElementById('catFilter').value
  renderList()
}

// ---- Load ----
async function load(){
  try{
    dataCache=filter==='feedback'?[]:await sbApi('linli_codes?select=*&order=created_at.desc&limit=1000')
    renderStats();renderChart();renderList()
  }catch(e){console.error(e);document.getElementById('empty').textContent='加载失败，请检查网络后刷新重试'}
}

async function renderStats(){
  const all=dataCache;const dupeMap=new Map();all.forEach(x=>{const c=x.code;dupeMap.set(c,(dupeMap.get(c)||0)+1)})
  const dupeCount=[...dupeMap.values()].filter(v=>v>1).length
  let pvCount=0;try{const pv=await sbApi('page_visits?select=id&order=id.desc&limit=1');pvCount=pv[0]?.id||0}catch(e){}
  const totalViews=all.reduce((s,x)=>s+(x.views||0),0);const totalLikes=all.reduce((s,x)=>s+(x.likes||0),0)
  const totalReports=all.reduce((s,x)=>s+(x.reports||0),0)
  document.getElementById('stats').innerHTML=[
    {v:all.length,l:'总提交'},{v:all.filter(x=>x.status==='approved').length,l:'已通过'},
    {v:all.filter(x=>x.status==='pending').length,l:'待审核'},{v:dupeCount,l:'重复码',c:'#ef4444'},
    {v:totalViews,l:'总浏览'},{v:totalLikes,l:'总点赞'},{v:pvCount,l:'页面访问'},
    {v:totalReports,l:'无效反馈',c:totalReports>0?'#f59e0b':''}
  ].map(s=>'<div class="stat"><div class="val"'+(s.c?' style="color:'+s.c+';-webkit-text-fill-color:'+s.c+'"':'')+'>'+s.v+'</div><div class="lbl">'+s.l+'</div></div>').join('')
}

// ---- Tag categories (mirrors linli CATS) ----
const TAG_CATS=[
  {id:'vocaloid',n:'术力口',k:['v家','术力口','vocaloid','初音未来','miku']},
  {id:'anime',n:'番剧OP/ED',k:['动漫','番剧','oped','anime','animenz','air','clannad','cl','eva','fate','86','吉卜力','鸟之诗','缘之空','你的名字','夏日口袋','紫罗兰永恒花园','我推的孩子','凉宫春日','魔法少女小圆','咒术回战','进击的巨人','寄生兽','末日','天之少女','罪恶王冠','re:zero','yoasobi','凡人修仙传','命运石之门','莉可丽丝','斩服少女','angel beats','86不存在的战区','saki酱','roselia']},
  {id:'genshin',n:'原神',k:['原神','genshin','蒙德','璃月','渊下宫','纳塔','挪德卡莱','可莉','芙宁娜','茜特菈莉','哥伦比亚','少偶','莉奈娅']},
  {id:'honkai',n:'崩坏系列',k:['崩坏','崩铁','崩坏3','honkai','崩坏星穹铁道','崩坏三','知更鸟','昔涟','翁法洛斯','希儿','耀嘉音']},
  {id:'zzz',n:'绝区零',k:['绝区零','zzz']},
  {id:'acg',n:'其他ACG',k:['游戏','acg','东方','ff14','舞萌','轨迹系列','blacksouls','战地风云','去月球','尼尔机械纪元','我的世界']},
  {id:'other',n:'其他',k:[]}
]
function tagCat(tags){
  var t=(tags||'').toLowerCase()
  var words=t.split(/[\s,]+/)
  for(var i=0;i<TAG_CATS.length;i++){
    var c=TAG_CATS[i];if(!c.k.length)continue
    for(var j=0;j<c.k.length;j++){
      var kw=c.k[j].toLowerCase()
      for(var w=0;w<words.length;w++){if(words[w]===kw)return c.id}
      if(kw.length>4&&t.indexOf(kw)>=0)return c.id
    }
  }
  return 'other'
}
function tagCatName(id){var c=TAG_CATS.find(function(x){return x.id===id});return c?c.n:id}

window._chartMode='24h'
function setRange(mode){

function timeSlots(mode){
  var now=new Date(),slots=[],i
  if(mode==='24h'){for(i=23;i>=0;i--){var h=new Date(now);h.setHours(h.getHours()-i);slots.push({label:h.getHours()+':00',value:0,ts:h})}}
  else if(mode==='7d'){for(i=6;i>=0;i--){var d=new Date(now);d.setDate(d.getDate()-i);slots.push({label:(d.getMonth()+1)+'/'+d.getDate(),value:0,ts:d})}}
  else if(mode==='30d'){for(i=29;i>=0;i--){var d2=new Date(now);d2.setDate(d2.getDate()-i);slots.push({label:(d2.getMonth()+1)+'/'+d2.getDate(),value:0,ts:d2})}}
  else{for(i=11;i>=0;i--){var m=new Date(now.getFullYear(),now.getMonth()-i,1);slots.push({label:(m.getMonth()+1)+'月',value:0,ts:m})}}
  return slots
}
function slotIndex(slots,targetDate,mode){
  var diffMs=targetDate.getTime()
  for(var i=slots.length-1;i>=0;i--){
    var slotMs=slots[i].ts.getTime()
    if(mode==='all'){if(diffMs>=slotMs)return i}
    else if(mode==='24h'){if(diffMs>=slotMs&&diffMs<slotMs+3600000)return i}
    else{if(targetDate.toDateString()===slots[i].ts.toDateString())return i}
  }
  return -1
}

function renderChart(){
  var now=new Date(),mode=window._chartMode||'24h'
  var top10=dataCache.filter(function(x){return x.status==='approved'}).sort(function(a,b){return(b.likes||0)-(a.likes||0)}).slice(0,8)
  var likes=top10.map(function(x){return{label:(x.title||'').slice(0,6),value:x.likes||0,_id:x.id}})
  var status=[
    {label:'已通过',value:dataCache.filter(function(x){return x.status==='approved'}).length,color:'#34d399'},
    {label:'待审核',value:dataCache.filter(function(x){return x.status==='pending'}).length,color:'#fbbf24'},
    {label:'已拒绝',value:dataCache.filter(function(x){return x.status==='rejected'}).length,color:'#ef4444'}
  ]

  // Time-series data
  var upSlots=timeSlots(mode),vwSlots=timeSlots(mode)
  dataCache.forEach(function(x){
    if(!x.created_at)return
    var d=new Date(x.created_at),idx=slotIndex(upSlots,d,mode)
    if(idx>=0)upSlots[idx].value++
  })

  // Tag distribution
  var tagCounts={}
  dataCache.forEach(function(x){
    var cat=tagCat(x.tags),name=tagCatName(cat)
    tagCounts[name]=(tagCounts[name]||0)+1
  })
  var tagData=Object.keys(tagCounts).map(function(k){return{label:k,value:tagCounts[k]}})
    .sort(function(a,b){return b.value-a.value})

  var modeLabel={ '24h':'24h','7d':'7天','30d':'30天','all':'月度' }[mode]||mode

  // Draw charts (rAF ensures DOM ready + canvas sized)
  requestAnimationFrame(function(){
    try{window.drawBarChart(document.getElementById('chartLikes'),likes.length?likes:[{label:'-',value:1}],{height:260,title:'点赞排行',barColor:'#38bdf8',onClick:function(d){if(d._id)scrollToItem(d._id)}})}catch(e){console.error('chartLikes',e)}
    try{window.drawPieChart(document.getElementById('chartStatus'),status.length?status:[{label:'-',value:1}],{title:'审核状态分布',colors:['#34d399','#fbbf24','#ef4444'],onClick:function(d){switchTabByStatus(d.label)}})}catch(e){console.error('chartStatus',e)}
    try{window.drawBarChart(document.getElementById('chartUploads'),upSlots,{height:260,title:modeLabel+'上传量',barColor:'#818cf8',barMaxWidth:52})}catch(e){console.error('chartUploads',e)}
    try{window.drawBarChart(document.getElementById('chartViews'),vwSlots,{height:260,title:modeLabel+'浏览量',barColor:'#34d399',barMaxWidth:52})}catch(e){console.error('chartViews',e)}
    try{window.drawPieChart(document.getElementById('chartTags'),tagData.length?tagData:[{label:'-',value:1}],{title:'标签分布',colors:['#38bdf8','#818cf8','#34d399','#fbbf24','#f472b6','#fb923c','#2dd4bf']})}catch(e){console.error('chartTags',e)}

    // Async: update views chart with real PV data, then redraw
    sbApi('page_visits?select=visited_at&page=eq.linli&order=visited_at.desc&limit=100000').then(function(pv){
      pv.forEach(function(v){
        if(!v.visited_at)return
        var d=new Date(v.visited_at),idx=slotIndex(vwSlots,d,mode)
        if(idx>=0)vwSlots[idx].value++
      })
      try{window.drawBarChart(document.getElementById('chartViews'),vwSlots,{height:260,title:modeLabel+'浏览量',barColor:'#34d399',barMaxWidth:52})}catch(e){console.error('chartViews2',e)}
    }).catch(function(e){console.error('pvFetch',e)})
  })
}

function scrollToItem(id){
  var rows=document.querySelectorAll('#list .row')

function renderList(){
  const lst=document.getElementById('list'),fl=document.getElementById('feedbackList'),dl=document.getElementById('discussList'),em=document.getElementById('empty')
  lst.style.display='';lst.innerHTML='';fl.style.display='none';dl.style.display='none'
  var items=dataCache
  if(filter==='reported')items=dataCache.filter(function(x){return(x.reports||0)>0})
  else if(filter!=='all'&&filter!=='feedback')items=dataCache.filter(function(x){return x.status===filter})
  // Search filter
  if(_searchQ){items=items.filter(function(x){return(x.code||'').toLowerCase().indexOf(_searchQ)>=0||(x.title||'').toLowerCase().indexOf(_searchQ)>=0||(x.tags||'').toLowerCase().indexOf(_searchQ)>=0})}
  // Category filter
  if(_catFilter){items=items.filter(function(x){return tagCat(x.tags)===_catFilter})}
  if(!items.length){em.style.display='block';em.textContent='暂无数据';return}
  em.style.display='none'
  const dupeMap=new Map();items.forEach(x=>{const c=x.code;dupeMap.set(c,(dupeMap.get(c)||0)+1)})
  const dupeSet=new Set([...dupeMap.entries()].filter(([,v])=>v>1).map(([k])=>k))
  // sort dupes first, grouped by code
  items=[...items].sort((a,b)=>{const da=dupeSet.has(a.code),db=dupeSet.has(b.code);if(da&&db)return a.code.localeCompare(b.code)||b.id-a.id;if(da)return -1;if(db)return 1;return 0})
  let lastDupe=''
  items.forEach((item,i)=>{
    const isDupe=dupeSet.has(item.code)
    if(isDupe&&item.code!==lastDupe){const sep=document.createElement('div');sep.style.cssText='text-align:center;color:#ef4444;font-size:0.7rem;padding:4px 0';sep.textContent='——— '+item.code+' 重复 ———';lst.appendChild(sep);lastDupe=item.code}
    const d=document.createElement('div');let cls='row '
    if(item.status==='pending')cls+='pending ';if(item.status==='rejected')cls+='rejected '
    if(isDupe)cls+='dupe '
    if((item.reports||0)>0)cls+='reported '
    d.className=cls
    const desc=item.description||(item.author&&item.author!=='匿名'?item.author:'')
    const tagList=item.tags?item.tags.split(/[\s,]+/).filter(Boolean):[]
    d.setAttribute('data-item-code',item.code)
    d.setAttribute('data-item-tags',item.tags||'')
    d.innerHTML='<span style="font-size:0.7rem;color:var(--text-dim);min-width:45px">'+item.status+'</span><div class="code">'+escapeHtml(item.code)+(isDupe?' <span style="background:#ef4444;color:#fff;font-size:0.55rem;padding:1px 5px;border-radius:4px">重复</span>':'')+'</div><div class="info"><div class="title">'+escapeHtml(item.title)+'</div><div class="sub">'+(desc?escapeHtml(desc):'')+' <span class="tag-edit" data-code="'+item.code+'" onclick="editTags(this)" title="点击编辑标签">'+(tagList.length?tagList.map(t=>'#'+escapeHtml(t)).join(' '):'<i style="color:var(--text-dim)">无标签</i>')+'</span></div></div><span style="font-size:0.75rem;color:var(--text-dim);white-space:nowrap">👁'+(item.views||0)+' ❤'+(item.likes||0)+(item.reports>0?' ⚠'+(item.reports||0):'')+'</span><div class="actions">'+
      (item.status==='pending'?'<button class="btn ok sm" onclick="approve('+item.id+')">通过</button><button class="btn danger sm" onclick="reject('+item.id+')">拒绝</button>':'')+
      '<button class="btn danger sm" onclick="del('+item.id+')">删除</button></div>'
    lst.appendChild(d)
  })
}

function editTags(el){

  el.innerHTML='<input class="tag-input" value="'+curTags.replace(/"/g,'&quot;')+'" data-code="'+code+'" data-old="'+curTags.replace(/"/g,'&quot;')+'" onkeydown="if(event.key===\'Enter\')saveTags(this)" onblur="saveTags(this)" style="width:'+Math.max(80,(curTags.length||4)*10)+'px;padding:2px 6px;border-radius:6px;border:1px solid var(--accent);background:var(--card-bg);color:var(--text);font-size:0.7rem;outline:none;font-family:inherit">'

async function saveTags(input){
  var newTags=input.value.trim(),code=input.dataset.code,oldTags=input.dataset.old
  if(newTags===oldTags){cancelTagEdit(input);return}
  try{
    await adminApi('update_tags',{code:code,tags:newTags})
    showToast('标签已更新','ok')
    var row=document.querySelector('.row[data-item-code="'+code+'"]')
    if(row)row.setAttribute('data-item-tags',newTags)
    var tagList=newTags?newTags.split(/[\s,]+/).filter(Boolean):[]
    var span=input.parentElement
    span.innerHTML=tagList.length?tagList.map(function(t){return '#'+escapeHtml(t)}).join(' '):'<i style="color:var(--text-dim)">无标签</i>'
    _isEditing=false
  }catch(e){showToast('更新失败','err');cancelTagEdit(input)}
}
function cancelTagEdit(input){
  _isEditing=false
  var span=input.parentElement,oldTags=input.dataset.old
  var tagList=oldTags?oldTags.split(/[\s,]+/).filter(Boolean):[]
  span.innerHTML=tagList.length?tagList.map(function(t){return '#'+escapeHtml(t)}).join(' '):'<i style="color:var(--text-dim)">无标签</i>'
}
