<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小游戏合集 — Vibecoding</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg-start: #0f0c29;    --bg-mid: #302b63;    --bg-end: #24243e;
  --text: #e0e0e0;        --text-muted: #889;   --text-dim: #667;
  --heading: #ddd;        --hero-sub: #889;
  --nav-bg: rgba(15,12,41,0.45);  --nav-border: rgba(255,255,255,0.06);
  --nav-link: #999;       --nav-link-hover: #fff;
  --card-bg: rgba(255,255,255,0.05);  --card-border: rgba(255,255,255,0.08);
  --card-hover-border: rgba(245,87,108,0.4);
  --card-hover-shadow: rgba(0,0,0,0.3);
  --card-hover-ring: rgba(245,87,108,0.15);
  --card-icon-bg: rgba(255,255,255,0.06);
  --card-title: #fff;
  --tag-bg: rgba(255,255,255,0.08);  --tag-text: #aab;
  --footer-text: #556;    --footer-link: #778;  --footer-link-hover: #aaa;
  --footer-border: rgba(255,255,255,0.06);
  --star-color: rgba(255,255,255,0.7);
  --dash-border: rgba(255,255,255,0.12);
  --placeholder-plus: #445;  --placeholder-hint: #556;
}
@media (prefers-color-scheme: light) {
  html:not(.dark):not(.light) {
    --bg-start: #f5f3ff;    --bg-mid: #fdf2f8;    --bg-end: #fce4ec;
    --text: #3a3a4a;        --text-muted: #6b6b7b; --text-dim: #8a8a9a;
    --heading: #2a2a3a;     --hero-sub: #6b6b7b;
    --nav-bg: rgba(255,255,255,0.35);  --nav-border: rgba(0,0,0,0.06);
    --nav-link: #777;       --nav-link-hover: #333;
    --card-bg: rgba(255,255,255,0.38);  --card-border: rgba(0,0,0,0.06);
    --card-hover-border: rgba(245,87,108,0.5);
    --card-hover-shadow: rgba(0,0,0,0.08);
    --card-hover-ring: rgba(245,87,108,0.12);
    --card-icon-bg: rgba(0,0,0,0.04);
    --card-title: #2a2a3a;
    --tag-bg: rgba(0,0,0,0.05);  --tag-text: #6b6b7b;
    --footer-text: #aaa;    --footer-link: #999;   --footer-link-hover: #666;
    --footer-border: rgba(0,0,0,0.06);
    --star-color: rgba(0,0,0,0.1);
    --dash-border: rgba(0,0,0,0.1);
    --placeholder-plus: #ccc;  --placeholder-hint: #bbb;
  }
}
html.light {
  --bg-start: #f5f3ff;    --bg-mid: #fdf2f8;    --bg-end: #fce4ec;
  --text: #3a3a4a;        --text-muted: #6b6b7b; --text-dim: #8a8a9a;
  --heading: #2a2a3a;     --hero-sub: #6b6b7b;
  --nav-bg: rgba(255,255,255,0.35);  --nav-border: rgba(0,0,0,0.06);
  --nav-link: #777;       --nav-link-hover: #333;
  --card-bg: rgba(255,255,255,0.38);  --card-border: rgba(0,0,0,0.06);
  --card-hover-border: rgba(245,87,108,0.5);
  --card-hover-shadow: rgba(0,0,0,0.08);
  --card-hover-ring: rgba(245,87,108,0.12);
  --card-icon-bg: rgba(0,0,0,0.04);
  --card-title: #2a2a3a;
  --tag-bg: rgba(0,0,0,0.05);  --tag-text: #6b6b7b;
  --footer-text: #aaa;    --footer-link: #999;   --footer-link-hover: #666;
  --footer-border: rgba(0,0,0,0.06);
  --star-color: rgba(0,0,0,0.1);
  --dash-border: rgba(0,0,0,0.1);
  --placeholder-plus: #ccc;  --placeholder-hint: #bbb;
}
html.dark {
  --bg-start: #0f0c29;    --bg-mid: #302b63;    --bg-end: #24243e;
  --text: #e0e0e0;        --text-muted: #889;   --text-dim: #667;
  --heading: #ddd;        --hero-sub: #889;
  --nav-bg: rgba(15,12,41,0.45);  --nav-border: rgba(255,255,255,0.06);
  --nav-link: #999;       --nav-link-hover: #fff;
  --card-bg: rgba(255,255,255,0.05);  --card-border: rgba(255,255,255,0.08);
  --card-hover-border: rgba(245,87,108,0.4);
  --card-hover-shadow: rgba(0,0,0,0.3);
  --card-hover-ring: rgba(245,87,108,0.15);
  --card-icon-bg: rgba(255,255,255,0.06);
  --card-title: #fff;
  --tag-bg: rgba(255,255,255,0.08);  --tag-text: #aab;
  --footer-text: #556;    --footer-link: #778;  --footer-link-hover: #aaa;
  --footer-border: rgba(255,255,255,0.06);
  --star-color: rgba(255,255,255,0.7);
  --dash-border: rgba(255,255,255,0.12);
  --placeholder-plus: #445;  --placeholder-hint: #556;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e, #1a1040);
  background-size: 400% 400%;
  color: var(--text); min-height: 100vh; line-height: 1.6;
  transition: color 0.3s ease;
  animation: bgShift 12s ease infinite;
}
@keyframes bgShift {
  0%, 100% { background-position: 0% 50%; }
  25% { background-position: 100% 0%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: linear-gradient(135deg, #f5f3ff, #fdf2f8, #fce4ec);
  opacity: 0; transition: opacity 0.5s ease;
}
html.light body::before { opacity: 1; }
html.light .stars { opacity: 0; animation: none; }
html.light .orb { opacity: 0.35; }
@media (prefers-color-scheme: light) {
  html:not(.dark):not(.light) body::before { opacity: 1; }
  html:not(.dark):not(.light) .stars { opacity: 0; animation: none; }
  html:not(.dark):not(.light) .orb { opacity: 0.35; }
}

nav, .card, .card .icon, .card .tag, .stars, footer {
  transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, color 0.3s ease;
}

/* stars */
@keyframes twinkle { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
.stars {
  position: fixed; inset: -40px; pointer-events: none; z-index: 0;
  animation: twinkle 3s ease-in-out infinite;
  background:
    radial-gradient(3px 3px at 10% 20%, var(--star-color), transparent),
    radial-gradient(3px 3px at 30% 70%, var(--star-color), transparent),
    radial-gradient(4px 4px at 15% 55%, var(--star-color), transparent),
    radial-gradient(3px 3px at 70% 30%, var(--star-color), transparent),
    radial-gradient(4px 4px at 60% 30%, var(--star-color), transparent),
    radial-gradient(3px 3px at 80% 60%, var(--star-color), transparent),
    radial-gradient(4px 4px at 40% 78%, var(--star-color), transparent),
    radial-gradient(3px 3px at 25% 65%, var(--star-color), transparent),
    radial-gradient(4px 4px at 55% 85%, var(--star-color), transparent),
    radial-gradient(2px 2px at 50% 15%, var(--star-color), transparent),
    radial-gradient(2px 2px at 70% 80%, var(--star-color), transparent),
    radial-gradient(2px 2px at 85% 12%, var(--star-color), transparent),
    radial-gradient(2px 2px at 8% 38%, var(--star-color), transparent),
    radial-gradient(2px 2px at 95% 72%, var(--star-color), transparent),
    radial-gradient(1px 1px at 90% 40%, var(--star-color), transparent),
    radial-gradient(1px 1px at 45% 45%, var(--star-color), transparent),
    radial-gradient(1px 1px at 5% 64%, var(--star-color), transparent);
  transition: transform 0.2s ease-out;
}

/* orbs */
.orb { position: fixed; z-index: 0; pointer-events: none; border-radius: 50%; filter: blur(80px); opacity: 0.28; animation: float 25s ease-in-out infinite; }
.orb-1 { width: 500px; height: 500px; background: #f093fb; top: -15%; left: -10%; }
.orb-2 { width: 400px; height: 400px; background: #667eea; bottom: -12%; right: -8%; animation-delay: -9s; }
.orb-3 { width: 350px; height: 350px; background: #f5576c; top: 55%; left: 60%; animation-delay: -17s; }
@keyframes float {
  0%   { transform: translate(5vw, 10vh) scale(0.9); }
  25%  { transform: translate(35vw, -15vh) scale(1.08); }
  50%  { transform: translate(15vw, 35vh) scale(0.88); }
  75%  { transform: translate(-10vw, 5vh) scale(1.04); }
  100% { transform: translate(5vw, 10vh) scale(0.9); }
}

/* cursor glow */
.cursor-glow {
  position: fixed; z-index: 0; top: 0; left: 0;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(240,147,251,0.12), transparent 65%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: opacity 0.5s;
  opacity: 0;
}
@media (max-width: 768px) { .cursor-glow, .orb { display: none; } }

/* nav */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--nav-bg); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--nav-border); padding: 0 24px;
}
nav .inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
nav .nav-right { display: flex; align-items: center; gap: 16px; }
nav .logo {
  font-size: 1.3rem; font-weight: 700;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
nav a {
  color: var(--nav-link); text-decoration: none; font-size: 0.9rem;
  transition: color 0.2s;
}
nav a:hover { color: var(--nav-link-hover); }
nav .nav-game-link {
  font-weight: 600;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
nav .gh-icon { display: flex; align-items: center; gap: 6px; }
nav .gh-icon svg { width: 20px; height: 20px; fill: currentColor; }

.theme-btn {
  background: none; border: 1px solid var(--nav-border); color: var(--nav-link);
  cursor: pointer; width: 36px; height: 36px; border-radius: 50%;
  font-size: 1.1rem; transition: background 0.2s, color 0.2s;
}
.theme-btn:hover { background: var(--card-bg); color: var(--nav-link-hover); }
.theme-btn .icon-sun { display: inline; }
.theme-btn .icon-moon { display: none; }
html.light .theme-btn .icon-sun { display: none; }
html.light .theme-btn .icon-moon { display: inline; }
@media (prefers-color-scheme: light) {
  html:not(.dark):not(.light) .theme-btn .icon-sun { display: none; }
  html:not(.dark):not(.light) .theme-btn .icon-moon { display: inline; }
}

.lang-btn {
  background: none; border: 1px solid var(--nav-border);
  color: var(--nav-link); cursor: pointer;
  height: 36px; border-radius: 50px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; transition: background 0.2s, color 0.2s;
  padding: 0 12px; line-height: 1; font-weight: 600;
  font-family: system-ui, -apple-system, sans-serif;
}
.lang-btn:hover { background: var(--card-bg); color: var(--nav-link-hover); }

/* hero */
.hero {
  position: relative; z-index: 1;
  text-align: center; padding: 80px 24px 60px;
}
.hero h1 {
  font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 800;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.2; margin-bottom: 12px; letter-spacing: -1px;
}
.hero p { color: var(--hero-sub); font-size: 1.05rem; }

/* projects section */
.games-section {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto; padding: 0 24px 80px;
}
.games-section h2 { text-align: center; font-size: 1.5rem; margin-bottom: 8px; color: var(--heading); }
.games-section .sub { text-align: center; color: var(--text-dim); font-size: 0.9rem; margin-bottom: 40px; }

.grid {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 24px;
  perspective: 1200px;
}
.grid .card-wrap { flex: 0 1 320px; display: flex; }
.grid .card-wrap .card { flex: 1; width: 100%; min-height: 280px; }

/* scroll reveal */
.card-wrap.reveal {
  --reveal: 0;
  opacity: var(--reveal);
  transform: translateY(calc(48px * (1 - var(--reveal)))) rotateX(calc(10deg * (1 - var(--reveal))));
}
@media (prefers-reduced-motion: reduce) {
  .card-wrap.reveal { opacity: 1; transform: none; }
}

/* cards */
.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 20px; padding: 32px;
  transition: border-color 0.25s, box-shadow 0.25s;
  transform: perspective(1200px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
  display: flex; flex-direction: column;
  backdrop-filter: blur(6px); position: relative; overflow: hidden;
}
.card:hover {
  border-color: var(--card-hover-border);
  box-shadow: 0 12px 40px var(--card-hover-shadow), 0 0 0 1px var(--card-hover-ring);
}
.card .glare {
  position: absolute; inset: 0; pointer-events: none; z-index: 2;
  border-radius: 20px;
  background: radial-gradient(circle at var(--gx, 50%) var(--gy, 50%), rgba(255,255,255,0.14) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.3s;
}
.card:hover .glare { opacity: 1; }
.card.tilting { will-change: transform; }
.card.tilting .glare { opacity: 1; }
.card .icon { font-size: 2.5rem; margin-bottom: 16px; }
.card h3 { font-size: 1.2rem; color: var(--card-title); margin-bottom: 8px; }
.card .desc { color: var(--text-muted); font-size: 0.9rem; flex: 1; margin-bottom: 20px; }
.card .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.card .tag {
  font-size: 0.75rem; padding: 4px 12px; border-radius: 50px;
  background: var(--tag-bg); color: var(--tag-text);
}
.card .actions { display: flex; gap: 12px; }
.card .btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: 50px; font-size: 0.9rem;
  text-decoration: none; font-weight: 500;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card .btn.primary {
  background: linear-gradient(90deg, #f093fb, #f5576c);
  color: #fff;
}
.card .btn.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,87,108,0.3); }

/* placeholder */
.card.placeholder {
  border-style: dashed; border-color: var(--dash-border);
  justify-content: center; align-items: center; min-height: 240px;
}
.card.placeholder .plus { font-size: 2.5rem; color: var(--placeholder-plus); margin-bottom: 8px; }
.card.placeholder .hint { color: var(--placeholder-hint); font-size: 0.9rem; }

/* click spark */
.spark-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
.spark {
  position: absolute; width: 6px; height: 6px; border-radius: 50%;
  background: #f5576c; pointer-events: none;
  animation: sparkBurst 0.7s ease-out forwards;
}
@keyframes sparkBurst {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
}

/* footer */
footer {
  position: relative; z-index: 1; text-align: center; padding: 30px 24px;
  border-top: 1px solid var(--footer-border);
  color: var(--footer-text); font-size: 0.85rem;
}
footer a { color: var(--footer-link); text-decoration: none; }
footer a:hover { color: var(--footer-link-hover); }

@media (max-width: 768px) { .hero { padding: 50px 20px 30px; } }
</style>
</head>
<body>

<div class="stars"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<nav>
  <div class="inner">
    <a href="index.html" class="logo">Vibecoding</a>
    <div class="nav-right">
      <a href="games.html" class="nav-game-link" id="navGameLink">🎮 小游戏</a>
      <button class="lang-btn" id="langToggle">EN</button>
      <button class="theme-btn" id="themeToggle" title="切换日夜模式">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
      <a class="gh-icon" href="https://github.com/Rikka611" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.73.083-.73 1.205.085 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
        GitHub
      </a>
    </div>
  </div>
</nav>

<div id="contentRoot"></div>

<footer id="footerText"></footer>

<script>
// ===== i18n =====
const i18n = {
  zh: {
    heroTitle: '小游戏合集',
    heroSub: '摸鱼小游戏，浏览器即开即玩',
    gameTitle: '扫雷',
    gameDesc: '经典扫雷游戏，9×9/10×10/16×16 三种难度。右键插旗，双击快速展开，支持暗色模式。',
    tag1: '经典',
    tag2: '鼠标/触屏',
    playBtn: '开始游戏',
    placeholder: '更多游戏即将到来...',
    footer: '← 返回首页',
    langLabel: 'EN',
    gameLink: '🎮 小游戏'
  },
  en: {
    heroTitle: 'Mini Games',
    heroSub: 'Casual browser games, play instantly',
    gameTitle: 'Minesweeper',
    gameDesc: 'Classic minesweeper with 3 difficulties. Right-click to flag, double-click to chord. Dark mode supported.',
    tag1: 'Classic',
    tag2: 'Mouse/Touch',
    playBtn: 'Play',
    placeholder: 'More games coming soon...',
    footer: '← Back to Home',
    langLabel: '中',
    gameLink: '🎮 Games'
  }
};

let lang = localStorage.getItem('lang') || 'zh';
const $ = id => document.getElementById(id);

function buildContent(l) {
  const t = i18n[l];
  return `
    <section class="hero">
      <h1>${t.heroTitle}</h1>
      <p>${t.heroSub}</p>
    </section>
    <section class="games-section">
      <div class="grid">
        <div class="card-wrap reveal">
          <div class="card">
            <div class="glare"></div>
            <div class="icon">💣</div>
            <h3>${t.gameTitle}</h3>
            <p class="desc">${t.gameDesc}</p>
            <div class="tags">
              <span class="tag">${t.tag1}</span>
              <span class="tag">${t.tag2}</span>
            </div>
            <div class="actions">
              <a class="btn primary" href="minesweeper.html">${t.playBtn}</a>
            </div>
          </div>
        </div>
        <div class="card-wrap reveal">
          <div class="card placeholder">
            <div class="plus">+</div>
            <p class="hint">${t.placeholder}</p>
          </div>
        </div>
      </div>
    </section>`;
}

// Initial render
const root = $('contentRoot');
root.innerHTML = buildContent(lang);
$('langToggle').textContent = i18n[lang].langLabel;
$('footerText').innerHTML = `<a href="index.html">${i18n[lang].footer}</a> &nbsp;&middot;&nbsp; &copy; 2026 Rikka611`;
$('navGameLink').textContent = i18n[lang].gameLink;

// ===== FLIP language switch =====
$('langToggle').addEventListener('click', () => {
  const bouncers = '.card, .card .btn, .card .tag';
  const texts = '.hero h1, .hero p, .card h3, .card .desc, .card.placeholder .plus, .card.placeholder .hint';
  const allSel = bouncers + ', ' + texts;
  const oldAll = Array.from(root.querySelectorAll(allSel));
  const firstRects = oldAll.map(el => el.getBoundingClientRect());

  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', lang);
  const langBtn = $('langToggle');
  const oldWidth = langBtn.offsetWidth;
  langBtn.textContent = i18n[lang].langLabel;
  const newWidth = langBtn.offsetWidth;
  if (oldWidth > 0 && newWidth > 0 && Math.abs(oldWidth - newWidth) > 1) {
    langBtn.style.transition = 'none';
    langBtn.style.transform = `scaleX(${oldWidth / newWidth})`;
    langBtn.style.transformOrigin = 'right center';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        langBtn.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.3)';
        langBtn.style.transform = 'scaleX(1)';
        langBtn.addEventListener('transitionend', function cleanup() {
          langBtn.style.transition = '';
          langBtn.style.transform = '';
          langBtn.style.transformOrigin = '';
          langBtn.removeEventListener('transitionend', cleanup);
        });
      });
    });
  }
  $('footerText').innerHTML = `<a href="index.html">${i18n[lang].footer}</a> &nbsp;&middot;&nbsp; &copy; 2026 Rikka611`;
  $('navGameLink').textContent = i18n[lang].gameLink;
  root.innerHTML = buildContent(lang);
  if (window._refreshReveal) window._refreshReveal();

  requestAnimationFrame(() => {
    const newAll = Array.from(root.querySelectorAll(allSel));
    const count = Math.min(firstRects.length, newAll.length);

    for (let i = 0; i < count; i++) {
      const el = newAll[i];
      const fr = firstRects[i];
      const lr = el.getBoundingClientRect();
      const dx = fr.left - lr.left;
      const dy = fr.top - lr.top;
      const isLeaf = el.matches(bouncers);
      const isText = el.matches(texts);
      const sx = isLeaf && lr.width > 0 ? fr.width / lr.width : 1;
      const sy = isLeaf && lr.height > 0 ? fr.height / lr.height : 1;
      const textChanged = isText && oldAll[i] && oldAll[i].textContent !== el.textContent;
      const hasMove = Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3;
      const hasScale = isLeaf && (Math.abs(sx - 1) > 0.01 || Math.abs(sy - 1) > 0.01);

      if (!hasMove && !hasScale) {
        if (textChanged) { el.style.transition = 'none'; el.style.opacity = '0'; el._fadeOnly = true; }
        continue;
      }

      el.style.transition = 'none';
      el.style.transform = hasScale
        ? `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`
        : `translate(${dx}px, ${dy}px)`;
      if (hasScale) { el.style.transformOrigin = 'top left'; el._hadScale = true; }
      if (isLeaf) { el.style.backdropFilter = 'none'; el.style.willChange = 'transform'; }
      if (textChanged) el.style.opacity = '0';
    }

    requestAnimationFrame(() => {
      let pending = 0;

      for (let i = 0; i < count; i++) {
        const el = newAll[i];
        if (!el._fadeOnly) continue;
        delete el._fadeOnly;
        el.style.transition = 'opacity 0.4s ease';
        el.style.opacity = '1';
        pending++;
        el.addEventListener('transitionend', function cleanup() {
          pending--;
          el.style.transition = '';
          el.style.opacity = '';
          if (pending <= 0) { newAll.forEach(e => { e.style.transition = ''; e.style.opacity = ''; }); }
          el.removeEventListener('transitionend', cleanup);
        });
      }

      for (let i = 0; i < count; i++) {
        const el = newAll[i];
        if (el.style.transform === '') continue;
        const isLeaf = el.matches(bouncers);
        const isText = el.matches(texts);
        let props = 'transform 0.55s cubic-bezier(0.33, 0, 0.1, 1)';
        if (isLeaf) props = 'transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1.6)';
        if (isText) props += ', opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1)';
        el.style.transition = props;
        el.style.transform = isLeaf ? 'translate(0, 0) scale(1, 1)' : 'translate(0, 0)';
        if (el.style.opacity === '0') el.style.opacity = '1';
        pending++;
        el.addEventListener('transitionend', function cleanup() {
          pending--;
          el.style.transition = '';
          el.style.transform = '';
          el.style.transformOrigin = '';
          el.style.opacity = '';
          el.style.backdropFilter = '';
          el.style.willChange = '';
          if (pending <= 0) { newAll.forEach(e => { e.style.transition = ''; e.style.transform = ''; e.style.transformOrigin = ''; e.style.opacity = ''; e.style.backdropFilter = ''; e.style.willChange = ''; }); }
          el.removeEventListener('transitionend', cleanup);
        });
      }
      setTimeout(() => {
        newAll.forEach(el => {
          el.style.transition = '';
          el.style.transform = '';
          el.style.transformOrigin = '';
          el.style.opacity = '';
          el.style.backdropFilter = '';
          el.style.willChange = '';
        });
      }, 800);
    });
  });
});

// ===== Theme =====
const html = document.documentElement;
function applyTheme(mode) {
  html.classList.remove('light', 'dark');
  if (mode === 'light') html.classList.add('light');
  if (mode === 'dark') html.classList.add('dark');
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme) applyTheme(savedTheme);
$('themeToggle').addEventListener('click', () => {
  const current = html.classList.contains('light') ? 'light' : html.classList.contains('dark') ? 'dark' : 'auto';
  if (current === 'auto') {
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    localStorage.setItem('theme', sysDark ? 'light' : 'dark');
    applyTheme(sysDark ? 'light' : 'dark');
  } else if (current === 'dark') {
    localStorage.setItem('theme', 'light');
    applyTheme('light');
  } else {
    localStorage.setItem('theme', 'dark');
    applyTheme('dark');
  }
});

// ===== Scroll reveal =====
(function() {
  const cards = () => document.querySelectorAll('.card-wrap.reveal');
  let raf = null;

  function update() {
    raf = null;
    const vh = window.innerHeight;
    cards().forEach(card => {
      const rect = card.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (vh - rect.top) / (vh * 0.75)));
      card.style.setProperty('--reveal', ratio.toFixed(3));
    });
  }

  window.addEventListener('scroll', () => {
    if (!raf) raf = requestAnimationFrame(update);
  }, { passive: true });
  update();
  window.addEventListener('resize', update);
  window._refreshReveal = update;
})();

// ===== Cursor glow + starfield parallax =====
const glow = document.getElementById('cursorGlow');
const starsEl = document.querySelector('.stars');
if (glow) {
  let pending = false;
  document.addEventListener('mousemove', e => {
    if (pending) return;
    pending = true;
    requestAnimationFrame(() => {
      pending = false;
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
      glow.style.opacity = '1';
      if (starsEl) {
        const x = (e.clientX / window.innerWidth - 0.5) * 16;
        const y = (e.clientY / window.innerHeight - 0.5) * 16;
        starsEl.style.transform = `translate(${-x}px, ${-y}px)`;
      }
    });
  });
  document.addEventListener('mouseleave', () => {
    glow.style.opacity = '0';
    if (starsEl) starsEl.style.transform = 'translate(0, 0)';
  });
}

// ===== Card 3D tilt + glare (mouse + touch) =====
(function() {
  const root = document.getElementById('contentRoot');
  if (!root) return;
  const maxAngle = 8;
  let cur = null, rect = null, raf = null, mx = 0, my = 0;

  function updateRect() { if (cur) rect = cur.getBoundingClientRect(); }
  window.addEventListener('scroll', updateRect, { passive: true });
  window.addEventListener('resize', updateRect);

  function begin(card, x, y) {
    if (card !== cur) {
      if (cur) reset(cur);
      if (!document.contains(card)) return;
      cur = card;
      card.classList.add('tilting');
      rect = card.getBoundingClientRect();
    }
  }

  function move(x, y) {
    if (!cur || !rect) return;
    mx = x; my = y;
    if (!raf) {
      raf = requestAnimationFrame(() => {
        raf = null;
        if (!cur || !rect) return;
        const rx = (my - rect.top) / rect.height;
        const ry = (mx - rect.left) / rect.width;
        cur.style.setProperty('--rx', ((rx - 0.5) * -maxAngle).toFixed(2) + 'deg');
        cur.style.setProperty('--ry', ((ry - 0.5) * maxAngle).toFixed(2) + 'deg');
        cur.style.setProperty('--gx', (ry * 100).toFixed(1) + '%');
        cur.style.setProperty('--gy', (rx * 100).toFixed(1) + '%');
      });
    }
  }

  function end(card) {
    if (card === cur) { reset(cur); cur = null; rect = null; }
  }

  function reset(card) {
    card.classList.remove('tilting');
    const glare = card.querySelector('.glare');
    const done = () => {
      card.style.transition = 'transform 0.3s ease-out';
      card.style.removeProperty('--rx');
      card.style.removeProperty('--ry');
      card.style.removeProperty('--gx');
      card.style.removeProperty('--gy');
      card.addEventListener('transitionend', function clean() {
        card.style.transition = '';
        card.removeEventListener('transitionend', clean);
      }, { once: true });
    };
    if (glare) {
      glare.addEventListener('transitionend', () => { done(); glare = null; }, { once: true });
    } else {
      done();
    }
  }

  // --- mouse ---
  root.addEventListener('mouseover', e => {
    begin(e.target.closest('.card'), e.clientX, e.clientY);
  });
  root.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  root.addEventListener('mouseout', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const related = e.relatedTarget;
    if (related && card.contains(related)) return;
    end(card);
  });

  // --- touch ---
  root.addEventListener('touchstart', e => {
    const t = e.touches[0];
    begin(t.target.closest('.card'), t.clientX, t.clientY);
  }, { passive: true });
  root.addEventListener('touchmove', e => {
    const t = e.touches[0];
    move(t.clientX, t.clientY);
  }, { passive: true });
  root.addEventListener('touchend', e => {
    if (cur) { reset(cur); cur = null; rect = null; }
  });
})();

// ===== Click spark =====
(function() {
  const container = document.createElement('div');
  container.className = 'spark-container';
  document.body.appendChild(container);
  document.addEventListener('click', e => {
    const count = 6;
    for (let i = 0; i < count; i++) {
      const spark = document.createElement('div');
      spark.className = 'spark';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
      const dist = 18 + Math.random() * 22;
      spark.style.left = e.clientX + 'px';
      spark.style.top = e.clientY + 'px';
      spark.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
      spark.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
      spark.style.background = `hsl(${330 + Math.random() * 30}, 90%, ${55 + Math.random() * 20}%)`;
      container.appendChild(spark);
      spark.addEventListener('animationend', () => spark.remove());
    }
  });
})();

// ===== Gyroscope parallax =====
(function() {
  if (typeof DeviceOrientationEvent === 'undefined') return;
  const stars = document.querySelector('.stars');
  const orbs = document.querySelectorAll('.orb');
  if (!stars) return;
  const maxShift = 28;

  function handle(e) {
    const g = e.gamma || 0;
    const b = e.beta || 0;
    const x = Math.max(-1, Math.min(1, g / 45));
    const y = Math.max(-1, Math.min(1, (b - 45) / 45));
    stars.style.transition = 'none';
    stars.style.transform = `translate(${x * maxShift}px, ${y * maxShift}px)`;
    orbs.forEach((orb, i) => {
      const d = (i + 1) * 0.6;
      orb.style.transition = 'none';
      orb.style.transform = `translate(${x * maxShift * d}px, ${y * maxShift * d}px)`;
    });
  }

  function resetGyro() {
    stars.style.transition = 'transform 0.8s ease-out';
    stars.style.transform = '';
    orbs.forEach(orb => {
      orb.style.transition = 'transform 0.8s ease-out';
      orb.style.transform = '';
    });
  }

  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    const ask = () => {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', handle);
            window.addEventListener('deviceorientation', () => {
              clearTimeout(window._gyroTimer);
              window._gyroTimer = setTimeout(resetGyro, 3000);
            });
          }
        })
        .catch(() => {});
      document.removeEventListener('click', ask);
      document.removeEventListener('touchstart', ask);
    };
    document.addEventListener('click', ask, { once: true });
    document.addEventListener('touchstart', ask, { once: true });
  } else {
    window.addEventListener('deviceorientation', handle);
    let idle;
    window.addEventListener('deviceorientation', () => {
      clearTimeout(idle);
      idle = setTimeout(resetGyro, 3000);
    });
  }
})();
</script>
